<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="とけいタイムマシン">
<meta name="theme-color" content="#fff7d6">
<title>とけいタイムマシン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN','BIZ UDPGothic',sans-serif;
  background:#fff7d6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 0 40px;
}
h1.app-title{
  font-size:clamp(1.4rem,5vw,2rem);
  color:#e86c3a;
  text-align:center;
  margin:18px 0 4px;
  letter-spacing:.05em;
  text-shadow:0 2px 0 #ffe0aa;
}
.subtitle{
  font-size:.85rem;
  color:#c07840;
  text-align:center;
  margin-bottom:20px;
}
.screen{display:none;}
.screen.active{display:block;width:100%;max-width:480px;padding:0 12px;}

/* --- トップ画面 --- */
#screen-top{text-align:center;}
.mode-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:8px;
}
.mode-btn{
  background:#fff;
  border:3px solid #f5a623;
  border-radius:20px;
  padding:22px 10px 18px;
  cursor:pointer;
  font-size:1.1rem;
  color:#6b3e26;
  font-weight:bold;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition:transform .1s,box-shadow .1s;
  box-shadow:0 4px 0 #f5a623;
}
.mode-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #f5a623;}
.mode-btn .mode-icon{font-size:2.2rem;line-height:1;}
.mode-btn .mode-label{font-size:.9rem;line-height:1.3;}

/* --- クイズ共通 --- */
.quiz-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-radius:16px;
  padding:10px 16px;
  margin-bottom:14px;
  border:2px solid #f5c66b;
  font-size:.95rem;
  color:#6b3e26;
  font-weight:bold;
}
.quiz-question{
  background:#fff;
  border-radius:20px;
  padding:16px 16px 12px;
  text-align:center;
  margin-bottom:16px;
  border:2px solid #f5c66b;
  font-size:1.1rem;
  color:#3e2a1a;
  line-height:1.6;
  font-weight:bold;
}
.quiz-question .q-time{
  font-size:1.5rem;
  color:#e86c3a;
  display:block;
  margin:4px 0;
}
.clock-wrap{
  display:flex;
  justify-content:center;
  margin:0 0 14px;
}
.choices{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:14px;
}
.choice-btn{
  background:#fff;
  border:3px solid #8ad66b;
  border-radius:16px;
  padding:14px;
  font-size:1.15rem;
  font-weight:bold;
  color:#3e5e2a;
  cursor:pointer;
  font-family:inherit;
  transition:transform .1s;
  box-shadow:0 3px 0 #8ad66b;
}
.choice-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #8ad66b;}
.choice-btn.correct{background:#d4f5bb;border-color:#4caf50;color:#1a5e20;box-shadow:0 3px 0 #4caf50;}
.choice-btn.wrong{background:#ffd5d5;border-color:#e57373;color:#7a1a1a;box-shadow:0 3px 0 #e57373;}
.choice-btn:disabled{cursor:default;}
.feedback{
  text-align:center;
  font-size:1.3rem;
  font-weight:bold;
  padding:10px;
  border-radius:14px;
  margin-bottom:12px;
  display:none;
}
.feedback.show{display:block;}
.feedback.ok{background:#d4f5bb;color:#1a5e20;}
.feedback.ng{background:#ffd5d5;color:#7a1a1a;}
.next-btn{
  display:block;
  width:100%;
  background:#f5a623;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:1.1rem;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 0 #c47d10;
  transition:transform .1s;
  display:none;
}
.next-btn.show{display:block;}
.next-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c47d10;}
.back-btn{
  display:block;
  width:100%;
  background:#fff;
  border:2px solid #ccc;
  border-radius:14px;
  padding:10px;
  font-size:.95rem;
  color:#888;
  cursor:pointer;
  font-family:inherit;
  margin-top:10px;
}

/* --- 結果画面 --- */
.result-box{
  background:#fff;
  border-radius:24px;
  padding:28px 20px;
  text-align:center;
  border:3px solid #f5a623;
  margin-top:10px;
}
.result-score{
  font-size:3rem;
  font-weight:bold;
  color:#e86c3a;
  margin:8px 0;
}
.result-msg{
  font-size:1.1rem;
  color:#6b3e26;
  margin-bottom:20px;
}
.result-btn{
  display:block;
  width:100%;
  background:#e86c3a;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:1.1rem;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  font-family:inherit;
  margin-bottom:10px;
  box-shadow:0 4px 0 #b04a20;
}

/* --- とけいをあわせるモード --- */
.set-clock-area{
  background:#fff;
  border-radius:20px;
  padding:16px;
  border:2px solid #f5c66b;
  margin-bottom:14px;
  text-align:center;
}
.set-clock-goal{
  font-size:1.4rem;
  font-weight:bold;
  color:#e86c3a;
  margin-bottom:12px;
}
.set-clock-cur{
  font-size:1rem;
  color:#6b3e26;
  margin-top:8px;
}
.btn-group{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}
.adj-btn{
  background:#fff;
  border:2px solid #7ec8f5;
  border-radius:14px;
  padding:12px 4px;
  font-size:.95rem;
  font-weight:bold;
  color:#1a5e88;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 3px 0 #7ec8f5;
  transition:transform .1s;
}
.adj-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #7ec8f5;}
.ok-btn{
  display:block;
  width:100%;
  background:#4caf50;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:1.15rem;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 0 #2e7d32;
  margin-top:8px;
  transition:transform .1s;
}
.ok-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2e7d32;}
.set-feedback{
  font-size:1.4rem;
  font-weight:bold;
  text-align:center;
  padding:10px;
  border-radius:14px;
  margin-top:8px;
  display:none;
}
.set-feedback.show{display:block;}
.set-feedback.ok{background:#d4f5bb;color:#1a5e20;}
.set-feedback.ng{background:#ffd5d5;color:#7a1a1a;}
.set-next-btn{
  width:100%;
  background:#f5a623;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:1.1rem;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 0 #c47d10;
  margin-top:10px;
  display:none;
}
.set-next-btn.show{display:block;}

/* --- 星アニメ --- */
@keyframes pop{0%{transform:scale(0);opacity:1;}80%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.star-pop{animation:pop .3s ease;}

.screen-title{
  font-size:1.2rem;
  font-weight:bold;
  color:#e86c3a;
  text-align:center;
  margin-bottom:14px;
}
</style>
</head>
<body>

<h1 class="app-title">⏰ とけいタイムマシン</h1>
<p class="subtitle">じかんのけいさんを れんしゅうしよう！</p>

<!-- ===== トップ ===== -->
<div id="screen-top" class="screen active">
  <div class="mode-grid">
    <button class="mode-btn" onclick="startQuiz('after')">
      <span class="mode-icon">⏩</span>
      <span class="mode-label">なんぷん後？</span>
    </button>
    <button class="mode-btn" onclick="startQuiz('before')">
      <span class="mode-icon">⏪</span>
      <span class="mode-label">なんぷん前？</span>
    </button>
    <button class="mode-btn" onclick="startSet()">
      <span class="mode-icon">🕐</span>
      <span class="mode-label">とけいを<br>あわせる</span>
    </button>
    <button class="mode-btn" onclick="startQuiz('story')">
      <span class="mode-icon">📖</span>
      <span class="mode-label">文章もんだい</span>
    </button>
  </div>
</div>

<!-- ===== クイズ画面（after/before/story共通）===== -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span id="q-mode-label"></span>
    <span id="q-progress">1 / 10</span>
    <span id="q-score">⭐ 0てん</span>
  </div>
  <div class="quiz-question" id="q-text"></div>
  <div class="clock-wrap"><canvas id="quiz-clock" width="200" height="200"></canvas></div>
  <div class="choices" id="q-choices"></div>
  <div class="feedback" id="q-feedback"></div>
  <button class="next-btn" id="q-next" onclick="nextQuestion()">つぎのもんだいへ ▶</button>
  <button class="back-btn" onclick="goTop()">トップにもどる</button>
</div>

<!-- ===== 結果画面 ===== -->
<div id="screen-result" class="screen">
  <div class="result-box">
    <div style="font-size:2.5rem;" id="r-emoji">🎉</div>
    <div class="result-score" id="r-score"></div>
    <div class="result-msg" id="r-msg"></div>
    <button class="result-btn" id="r-retry" onclick="retryMode()">もう一度あそぶ</button>
    <button class="result-btn" style="background:#888;box-shadow:0 4px 0 #555;" onclick="goTop()">トップにもどる</button>
  </div>
</div>

<!-- ===== とけいをあわせる ===== -->
<div id="screen-set" class="screen">
  <div class="screen-title">🕐 とけいを あわせる</div>
  <div class="quiz-header">
    <span>とけいをあわせる</span>
    <span id="s-progress">1 / 10</span>
    <span id="s-score">⭐ 0てん</span>
  </div>
  <div class="set-clock-area">
    <div class="set-clock-goal" id="s-goal-text"></div>
    <div class="clock-wrap">
      <canvas id="set-clock" width="220" height="220"></canvas>
    </div>
    <div class="set-clock-cur">いまの時計： <span id="s-cur-text" style="color:#e86c3a;font-weight:bold;"></span></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <button class="adj-btn" onclick="adjHour(-1)">じかん　－1</button>
    <button class="adj-btn" onclick="adjHour(1)">じかん　＋1</button>
  </div>
  <div class="btn-group">
    <button class="adj-btn" onclick="adjMin(-5)">ふん　－5</button>
    <button class="adj-btn" onclick="adjMin(5)">ふん　＋5</button>
    <button class="adj-btn" onclick="adjMin(-1)">ふん　－1</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr;margin-bottom:8px;">
    <button class="adj-btn" onclick="adjMin(1)">ふん　＋1</button>
  </div>
  <p style="font-size:.8rem;color:#888;text-align:center;margin-bottom:6px;">※ 長い針をドラッグしても うごかせます</p>
  <button class="ok-btn" onclick="checkSet()">これで OK ✔</button>
  <div class="set-feedback" id="s-feedback"></div>
  <button class="set-next-btn" id="s-next" onclick="nextSet()">つぎのもんだいへ ▶</button>
  <button class="back-btn" onclick="goTop()">トップにもどる</button>
</div>

<script>
// =========================================================
// ユーティリティ
// =========================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function fmtTime(h,m){
  return h+'じ'+(m===0?'ちょうど':m+'ふん');
}
function fmtTimeNum(h,m){
  return h+'時'+m+'分';
}
function addTime(h,m,delta){
  let total=h*60+m+delta;
  total=((total%720)+720)%720;
  return {h:Math.floor(total/60)%12||12, m:total%60};
}
function goTop(){showScreen('screen-top');}

// =========================================================
// アナログ時計描画
// =========================================================
function drawClock(canvas,h,m,size){
  const ctx=canvas.getContext('2d');
  const r=size/2-6;
  const cx=size/2,cy=size/2;
  ctx.clearRect(0,0,size,size);

  // 文字盤
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#fffdf0';ctx.fill();
  ctx.strokeStyle='#ddd';ctx.lineWidth=2;ctx.stroke();

  // 目盛り
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180;
    const big=i%5===0;
    const r1=r-(big?14:8);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle=big?'#888':'#ccc';
    ctx.lineWidth=big?2:1;ctx.stroke();
  }
  // 数字
  ctx.fillStyle='#555';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold '+(r*0.18)+'px sans-serif';
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180;
    ctx.fillText(i,cx+Math.cos(a)*(r-22),cy+Math.sin(a)*(r-22));
  }

  // 短い針（赤・時）
  const ha=((h%12)*30+(m*0.5)-90)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(ha)*(r*0.5),cy+Math.sin(ha)*(r*0.5));
  ctx.strokeStyle='#e84040';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();

  // 長い針（青・分）
  const ma=(m*6-90)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(ma)*(r*0.75),cy+Math.sin(ma)*(r*0.75));
  ctx.strokeStyle='#3a7bd5';ctx.lineWidth=3.5;ctx.lineCap='round';ctx.stroke();

  // 中心
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#666';ctx.fill();
}

// =========================================================
// クイズ共通
// =========================================================
let quizMode='after';
let qIdx=0,qScore=0;
let qTotal=10;
let qCurrent=null;
let qAnswered=false;

// 問題生成
function genAfterBefore(mode){
  const deltas=[10,15,20,30,45,60];
  const delta=deltas[Math.floor(Math.random()*deltas.length)];
  // 5分きざみで開始時刻
  const step=5; // 1に変えれば1分きざみ
  const startH=Math.floor(Math.random()*12)+1;
  const startM=Math.floor(Math.random()*(60/step))*step;
  let ans;
  if(mode==='after') ans=addTime(startH,startM,delta);
  else ans=addTime(startH,startM,-delta);

  const label=mode==='after'?delta+'ぷん後':delta+'ぷん前';
  const qText=mode==='after'
    ?'いまは <span class="q-time">'+fmtTime(startH,startM)+'</span> です。<br>'+delta+'ぷん後は なんじなんぷん？'
    :'いまは <span class="q-time">'+fmtTime(startH,startM)+'</span> です。<br>'+delta+'ぷん前は なんじなんぷん？';

  // 選択肢生成
  const correct=fmtTime(ans.h,ans.m);
  const wrongs=genWrongs(ans.h,ans.m,correct,2,step);
  const choices=shuffle([correct,...wrongs]);

  return {qText,startH,startM,ansH:ans.h,ansM:ans.m,correct,choices};
}

const storyTemplates=[
  {tmpl:(h,m,d)=>'<span class="q-time">'+fmtTime(h,m)+'</span> に 家を出ます。<br>'+d+'ぷん あるくと、なんじなんぷんに つきますか？',delta:1},
  {tmpl:(h,m,d)=>'<span class="q-time">'+fmtTime(h,m)+'</span> から '+d+'ぷん べんきょうしました。<br>おわった じこくは？',delta:1},
  {tmpl:(h,m,d)=>'<span class="q-time">'+fmtTime(h,m)+'</span> から '+d+'ぷん ゲームをしました。<br>おわった じこくは？',delta:1},
  {tmpl:(h,m,d)=>'<span class="q-time">'+fmtTime(h,m)+'</span> に ごはんが できました。<br>'+d+'ぷん で たべおわると なんじなんぷん？',delta:1},
  {tmpl:(h,m,d)=>'<span class="q-time">'+fmtTime(h,m)+'</span> に でんしゃに のります。<br>'+d+'ぷん のると、なんじなんぷんに つきますか？',delta:1},
];
function genStory(){
  const deltas=[10,15,20,25,30,45];
  const delta=deltas[Math.floor(Math.random()*deltas.length)];
  const tmpl=storyTemplates[Math.floor(Math.random()*storyTemplates.length)];
  const step=5;
  const startH=Math.floor(Math.random()*12)+1;
  const startM=Math.floor(Math.random()*(60/step))*step;
  const ans=addTime(startH,startM,delta);
  const qText=tmpl.tmpl(startH,startM,delta);
  const correct=fmtTime(ans.h,ans.m);
  const wrongs=genWrongs(ans.h,ans.m,correct,2,step);
  const choices=shuffle([correct,...wrongs]);
  return {qText,startH,startM,ansH:ans.h,ansM:ans.m,correct,choices};
}

function genWrongs(ansH,ansM,correct,count,step){
  const results=[];
  const offsets=[-10,-15,-5,5,10,15,20,-20,30,-30];
  const shuffled=shuffle(offsets);
  for(const off of shuffled){
    const t=addTime(ansH,ansM,off);
    // stepできざんだ値に丸める
    const tM=Math.round(t.m/step)*step;
    const tH=tM>=60?((t.h%12)+1||1):(t.h||12);
    const tM2=tM>=60?tM-60:tM;
    const candidate=fmtTime(tH,tM2);
    if(candidate!==correct&&!results.includes(candidate)){
      results.push(candidate);
      if(results.length>=count) break;
    }
  }
  // 足りなければ適当に追加
  while(results.length<count){
    const t=addTime(ansH,ansM,(results.length+1)*5);
    const c=fmtTime(t.h,t.m);
    if(!results.includes(c)&&c!==correct) results.push(c);
    else results.push(fmtTime(((ansH+results.length)%12)||12,ansM));
  }
  return results;
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function modeLabel(mode){
  if(mode==='after') return '⏩ なんぷん後？';
  if(mode==='before') return '⏪ なんぷん前？';
  return '📖 文章もんだい';
}

function startQuiz(mode){
  quizMode=mode;
  qIdx=0;qScore=0;qAnswered=false;
  document.getElementById('q-mode-label').textContent=modeLabel(mode);
  showScreen('screen-quiz');
  loadQuestion();
}

function loadQuestion(){
  qAnswered=false;
  document.getElementById('q-progress').textContent=(qIdx+1)+' / '+qTotal;
  document.getElementById('q-score').textContent='⭐ '+qScore+'てん';
  document.getElementById('q-feedback').className='feedback';
  document.getElementById('q-next').className='next-btn';

  let q;
  if(quizMode==='story') q=genStory();
  else q=genAfterBefore(quizMode);
  qCurrent=q;

  document.getElementById('q-text').innerHTML=q.qText;
  drawClock(document.getElementById('quiz-clock'),q.startH,q.startM,200);

  const choicesEl=document.getElementById('q-choices');
  choicesEl.innerHTML='';
  q.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.onclick=()=>answerQ(c,btn);
    choicesEl.appendChild(btn);
  });
}

function answerQ(val,btn){
  if(qAnswered) return;
  qAnswered=true;
  const fb=document.getElementById('q-feedback');
  const buttons=document.querySelectorAll('#q-choices .choice-btn');
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===qCurrent.correct) b.classList.add('correct');
  });
  if(val===qCurrent.correct){
    qScore++;
    btn.classList.add('correct');
    fb.textContent='🎉 せいかい！';
    fb.className='feedback show ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent='😅 ざんねん！　こたえは '+qCurrent.correct+' だよ';
    fb.className='feedback show ng';
  }
  document.getElementById('q-score').textContent='⭐ '+qScore+'てん';
  document.getElementById('q-next').className='next-btn show';
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=qTotal) showResult();
  else loadQuestion();
}

function showResult(){
  showScreen('screen-result');
  document.getElementById('r-score').textContent=qScore+' / '+qTotal;
  let msg,emoji;
  if(qScore>=9){emoji='🏆';msg='すごい！　まんてんちかい！　さいこうだよ！';}
  else if(qScore>=7){emoji='🌟';msg='よくできました！　どんどんうまくなってるね！';}
  else if(qScore>=5){emoji='😊';msg='なかなかいいね！　もういちどちょうせんしてみよう！';}
  else{emoji='💪';msg='もうちょっとれんしゅうしよう！　きっとできるよ！';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-msg').textContent=msg;
}

function retryMode(){startQuiz(quizMode);}

// =========================================================
// とけいをあわせるモード
// =========================================================
let setIdx=0,setScore=0,setTotal=10;
let setGoalH=3,setGoalM=20;
let setCurH=12,setCurM=0;
let setAnswered=false;

function startSet(){
  setIdx=0;setScore=0;setAnswered=false;
  showScreen('screen-set');
  loadSetQ();
  initDrag();
}
function loadSetQ(){
  setAnswered=false;
  document.getElementById('s-progress').textContent=(setIdx+1)+' / '+setTotal;
  document.getElementById('s-score').textContent='⭐ '+setScore+'てん';
  document.getElementById('s-feedback').className='set-feedback';
  document.getElementById('s-next').className='set-next-btn';
  // 目標時刻（5分きざみ）
  setGoalH=Math.floor(Math.random()*12)+1;
  setGoalM=Math.floor(Math.random()*12)*5;
  // 現在値をリセット
  setCurH=12;setCurM=0;
  document.getElementById('s-goal-text').textContent=fmtTime(setGoalH,setGoalM)+' に あわせてね！';
  updateSetClock();
}
function updateSetClock(){
  drawClock(document.getElementById('set-clock'),setCurH,setCurM,220);
  document.getElementById('s-cur-text').textContent=fmtTimeNum(setCurH,setCurM);
}
function adjHour(d){
  if(setAnswered) return;
  setCurH=((setCurH-1+d+12)%12)+1;
  updateSetClock();
}
function adjMin(d){
  if(setAnswered) return;
  let m=setCurM+d;
  if(m>=60){m-=60;setCurH=(setCurH%12)+1;}
  if(m<0){m+=60;setCurH=((setCurH-2+12)%12)+1;}
  setCurM=m;
  updateSetClock();
}
function checkSet(){
  if(setAnswered) return;
  setAnswered=true;
  const fb=document.getElementById('s-feedback');
  if(setCurH===setGoalH&&setCurM===setGoalM){
    setScore++;
    fb.textContent='🎉 せいかい！　ぴったり！';
    fb.className='set-feedback show ok';
  } else {
    fb.textContent='😅 もうすこし！　こたえは '+fmtTime(setGoalH,setGoalM)+' だよ';
    fb.className='set-feedback show ng';
  }
  document.getElementById('s-score').textContent='⭐ '+setScore+'てん';
  document.getElementById('s-next').className='set-next-btn show';
}
function nextSet(){
  setIdx++;
  if(setIdx>=setTotal){
    // 結果
    quizMode='set';
    qScore=setScore;
    showResult();
    document.getElementById('r-retry').onclick=()=>{startSet();};
  } else {
    loadSetQ();
  }
}

// =========================================================
// 長い針ドラッグ操作
// =========================================================
let dragInited=false;
function initDrag(){
  if(dragInited) return;
  dragInited=true;
  const canvas=document.getElementById('set-clock');
  let dragging=false;

  function getAngle(e){
    const rect=canvas.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    let clientX,clientY;
    if(e.touches){
      clientX=e.touches[0].clientX;
      clientY=e.touches[0].clientY;
    } else {
      clientX=e.clientX;
      clientY=e.clientY;
    }
    return Math.atan2(clientY-cy,clientX-cx);
  }
  function angleToMin(a){
    let deg=(a*180/Math.PI+90+360)%360;
    return Math.round(deg/6)%60;
  }

  canvas.addEventListener('mousedown',()=>dragging=true);
  canvas.addEventListener('touchstart',e=>{dragging=true;e.preventDefault();},{passive:false});
  function applyDragMin(e){
    if(!dragging||setAnswered) return;
    const newM=angleToMin(getAngle(e));
    const prev=setCurM;
    if(prev>=45&&newM<=15) setCurH=(setCurH%12)+1;
    if(prev<=15&&newM>=45) setCurH=((setCurH-2+12)%12)+1;
    setCurM=newM;
    updateSetClock();
  }
  canvas.addEventListener('mousemove',e=>{applyDragMin(e);});
  canvas.addEventListener('touchmove',e=>{applyDragMin(e);e.preventDefault();},{passive:false});
  document.addEventListener('mouseup',()=>dragging=false);
  document.addEventListener('touchend',()=>dragging=false);
}
</script>
