<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>文章問題プリントメーカー</title>

  <!-- ホーム画面追加用：maker/img/bunsho-print.png を使います -->
  <link rel="apple-touch-icon" href="img/bunsho-print.png">
  <link rel="icon" type="image/png" href="img/bunsho-print.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="文章問題プリント">
  <meta name="theme-color" content="#fff4cf">

  <style>
    :root {
      --bg: #fff7df;
      --card: #ffffff;
      --main: #ffb86b;
      --accent: #8bdc9b;
      --text: #333024;
      --soft: #fffaf0;
      --ud-font:
        "BIZ UDPGothic",
        "BIZ UDGothic",
        "Yu Gothic UI",
        "Yu Gothic",
        "Hiragino Sans",
        "Meiryo",
        sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--ud-font);
      background: linear-gradient(180deg, #fff7df 0%, #eef8ff 100%);
      color: var(--text);
    }

    button,
    select,
    input,
    textarea {
      font-family: var(--ud-font);
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      text-align: center;
      margin: 12px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #6f6242;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel,
    .preview-wrap {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(95, 76, 31, 0.16);
      padding: 18px;
    }

    .panel h2,
    .preview-wrap h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: 900;
      margin: 14px 0 6px;
      font-size: 15px;
    }

    select,
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e8d6a9;
      border-radius: 14px;
      font-size: 16px;
      background: #fffdf7;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .checkbox-row input {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }

    .main-btn { background: var(--main); color: #4a2e00; }
    .print-btn { background: #79dc8c; color: #123a1d; }
    .sub-btn { background: #eaf5ff; color: #154a72; }

    .note {
      margin-top: 14px;
      padding: 12px;
      background: #fffaf0;
      border-left: 5px solid var(--main);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-area {
      overflow: auto;
      background: #ece5d6;
      border-radius: 18px;
      padding: 16px;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      color: #222;
      padding: 12mm 12mm;
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10mm;
      margin-bottom: 7px;
    }

    .print-title {
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .title-stars {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.8fr;
      gap: 8px;
      font-size: 15px;
      margin-bottom: 7mm;
      align-items: end;
    }

    .meta-box {
      border-bottom: 1.8px solid #222;
      min-height: 26px;
      padding: 2px 4px;
    }

    .sticker-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24mm;
      height: 10mm;
      margin-left: 2mm;
      border: 1.8px solid #222;
      border-radius: 6px;
      font-size: 11px;
      color: #777;
      vertical-align: middle;
    }

    .problems {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6mm 7mm;
    }

    .problem {
      min-height: 59mm;
      page-break-inside: avoid;
      border: 1.8px solid #222;
      border-radius: 8px;
      padding: 3.5mm 4mm;
    }

    .problem-number {
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 2mm;
    }

    .story-text {
      font-size: 16px;
      line-height: 1.7;
      font-weight: 800;
      min-height: 25mm;
    }

    ruby rt {
      font-size: 0.55em;
      font-weight: 700;
    }

    .write-area {
      margin-top: 2.5mm;
      display: grid;
      gap: 2.5mm;
    }

    .write-row {
      display: grid;
      grid-template-columns: 13mm 1fr;
      align-items: end;
      gap: 2mm;
      font-size: 15px;
      font-weight: 900;
    }

    .big-line {
      display: block;
      height: 11mm;
      border-bottom: 2px solid #222;
    }

    .answer-small {
      margin-top: 2mm;
      font-size: 11px;
      color: #666;
      text-align: right;
      line-height: 1.35;
    }

    .paper.count-6 .problems {
      grid-template-columns: repeat(2, 1fr);
      gap: 6mm 7mm;
    }

    .paper.count-6 .problem {
      min-height: 59mm;
    }

    .paper.count-8 .problems {
      grid-template-columns: repeat(2, 1fr);
      gap: 4mm 6mm;
    }

    .paper.count-8 .problem {
      min-height: 48mm;
      padding: 3mm 3.5mm;
    }

    .paper.count-8 .story-text {
      font-size: 14px;
      line-height: 1.55;
      min-height: 20mm;
    }

    .paper.count-8 .big-line {
      height: 9mm;
    }

    .paper.count-10 .print-title {
      font-size: 23px;
    }

    .paper.count-10 .title-stars {
      font-size: 16px;
    }

    .paper.count-10 .title-row {
      gap: 6mm;
      margin-bottom: 4px;
    }

    .paper.count-10 .meta {
      margin-bottom: 5mm;
      font-size: 13px;
    }

    .paper.count-10 .problems {
      grid-template-columns: repeat(2, 1fr);
      gap: 3mm 5mm;
    }

    .paper.count-10 .problem {
      min-height: 39mm;
      padding: 2.2mm 3mm;
    }

    .paper.count-10 .problem-number {
      font-size: 11px;
      margin-bottom: 1mm;
    }

    .paper.count-10 .story-text {
      font-size: 12px;
      line-height: 1.42;
      min-height: 16mm;
    }

    .paper.count-10 .write-row {
      grid-template-columns: 11mm 1fr;
      font-size: 12px;
      gap: 1.5mm;
    }

    .paper.count-10 .big-line {
      height: 7mm;
    }

    .paper.count-10 .sticker-box {
      width: 20mm;
      height: 8mm;
      font-size: 9px;
    }

    .answer-page { margin-top: 16px; }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4mm;
      font-size: 13px;
      margin-top: 8mm;
    }

    .answer-item {
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 3mm;
      line-height: 1.45;
      page-break-inside: avoid;
    }

    .answer-question {
      font-weight: 800;
      margin-bottom: 2mm;
    }

    .answer-result {
      font-weight: 900;
      border-top: 1px dashed #aaa;
      padding-top: 2mm;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .paper {
        transform: scale(0.55);
        transform-origin: top left;
        margin: 0;
      }
      .preview-area { height: 720px; }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white; }
      header, .panel, .preview-wrap > h2, .note, .no-print { display: none !important; }
      .app { max-width: none; padding: 0; }
      .layout { display: block; }
      .preview-wrap { box-shadow: none; padding: 0; border-radius: 0; }
      .preview-area { overflow: visible; padding: 0; background: white; border-radius: 0; }
      .paper {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        transform: none !important;
        transform-origin: initial !important;
      }
      .paper:last-child { page-break-after: auto; }
      .answer-page.hidden-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>文章問題プリントメーカー</h1>
      <div class="subtitle">文章を読んで、式と答えを書くA4プリントを作れます</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>プリント設定</h2>

        <label for="childName">なまえ</label>
        <input id="childName" type="text" placeholder="れい：はる" />

        <label for="titleText">プリント名</label>
        <input id="titleText" type="text" value="文章問題れんしゅうプリント" />

        <div class="row">
          <div>
            <label for="questionType">問題タイプ</label>
            <select id="questionType">
              <option value="add" selected>たし算</option>
              <option value="sub">ひき算</option>
              <option value="mul">かけ算</option>
              <option value="div">わり算</option>
              <option value="shopping">お買い物</option>
              <option value="mix">ミックス</option>
            </select>
          </div>
          <div>
            <label for="level">むずかしさ</label>
            <select id="level">
              <option value="easy" selected>かんたん</option>
              <option value="normal">ふつう</option>
              <option value="hard">むずかしい</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="count">問題数</label>
            <select id="count">
              <option value="4">4問</option>
              <option value="6" selected>6問</option>
              <option value="8">8問</option>
              <option value="10">10問</option>
            </select>
          </div>
          <div>
            <label for="dateText">日付</label>
            <input id="dateText" type="text" placeholder="空欄でもOK" />
          </div>
        </div>

        <div class="checkbox-row">
          <input id="showFurigana" type="checkbox" checked />
          <span>ふりがなを表示する</span>
        </div>

        <div class="checkbox-row">
          <input id="showAnswers" type="checkbox" />
          <span>問題ページに小さく答えを表示</span>
        </div>

        <div class="checkbox-row">
          <input id="printAnswerPage" type="checkbox" checked />
          <span>答えページも作る</span>
        </div>

        <div class="buttons">
          <button class="main-btn" onclick="makeWorksheet()">問題をつくる</button>
          <button class="print-btn" onclick="window.print()">A4で印刷する</button>
          <button class="sub-btn" onclick="resetSettings()">設定をもどす</button>
        </div>

        <div class="note no-print">
          手書きしやすいように、<strong>式</strong> と <strong>答え</strong> の欄を大きめにしています。<br>
          日付は空欄のままでも印刷できます。答えページには問題文・式・答えを表示します。
        </div>
      </section>

      <section class="preview-wrap">
        <h2>プレビュー</h2>
        <div class="preview-area" id="previewArea">
          <section class="paper" id="worksheetPage">
            <div class="title-row">
              <div class="print-title" id="paperTitle">文章問題れんしゅうプリント</div>
              <div class="title-stars">☆☆☆☆☆</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="paperName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="paperDate">　　　　　</span></div>
              <div>シール：<span class="sticker-box">はる</span></div>
            </div>
            <div class="problems" id="problems"></div>
          </section>

          <section class="paper answer-page" id="answerPage">
            <div class="title-row">
              <div class="print-title">こたえ</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="answerName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="answerDate">　　　　　</span></div>
              <div></div>
            </div>
            <div class="answers-grid" id="answers"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THINGS = ["りんご", "みかん", "あめ", "えんぴつ", "シール", "カード", "クッキー", "おはじき", "ビー玉",  "おかし","くつした", "クレヨン", "絵本", "まんが", "はさみ", "おべんとう","本"];
    const PEOPLE = [
  "はるさん",
  "ゆいさん",
  "そうたさん",
  "みおさん",
  "りくさん",
  "ルフィさん",
  "ゾロさん",
  "ナミさん",
  "サンジさん",
  "チョッパーさん",
  "ロビンさん",
  "ウソップさん",
  "フランキーさん",
  "ブルックさん",
  "ジンベエさん",
  "先生",
  "ねこさん",
  "いぬさん",
  "うさぎさん",
  "おさるさん",
  "くまさん",
  "お母さん",
   "おじいちゃん",
    "おばあちゃん",
    "おねえちゃん",
    "いもうと",
    "おにいちゃん",
    "おとうと",
  "お父さん"
];
    const SHOPS = ["パン屋さん", "文ぼうぐ屋さん", "おかし屋さん", "スーパー"];
    const SHOP_ITEMS = ["パン", "ノート", "えんぴつ", "ジュース", "クッキー", "シール", "カード", "おにぎり"];

    let currentProblems = [];

    function todayText() {
      const d = new Date();
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(arr) {
      return arr[rand(0, arr.length - 1)];
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function rangeFor(level) {
      if (level === "easy") return { min: 1, max: 9, addMax: 10, moneyMax: 100, mulMax: 5 };
      if (level === "normal") return { min: 5, max: 30, addMax: 60, moneyMax: 500, mulMax: 9 };
      return { min: 10, max: 99, addMax: 150, moneyMax: 1000, mulMax: 12 };
    }

    function withRuby(text, showFurigana) {
      if (!showFurigana) return escapeHtml(text);
      const map = {
        "文章": "ぶんしょう",
        "問題": "もんだい",
        "何こ": "なんこ",
        "何本": "なんぼん",
        "何円": "なんえん",
        "全部": "ぜんぶ",
        "合計": "ごうけい",
        "残り": "のこり",
        "同じ": "おなじ",
        "数": "かず",
        "分け": "わけ",
        "買いました": "かいました",
        "出しました": "だしました",
        "式": "しき",
        "答え": "こたえ",
        "円": "えん",
        "人": "にん",
        "本": "ほん",
        "何": "なん"
      };

      let result = escapeHtml(text);
      const keys = Object.keys(map).sort((a, b) => b.length - a.length);
      keys.forEach(key => {
        const safeKey = escapeHtml(key);
        const ruby = `<ruby>${safeKey}<rt>${map[key]}</rt></ruby>`;
        result = result.split(safeKey).join(ruby);
      });
      return result;
    }

    function makeAddProblem(level) {
      const r = rangeFor(level);
      let a, b;
      do {
        a = rand(r.min, r.max);
        b = rand(r.min, r.max);
      } while (level === "easy" && a + b > r.addMax);

      const thing = pick(THINGS);
      const person = pick(PEOPLE);
      return {
        text: `${person}は ${thing}を ${a}こ もっています。あとで ${b}こ もらいました。全部で 何こ ありますか。`,
        formula: `${a} + ${b}`,
        answer: `${a + b}こ`
      };
    }

    function makeSubProblem(level) {
      const r = rangeFor(level);
      let a = rand(r.min + 3, r.max + 5);
      let b = rand(r.min, Math.min(a, r.max));
      if (level === "easy") {
        a = rand(5, 10);
        b = rand(1, a - 1);
      }
      const thing = pick(THINGS);
      const person = pick(PEOPLE);
      return {
        text: `${person}は ${thing}を ${a}こ もっていました。${b}こ つかいました。残りは 何こ ですか。`,
        formula: `${a} - ${b}`,
        answer: `${a - b}こ`
      };
    }

    function makeMulProblem(level) {
      const r = rangeFor(level);
      const group = level === "easy" ? rand(2, 5) : rand(2, r.mulMax);
      const each = level === "easy" ? rand(2, 5) : rand(2, r.mulMax);
      const thing = pick(THINGS);
      return {
        text: `${thing}が ${each}こ ずつ 入ったふくろが ${group}ふくろ あります。全部で 何こ ありますか。`,
        formula: `${each} × ${group}`,
        answer: `${each * group}こ`
      };
    }

    function makeDivProblem(level) {
      const r = rangeFor(level);
      const people = level === "easy" ? rand(2, 5) : rand(2, 9);
      const each = level === "easy" ? rand(2, 5) : rand(2, r.mulMax);
      const total = people * each;
      const thing = pick(THINGS);
      return {
        text: `${thing}が ${total}こ あります。${people}人で 同じ数ずつ 分けます。1人分は 何こ ですか。`,
        formula: `${total} ÷ ${people}`,
        answer: `${each}こ`
      };
    }

    function makeShoppingProblem(level) {
      const r = rangeFor(level);
      const item = pick(SHOP_ITEMS);
      const shop = pick(SHOPS);
      const priceUnit = 10;
      const priceMax = r.moneyMax;
      let price = rand(1, Math.floor(priceMax / priceUnit)) * priceUnit;
      if (level === "easy") price = rand(1, 9) * 10;
      const count = level === "easy" ? rand(1, 3) : rand(2, 5);
      const total = price * count;
      return {
        text: `${shop}で ${item}を ${count}こ 買いました。1こ ${price}円 です。合計は 何円 ですか。`,
        formula: `${price} × ${count}`,
        answer: `${total}円`
      };
    }

    function makeOneProblem(type, level) {
      let qType = type;
      if (type === "mix") {
        const types = ["add", "sub", "mul", "div", "shopping"];
        qType = types[rand(0, types.length - 1)];
      }

      if (qType === "sub") return makeSubProblem(level);
      if (qType === "mul") return makeMulProblem(level);
      if (qType === "div") return makeDivProblem(level);
      if (qType === "shopping") return makeShoppingProblem(level);
      return makeAddProblem(level);
    }

    function makeProblemHtml(problem, index, showFurigana, showAnswers) {
      return `
        <div class="problem-number">${index + 1}</div>
        <div class="story-text">${withRuby(problem.text, showFurigana)}</div>
        <div class="write-area">
          <div class="write-row"><span>${withRuby("式", showFurigana)}</span><span class="big-line"></span></div>
          <div class="write-row"><span>${withRuby("答え", showFurigana)}</span><span class="big-line"></span></div>
        </div>
        ${showAnswers ? `<div class="answer-small">しき：${escapeHtml(problem.formula)}　こたえ：${escapeHtml(problem.answer)}</div>` : ""}
      `;
    }

    function makeWorksheet() {
      const childName = document.getElementById("childName").value.trim();
      const titleText = document.getElementById("titleText").value.trim() || "文章問題れんしゅうプリント";
      const questionType = document.getElementById("questionType").value;
      const level = document.getElementById("level").value;
      const count = Number(document.getElementById("count").value);
      const dateText = document.getElementById("dateText").value.trim();
      const showFurigana = document.getElementById("showFurigana").checked;
      const showAnswers = document.getElementById("showAnswers").checked;
      const printAnswerPage = document.getElementById("printAnswerPage").checked;

      const worksheetPage = document.getElementById("worksheetPage");
      worksheetPage.classList.remove("count-4", "count-6", "count-8", "count-10");
      worksheetPage.classList.add(`count-${count}`);

      document.getElementById("paperTitle").textContent = titleText;
      document.getElementById("paperName").textContent = childName || "　　　　　　　　";
      document.getElementById("paperDate").textContent = dateText || "　　　　　";
      document.getElementById("answerName").textContent = childName || "　　　　　　　　";
      document.getElementById("answerDate").textContent = dateText || "　　　　　";

      currentProblems = [];
      for (let i = 0; i < count; i++) {
        currentProblems.push(makeOneProblem(questionType, level));
      }

      const problemsEl = document.getElementById("problems");
      const answersEl = document.getElementById("answers");
      problemsEl.innerHTML = "";
      answersEl.innerHTML = "";

      currentProblems.forEach((p, index) => {
        const problem = document.createElement("div");
        problem.className = "problem";
        problem.innerHTML = makeProblemHtml(p, index, showFurigana, showAnswers);
        problemsEl.appendChild(problem);

        const answer = document.createElement("div");
        answer.className = "answer-item";
        answer.innerHTML = `
          <div class="answer-question">
            ${index + 1}. ${escapeHtml(p.text)}
          </div>
          <div class="answer-result">
            式：${escapeHtml(p.formula)}　　答え：${escapeHtml(p.answer)}
          </div>
        `;
        answersEl.appendChild(answer);
      });

      const answerPage = document.getElementById("answerPage");
      if (printAnswerPage) {
        answerPage.classList.remove("hidden-print");
        answerPage.style.display = "block";
      } else {
        answerPage.classList.add("hidden-print");
        answerPage.style.display = "none";
      }
    }

    function resetSettings() {
      document.getElementById("childName").value = "";
      document.getElementById("titleText").value = "文章問題れんしゅうプリント";
      document.getElementById("questionType").value = "add";
      document.getElementById("level").value = "easy";
      document.getElementById("count").value = "6";
      document.getElementById("dateText").value = "";
      document.getElementById("showFurigana").checked = true;
      document.getElementById("showAnswers").checked = false;
      document.getElementById("printAnswerPage").checked = true;
      makeWorksheet();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dateText").value = "";
      makeWorksheet();
    });
  </script>
</body>
</html>
