<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家族カレンダー">
<meta name="theme-color" content="#5b8dee">
<link rel="manifest" href="/kanriapp/manifest.json">
<link rel="apple-touch-icon" href="/kanriapp/calendar.png">
<title>家族カレンダー</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* ── デザイントークン ── */
  :root {
    --bg: #F6F7F9;
    --surface: #ffffff;
    --surface2: #F0F7F5;
    --border: #E8ECF0;
    --border-light: #F0F3F5;
    --text: #2D3748;
    --text-sub: #8896A5;
    --text-light: #B0BBC5;
    --mint: #4ECBA8;
    --mint-light: #E8F7F3;
    --mint-mid: #A8E6D5;
    --accent: #4ECBA8;
    --accent-soft: rgba(78,203,168,0.15);
    --today-bg: #E8F7F3;
    --today-border: #4ECBA8;
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 22px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
    --shadow: 0 4px 20px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── ログイン画面 ── */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 20px; padding: 32px;
    background: linear-gradient(160deg, #F0F7F5 0%, #F6F7F9 100%);
  }
  #login-screen .logo { font-size: 56px; filter: drop-shadow(0 4px 12px rgba(78,203,168,0.3)); }
  #login-screen h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  #login-screen p { color: var(--text-sub); font-size: 14px; }

  /* ── 表示名設定画面 ── */
  #setup-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 32px;
    background: linear-gradient(160deg, #F0F7F5 0%, #F6F7F9 100%);
  }
  #setup-screen h2 { font-size: 22px; font-weight: 700; color: var(--text); }
  #setup-screen p { color: var(--text-sub); font-size: 13px; text-align: center; line-height: 1.6; }
  .setup-input {
    width: min(360px, 100%); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 14px 18px; font-size: 16px; font-family: inherit;
    background: var(--surface); outline: none; transition: border-color var(--transition);
  }
  .setup-input:focus { border-color: var(--mint); }
  .color-picker-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .color-swatch {
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
    border: 3px solid transparent;
  }
  .color-swatch:hover { transform: scale(1.12); }
  .color-swatch.selected { box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--mint); transform: scale(1.1); }

  /* ── アプリ本体 ── */
  #app { display: block; }

  /* ── ヘッダー ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  /* 矢印・今日ボタン */
  .nav-btn {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    cursor: pointer;
    color: var(--text);
    transition: background var(--transition), transform var(--transition);
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--mint-light); transform: scale(1.05); }
  .nav-btn:active { transform: scale(0.95); }

  /* 今日ボタンだけ少し幅広に */
  .nav-btn#today-btn {
    border-radius: 18px;
    width: auto;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--mint);
  }
  .nav-btn#today-btn:hover { background: var(--mint-light); }

  .month-label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    min-width: 110px;
    text-align: center;
    color: var(--text);
  }

  .spacer { flex: 1; }

  /* iOSセグメントコントロール風 月/週切替 */
  .segment-control {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .segment-control .nav-btn {
    border-radius: 8px;
    width: auto;
    padding: 0 14px;
    height: 30px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    background: transparent;
  }
  .segment-control .nav-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
    transform: none;
  }
  .segment-control .nav-btn:hover:not(.active) { background: rgba(0,0,0,0.03); transform: none; }

  /* アバター */
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: transform var(--transition);
  }
  .avatar:hover { transform: scale(1.08); }

  /* ── 凡例（チップ）── */
  #legend {
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    background: var(--surface2);
    transition: all var(--transition);
    user-select: none;
    color: var(--text);
  }
  .legend-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .legend-item.hidden { opacity: 0.4; background: var(--bg); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-add {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-sub);
    transition: all var(--transition);
  }
  .legend-add:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-light); }

  /* ── 月グリッド ── */
  #month-view { padding: 12px 12px 4px; }

  /* カレンダー全体をカードで囲む */
  .calendar-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .week-header {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    background: var(--surface2);
    padding: 8px 0 6px;
  }
  .week-header div {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }
  .week-header div:first-child { color: #FF7875; }
  .week-header div:last-child  { color: #6B9EFF; }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 1px;
    background: var(--border-light);
  }

  .day-cell {
    background: var(--surface);
    min-height: 82px;
    padding: 5px 4px 4px;
    cursor: pointer;
    overflow: hidden;
    transition: background var(--transition);
    position: relative;
  }
  .day-cell:hover { background: var(--mint-light); }
  .day-cell.other-month { opacity: 0.38; }
  .day-cell.today { background: var(--today-bg); }
  .day-cell.selected-day { background: rgba(78,203,168,0.08); }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    margin-bottom: 2px;
    transition: all var(--transition);
    color: var(--text);
  }
  .day-cell.today .day-num {
    background: var(--mint);
    color: #fff;
    box-shadow: 0 2px 8px rgba(78,203,168,0.4);
  }
  .day-cell.selected-day .day-num {
    background: var(--accent-soft);
    color: var(--mint);
    font-weight: 700;
  }
  .sun .day-num { color: #FF7875; }
  .sat .day-num { color: #6B9EFF; }
  .day-cell.today .day-num { color: #fff !important; }

  /* 予定チップ */
  .event-chip {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 6px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
    opacity: 0.92;
    transition: opacity var(--transition), transform var(--transition);
  }
  .event-chip:hover { opacity: 1; transform: translateX(1px); }
  .more-label {
    font-size: 10px;
    color: var(--text-sub);
    padding-left: 4px;
    font-weight: 500;
  }

  /* ── 週表示 ── */
  #week-view { display: none; padding: 12px; }
  .week-allday-grid { display: grid; grid-template-columns: 44px repeat(7,1fr); gap: 2px; margin-bottom: 6px; background: var(--surface); border-radius: var(--radius); padding: 6px; box-shadow: var(--shadow-sm); }
  .week-allday-label { font-size: 10px; color: var(--text-light); text-align: right; padding-right: 6px; padding-top: 4px; font-weight: 600; }
  .week-allday-col { min-height: 24px; }
  .week-grid { display: grid; grid-template-columns: 44px repeat(7,1fr); gap: 3px; }
  .week-col-header {
    text-align: center; font-size: 12px; padding: 8px 3px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border-light);
  }
  .week-col-header.today { background: var(--today-bg); border-color: var(--today-border); }
  .week-col-header .dow { font-weight: 700; font-size: 10px; color: var(--text-sub); letter-spacing: 0.3px; }
  .week-col-header .dnum { font-size: 16px; font-weight: 700; color: var(--text); }
  .week-col-header.today .dnum { color: var(--mint); }
  .week-time-col { display: flex; flex-direction: column; }
  .time-label { height: 44px; font-size: 10px; color: var(--text-light); text-align: right; padding-right: 6px; padding-top: 2px; }
  .week-day-col { position: relative; background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-sm); }
  .week-day-col.today { background: var(--today-bg); }
  .hour-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border-light); }
  .week-event { position: absolute; left: 2px; right: 2px; border-radius: 6px; padding: 2px 5px; font-size: 10px; color: #fff; overflow: hidden; cursor: pointer; z-index: 2; min-height: 18px; font-weight: 500; }

  /* ── モーダル共通 ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: min(480px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.94) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; color: var(--text); letter-spacing: -0.3px; }
  .frow { margin-bottom: 14px; }
  .frow label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .frow input, .frow select, .frow textarea {
    width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text); outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .frow input:focus, .frow select:focus, .frow textarea:focus {
    border-color: var(--mint);
    box-shadow: 0 0 0 3px var(--accent-soft);
    background: var(--surface);
  }
  .frow textarea { min-height: 60px; resize: vertical; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn {
    padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all var(--transition);
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--mint); color: #fff; box-shadow: 0 4px 12px rgba(78,203,168,0.35); }
  .btn-primary:hover { background: #3AB896; box-shadow: 0 6px 16px rgba(78,203,168,0.45); }
  .btn-danger  { background: #FF7875; color: #fff; }
  .btn-danger:hover { background: #FF5C5A; }
  .btn-ghost   { background: var(--surface2); border: none; color: var(--text-sub); }
  .btn-ghost:hover { background: var(--border); }
  .cb-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text); }
  .cb-row input { width: auto; accent-color: var(--mint); }

  /* ── 詳細モーダル ── */
  .detail-bar { height: 6px; border-radius: 3px; margin-bottom: 14px; }
  .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.3px; }
  .detail-meta { font-size: 13px; color: var(--text-sub); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .detail-desc { font-size: 13px; color: var(--text-sub); white-space: pre-wrap; margin-top: 10px; line-height: 1.6; }
  .google-badge {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
    background: #EEF2FF; color: #5B73E8; border-radius: 8px; padding: 3px 9px; margin-bottom: 10px;
  }

  /* ── ユーザーメニュー ── */
  #user-menu {
    position: absolute; top: 56px; right: 14px; background: var(--surface);
    border: 1px solid var(--border-light); border-radius: var(--radius);
    padding: 6px 0; box-shadow: var(--shadow-lg); z-index: 300; min-width: 180px; display: none;
  }
  #user-menu.open { display: block; animation: modalIn 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .menu-item { padding: 10px 18px; font-size: 13px; cursor: pointer; transition: background var(--transition); color: var(--text); }
  .menu-item:hover { background: var(--surface2); }
  .menu-divider { height: 1px; background: var(--border-light); margin: 4px 0; }
  .menu-name { padding: 10px 18px; font-size: 11px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── 選択日パネル ── */
  #day-panel {
    margin: 0 12px 12px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    min-height: 72px;
    animation: fadeIn 0.2s ease;
  }
  #day-panel-title {
    font-size: 13px; font-weight: 700; color: var(--text-sub);
    margin-bottom: 10px; letter-spacing: 0.3px;
  }
  .day-panel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 6px;
    background: var(--bg); cursor: pointer;
    transition: all var(--transition);
    border: 1px solid transparent;
  }
  .day-panel-item:hover { background: var(--mint-light); border-color: var(--mint-mid); transform: translateX(2px); }
  .day-panel-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .day-panel-time { font-size: 12px; color: var(--text-sub); min-width: 44px; flex-shrink: 0; font-weight: 600; }
  .day-panel-name { font-size: 14px; font-weight: 600; flex: 1; color: var(--text); }
  .day-panel-empty { font-size: 13px; color: var(--text-light); padding: 8px 0; text-align: center; }

  /* 曜日チェック */
  .day-check {
    display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; padding: 5px 9px; cursor: pointer; user-select: none;
    transition: all var(--transition);
  }
  .day-check input { width: auto; }
  .day-check:has(input:checked) { background: var(--mint); color: #fff; border-color: var(--mint); }

  /* リスト */
  .list-type-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    border: 2px solid var(--border); background: var(--bg); color: var(--text-sub);
    transition: all var(--transition);
  }
  .list-type-btn:hover { border-color: var(--mint); color: var(--mint); }
  .list-type-btn.active { background: var(--mint); color: #fff; border-color: var(--mint); }
  .list-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .list-row input[type=text] { flex: 1; border: 2px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; background: var(--surface); transition: border-color var(--transition); }
  .list-row input[type=text]:focus { border-color: var(--mint); outline: none; }
  .list-row-del { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 16px; padding: 0 4px; transition: color var(--transition); }
  .list-row-del:hover { color: #FF7875; }
  .detail-list { margin-top: 12px; }
  .detail-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border-light); }
  .detail-list-item:last-child { border-bottom: none; }
  .detail-list-item input[type=checkbox] { width: auto; cursor: pointer; accent-color: var(--mint); }
  .detail-list-item.checked span { text-decoration: line-through; color: var(--text-light); }
  .detail-bullet::before { content: '・'; color: var(--mint); }

  /* ── FAB ── */
  #fab {
    position: fixed; bottom: 24px; right: 24px; width: 54px; height: 54px;
    border-radius: 50%; background: var(--mint); color: #fff; border: none;
    font-size: 26px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(78,203,168,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 150;
    transition: all var(--transition);
  }
  #fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 28px rgba(78,203,168,0.55); }
  #fab:active { transform: scale(0.95); }

  /* 通知ボタン */
  #notify-permission-btn {
    border: none; border-radius: 18px; padding: 6px 12px;
    font-size: 11px; font-weight: 600; cursor: pointer; color: #fff;
    transition: all var(--transition);
  }
  #notify-permission-btn:hover { transform: scale(1.03); }

  @media (max-width: 580px) {
    .day-cell { min-height: 58px; padding: 3px 2px; }
    .event-chip { font-size: 9px; padding: 1px 4px; }
    .day-num { font-size: 11px; width: 22px; height: 22px; }
    #day-panel { margin: 0 10px 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="logo">📅</div>
  <h1>家族カレンダー</h1>
  <p>Googleアカウントでログインしてください</p>
  <div id="g_signin_btn"></div>
</div>

<div id="setup-screen">
  <div class="logo">👤</div>
  <h2>はじめまして！</h2>
  <p>カレンダーに表示される名前を設定してください<br>本名でなくてもOKです</p>
  <input class="setup-input" id="setup-name" type="text" placeholder="ニックネーム（例: ママ、パパ）" maxlength="20">
  <p style="font-size:13px;color:var(--text-sub)">アバターの色</p>
  <div class="color-picker-row" id="setup-colors"></div>
  <button class="btn btn-primary" style="padding:10px 32px;font-size:15px" onclick="finishSetup()">はじめる</button>
</div>

<div id="app">
  <header>
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <button class="nav-btn" id="today-btn" onclick="goToday()">今日</button>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
    <span class="month-label" id="month-label"></span>
    <div class="spacer"></div>
    <div class="segment-control">

<script>
const API = 'https://calendar-worker.sslowdayss.workers.dev';
const GOOGLE_CLIENT_ID = '17945262543-lgunjio0plc22takcpv29flmvdlo492v.apps.googleusercontent.com';
const PALETTE = ['#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab','#1e88e5','#00acc1','#00897b','#43a047','#f4511e','#fb8c00','#f6bf26'];

let idToken = null, myProfile = null, calendars = [], events = [], gEvents = [];
let hiddenCals = new Set(JSON.parse(localStorage.getItem('hiddenCals') || '[]'));
let currentDate = new Date(), viewMode = 'month', selectedCalColor = PALETTE[0];
let detailEvent = null, selectedDate = null;

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Google-Token': idToken } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
  return res.json();
}

window.onload = () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/kanriapp/service-worker.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleSignIn, auto_select: true });
  google.accounts.id.renderButton(document.getElementById('g_signin_btn'), { theme: 'outline', size: 'large', text: 'signin_with', locale: 'ja' });
  const saved = sessionStorage.getItem('id_token');
  if (saved) { idToken = saved; initApp().catch(() => { sessionStorage.removeItem('id_token'); google.accounts.id.prompt(); }); }
  else google.accounts.id.prompt();
};

async function onGoogleSignIn(response) { idToken = response.credential; sessionStorage.setItem('id_token', idToken); await initApp(); }
async function initApp() { try { myProfile = await api('/me', 'GET'); showApp(); } catch(e) { showSetup(); } }
function signOut() { google.accounts.id.disableAutoSelect(); sessionStorage.removeItem('id_token'); idToken = null; myProfile = null; document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; document.getElementById('user-menu').classList.remove('open'); }

function showSetup() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  const cp = document.getElementById('setup-colors');
  cp.innerHTML = PALETTE.map((c, i) => `<div class="color-swatch${i===0?' selected':''}" style="background:${c}" onclick="selectSetupColor(this,'${c}')"></div>`).join('');
}
function selectSetupColor(el, color) { document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected')); el.classList.add('selected'); selectedCalColor = color; }
async function finishSetup() { const name = document.getElementById('setup-name').value.trim(); if (!name) { alert('名前を入力してください'); return; } myProfile = await api('/me', 'POST', { display_name: name, avatar_color: selectedCalColor }); showApp(); }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const savedToken = sessionStorage.getItem('gapi_token');
  const savedExpire = sessionStorage.getItem('gapi_token_expire');
  if (savedToken && savedExpire && Date.now() < parseInt(savedExpire)) gapiAccessToken = savedToken;
  updateNotifyBtn(); updateAvatar(); loadAll();
}
function updateAvatar() { if (!myProfile) return; const btn = document.getElementById('avatar-btn'); btn.style.background = myProfile.avatar_color; btn.textContent = myProfile.display_name.charAt(0); document.getElementById('menu-name').textContent = myProfile.display_name; }
async function loadAll() { calendars = await api('/calendars'); renderLegend(); await loadEvents(); scheduleNotifications(); }

let gapiReady = false, gapiAccessToken = null;
function loadGapi() {
  return new Promise(resolve => {
    if (gapiReady) { resolve(); return; }
    const s = document.createElement('script'); s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => { gapi.load('client', async () => { await gapi.client.init({}); gapiReady = true; resolve(); }); };
    document.head.appendChild(s);
  });
}
async function fetchGoogleEvents() {
  if (!gapiAccessToken) return;
  try {
    await loadGapi(); gapi.client.setToken({ access_token: gapiAccessToken }); await gapi.client.load('calendar', 'v3');
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    const timeMin = new Date(y, m-1, 1).toISOString(), timeMax = new Date(y, m+2, 0).toISOString();
    const [personalRes, holidayRes] = await Promise.all([
      gapi.client.calendar.events.list({ calendarId: 'primary', timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 500 }),
      gapi.client.calendar.events.list({ calendarId: 'ja.japanese#holiday@group.v.calendar.google.com', timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 100 }).catch(() => ({ result: { items: [] } }))
    ]);
    const personalEvents = (personalRes.result.items || []).map(e => ({ id: 'g_' + e.id, title: e.summary || '（タイトルなし）', description: e.description || '', start_datetime: e.start.dateTime || e.start.date, end_datetime: e.end.dateTime || e.end.date, all_day: !e.start.dateTime, calendar_id: '__google__', color: '#1a73e8', is_google: true }));
    const holidayEvents = (holidayRes.result.items || []).map(e => ({ id: 'gh_' + e.id, title: e.summary || '祝日', description: '', start_datetime: e.start.date, end_datetime: e.end.date, all_day: true, calendar_id: '__holiday__', color: '#e53935', is_google: true, is_holiday: true }));
    gEvents = [...personalEvents, ...holidayEvents]; render();
  } catch(e) { console.warn('Google Calendar fetch error', e); }
}
function requestGoogleCalendarAccess() {
  const saved = sessionStorage.getItem('gapi_token'), expire = sessionStorage.getItem('gapi_token_expire');
  if (saved && expire && Date.now() < parseInt(expire)) { gapiAccessToken = saved; hiddenCals.delete('__google__'); localStorage.setItem('hiddenCals', JSON.stringify([...hiddenCals])); fetchGoogleEvents(); renderLegend(); return; }
  const client = google.accounts.oauth2.initTokenClient({ client_id: GOOGLE_CLIENT_ID, scope: 'https://www.googleapis.com/auth/calendar.readonly', callback: (resp) => { if (resp.access_token) { gapiAccessToken = resp.access_token; const expire = Date.now() + (resp.expires_in - 60) * 1000; sessionStorage.setItem('gapi_token', resp.access_token); sessionStorage.setItem('gapi_token_expire', expire.toString()); hiddenCals.delete('__google__'); localStorage.setItem('hiddenCals', JSON.stringify([...hiddenCals])); fetchGoogleEvents(); renderLegend(); } } });
  client.requestAccessToken();
}

function renderLegend() {
  const leg = document.getElementById('legend'); leg.querySelectorAll('.legend-item').forEach(el => el.remove()); const addBtn = leg.querySelector('.legend-add');
  if (gapiAccessToken) { const hItem = makeLegendItem('__holiday__', '祝日', '#e53935', true); leg.insertBefore(hItem, addBtn); }
  const gItem = makeLegendItem('__google__', 'Googleカレンダー', '#1a73e8', true); leg.insertBefore(gItem, addBtn);
  calendars.forEach(cal => leg.insertBefore(makeLegendItem(cal.id, cal.name, cal.color, false), addBtn));
}
function makeLegendItem(id, name, color, isGoogle) {
  const el = document.createElement('div'); el.className = 'legend-item' + (hiddenCals.has(id) ? ' hidden' : ''); el.style.borderColor = color;
  el.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${name}</span>`;
  if (isGoogle) { el.onclick = () => { if (!gapiAccessToken) { requestGoogleCalendarAccess(); return; } toggleLegend(id, el); }; }

function updateMonthlyType() {

  document.getElementById('ev-monthly-weekday-row').style.display = type === 'monthly_weekday' ? '' : 'none';
}
function updateMonthlyTypeSimple() {
  const type = document.getElementById('ev-monthly-type-simple').value;
  document.getElementById('ev-monthly-weekday-simple-row').style.display = type === 'monthly_weekday' ? '' : 'none';
}

function getRecurrenceData() {
  const type = document.getElementById('ev-recur-type').value;
  if (type === 'none') return { recurrence_type: 'none' };
  let recurrence_type = type, recurrence_interval = 1, recurrence_days = null;
  let recurrence_monthly_type = 'date', recurrence_week_number = null, recurrence_weekday = null;
  if (type === 'custom') {
    recurrence_type = document.getElementById('ev-custom-unit').value;
    recurrence_interval = parseInt(document.getElementById('ev-recur-interval').value) || 1;
    if (recurrence_type === 'weekly') { const checked = [...document.querySelectorAll('#ev-recur-days input:checked')].map(el => el.value); recurrence_days = checked.length > 0 ? checked.join(',') : null; }
    if (recurrence_type === 'monthly') {
      recurrence_monthly_type = document.getElementById('ev-monthly-type').value;
      if (recurrence_monthly_type === 'monthly_weekday') { recurrence_week_number = parseInt(document.getElementById('ev-week-number').value); recurrence_weekday = parseInt(document.getElementById('ev-weekday').value); }
    }
  } else if (type === 'monthly') {
    recurrence_monthly_type = document.getElementById('ev-monthly-type-simple').value;
    if (recurrence_monthly_type === 'monthly_weekday') { recurrence_week_number = parseInt(document.getElementById('ev-week-number-simple').value); recurrence_weekday = parseInt(document.getElementById('ev-weekday-simple').value); }
  }
  const end_type = document.getElementById('ev-recur-end-type').value;
  const recurrence_end_count = end_type === 'count' ? parseInt(document.getElementById('ev-recur-end-count').value) || null : null;
  const recurrence_end_date  = end_type === 'date'  ? document.getElementById('ev-recur-end-date').value || null : null;
  return { recurrence_type, recurrence_interval, recurrence_days, recurrence_monthly_type, recurrence_week_number, recurrence_weekday, recurrence_end_type: end_type, recurrence_end_count, recurrence_end_date };
}

function setRecurrenceForm(ev) {
  const type = ev.recurrence_type || 'none', sel = document.getElementById('ev-recur-type');
  if (['none','daily','weekly','monthly','yearly'].includes(type)) sel.value = type; else sel.value = 'custom';
  if (sel.value === 'custom') {
    document.getElementById('ev-custom-unit').value = type;
    document.getElementById('ev-recur-interval').value = ev.recurrence_interval || 1;
    if (ev.recurrence_days) { const days = ev.recurrence_days.split(','); document.querySelectorAll('#ev-recur-days input').forEach(el => { el.checked = days.includes(el.value); }); }
    if (type === 'monthly' && ev.recurrence_monthly_type) {
      document.getElementById('ev-monthly-type').value = ev.recurrence_monthly_type;
      if (ev.recurrence_monthly_type === 'monthly_weekday') { document.getElementById('ev-week-number').value = ev.recurrence_week_number ?? 1; document.getElementById('ev-weekday').value = ev.recurrence_weekday ?? 1; }
    }
    updateCustomUnitLabel();
  } else if (type === 'monthly') {
    const mtype = ev.recurrence_monthly_type || 'date';
    document.getElementById('ev-monthly-type-simple').value = mtype;
    if (mtype === 'monthly_weekday') { document.getElementById('ev-week-number-simple').value = ev.recurrence_week_number ?? 1; document.getElementById('ev-weekday-simple').value = ev.recurrence_weekday ?? 1; }
  }
  const endType = ev.recurrence_end_type || 'none';
  document.getElementById('ev-recur-end-type').value = endType;
  if (ev.recurrence_end_count) document.getElementById('ev-recur-end-count').value = ev.recurrence_end_count;
  if (ev.recurrence_end_date)  document.getElementById('ev-recur-end-date').value  = ev.recurrence_end_date;
  toggleRecurrenceEnd(); toggleRecurrence();
}

// 選択日パネル
function renderDayPanel(ds) {
  selectedDate = ds; const d = new Date(ds), DAYS = ['日','月','火','水','木','金','土'];
  document.getElementById('day-panel-title').textContent = `${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;
  // 選択日ハイライト
  document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected-day'));
  document.querySelectorAll('.day-cell').forEach(el => { if (el.dataset.date === ds) el.classList.add('selected-day'); });
  const ae = allEvents().filter(e => evOnDate(e, ds)), list = document.getElementById('day-panel-list');
  if (ae.length === 0) { list.innerHTML = '<div class="day-panel-empty">予定はありません</div>'; return; }
  ae.sort((a, b) => (a.start_datetime || '') < (b.start_datetime || '') ? -1 : 1);
  list.innerHTML = ae.map(e => { const color = getColor(e), time = e.all_day ? '終日' : (e.start_datetime || '').slice(11, 16); return `<div class="day-panel-item" onclick="openDetail(${JSON.stringify(e).replace(/"/g,'&quot;')})"><div class="day-panel-dot" style="background:${color}"></div><div class="day-panel-time">${time}</div><div class="day-panel-name">${e.title}</div></div>`; }).join('');
}

// 通知
let notifyTimers = [];
async function requestNotifyPermission() {
  if (!('Notification' in window)) { alert('このブラウザ（Safari/iOS）はWeb通知に対応していません。\nPWAとしてホーム画面に追加すると通知が使えるようになります。'); return; }
  const result = await Notification.requestPermission();
  if (result === 'granted') { alert('通知を許可しました！'); scheduleNotifications(); } else { alert('通知が拒否されました。ブラウザの設定から許可してください。'); }
  updateNotifyBtn();
}
function updateNotifyBtn() { const btn = document.getElementById('notify-permission-btn'); if (!btn) return; if (!('Notification' in window)) { btn.style.display = 'none'; return; } if (Notification.permission === 'granted') { btn.textContent = '🔔 通知オン'; btn.style.background = '#43a047'; } else { btn.textContent = '🔕 通知を許可する'; btn.style.background = '#fb8c00'; } }
async function scheduleNotifications() {
  notifyTimers.forEach(t => clearTimeout(t)); notifyTimers = [];
  if (!('Notification' in window)) return; if (Notification.permission !== 'granted') return;
  const now = Date.now(), sw = navigator.serviceWorker?.controller;
  events.forEach(e => {
    if (e.all_day) return; const nb = e.notify_before ?? -1; if (nb === -1) return;
    const startTime = new Date(e.start_datetime).getTime(), notifyTime = startTime - nb * 60 * 1000, diff = notifyTime - now;
    if (diff < 0 || diff > 7 * 24 * 60 * 60 * 1000) return;
    const label = nb === 0 ? '開始時刻です' : `${nb >= 60 ? nb/60+'時間' : nb+'分'}前です`, title = `📅 ${e.title}`, body = `${label} ${fmtDt(e.start_datetime, false)}`;
    if (sw) sw.postMessage({ type: 'SCHEDULE_NOTIFICATION', title, body, delay: diff });
    else { const timer = setTimeout(() => { new Notification(title, { body, icon: '/kanriapp/calendar.png' }); }, diff); notifyTimers.push(timer); }
  });
}
