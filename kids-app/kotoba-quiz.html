<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ことばクイズ🌟</title>

<link rel="apple-touch-icon" href="img/kotobaquiz.png">
<link rel="icon" type="image/png" href="img/kotobaquiz.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ことばクイズ">
<meta name="theme-color" content="#FFFBF0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --yoji-color: #FF6B6B;
    --yoji-light: #FFE5E5;
    --yoji-dark: #C0392B;
    --kotowaza-color: #4ECDC4;
    --kotowaza-light: #E0F7F5;
    --kotowaza-dark: #1A9B93;
    --kanyoku-color: #FFD93D;
    --kanyoku-light: #FFF8DC;
    --kanyoku-dark: #C4A000;
    --bg: #FFFBF0;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --shadow: 0 6px 0 rgba(0,0,0,0.12);
    --radius: 20px;
    --active-color: #FF6B6B;
    --active-light: #FFE5E5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(78,205,196,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,217,61,0.06) 0%, transparent 60%);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .top-header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .app-title {
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .app-title .star {
    display: inline-block;
    animation: spin 3s linear infinite;
  }

  .app-subtitle {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    color: #777;
    font-weight: 500;
  }

  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .section-label {
    font-size: 1rem;
    font-weight: 700;
    color: #555;
    text-align: center;
    margin: 24px 0 12px;
    letter-spacing: 0.05em;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 8px;
  }

  .mode-card {
    border: none;
    border-radius: var(--radius);
    padding: 20px 8px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
    line-height: 1.4;
    position: relative;
  }

  .mode-card:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
  }

  .mode-card .mode-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
  }

  .mode-card.yoji { background: var(--yoji-light); color: var(--yoji-dark); }
  .mode-card.kotowaza { background: var(--kotowaza-light); color: var(--kotowaza-dark); }
  .mode-card.kanyoku { background: var(--kanyoku-light); color: var(--kanyoku-dark); }

  .mode-card.selected::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 1.1rem;
    font-weight: 900;
  }

  .mode-card.yoji.selected {
    background: var(--yoji-color);
    color: white;
    box-shadow: 0 6px 0 var(--yoji-dark);
  }

  .mode-card.kotowaza.selected {
    background: var(--kotowaza-color);
    color: white;
    box-shadow: 0 6px 0 var(--kotowaza-dark);
  }

  .mode-card.kanyoku.selected {
    background: var(--kanyoku-color);
    color: white;
    box-shadow: 0 6px 0 var(--kanyoku-dark);
  }

  .quiz-type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }

  .quiz-type-card {
    border: 3px solid #E8E0D0;
    border-radius: var(--radius);
    padding: 18px 12px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    text-align: center;
    background: white;
    transition: transform 0.15s, box-shadow 0.15s;
    line-height: 1.5;
  }

  .quiz-type-card:active {
    transform: translateY(2px);
  }

  .quiz-type-card .qt-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
  }

  .quiz-type-card.selected {
    border-color: var(--active-color);
    background: var(--active-light);
    color: var(--active-color);
  }

  .start-btn-wrap {
    text-align: center;
    margin-top: 24px;
  }

  .start-btn {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 18px 48px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.3rem);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #C0392B;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.05em;
  }

  .start-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #C0392B;
  }

  .start-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 600px;
    margin: 0 auto 16px;
  }

  .back-btn {
    background: white;
    border: 2px solid #E0D8CC;
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    color: #555;
  }

  .progress-wrap {
    flex: 1;
    margin: 0 12px;
  }

  .progress-bar-bg {
    background: #E8E0D0;
    border-radius: 10px;
    height: 14px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #FF6B6B, #FFD93D);
  }

  .progress-text {
    text-align: center;
    font-size: 0.8rem;
    color: #888;
    margin-top: 4px;
    font-weight: 700;
  }

  .score-badge {
    background: white;
    border: 2px solid #E0D8CC;
    border-radius: 50px;
    padding: 8px 14px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #555;
    white-space: nowrap;
  }

  .quiz-card {
    background: white;
    border-radius: var(--radius);
    padding: clamp(20px, 5vw, 32px);
    max-width: 600px;
    margin: 0 auto;
    box-shadow: var(--shadow);
    border-top: 6px solid var(--active-color);
  }

  .type-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 16px;
    background: var(--active-light);
    color: var(--active-color);
  }

  .question-label {
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    color: #888;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .question-main {
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 6px;
    color: #1A1A1A;
  }

  .question-reading {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    color: #888;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .question-body {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    line-height: 1.6;
    background: #F8F4EC;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    color: #333;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .choice-btn {
    background: white;
    border: 3px solid #E8E0D0;
    border-radius: 16px;
    padding: clamp(12px, 3vw, 18px) 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 0 #E0D8CC;
    position: relative;
  }

  .choice-btn:not(:disabled):active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #E0D8CC;
  }

  .choice-btn:not(:disabled):hover {
    border-color: var(--active-color);
    background: var(--active-light);
  }

  .choice-btn .choice-num {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #F0E8D8;
    color: #888;
    font-size: 0.8rem;
    font-weight: 900;
    text-align: center;
    line-height: 24px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .choice-btn.correct {
    border-color: #2ECC71;
    background: #EAFAF1;
    box-shadow: 0 4px 0 #27AE60;
  }

  .choice-btn.correct .choice-num {
    background: #2ECC71;
    color: white;
  }

  .choice-btn.wrong {
    border-color: #E74C3C;
    background: #FDEDEC;
    box-shadow: 0 4px 0 #C0392B;
    opacity: 0.7;
  }

  .choice-btn:disabled {
    cursor: default;
  }

  .feedback {
    text-align: center;
    padding: 16px;
    border-radius: 16px;
    margin-top: 16px;
    font-size: clamp(1rem, 3.5vw, 1.1rem);
    font-weight: 700;
    display: none;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .feedback.correct {
    background: #EAFAF1;
    color: #1E8449;
    display: block;
  }

  .feedback.wrong {
    background: #FDEDEC;
    color: #C0392B;
    display: block;
  }

  .feedback-icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 6px;
  }

  .feedback-answer {
    font-size: 0.9rem;
    margin-top: 8px;
    color: #555;
    font-weight: 500;
  }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .next-btn {
    width: 100%;
    max-width: 600px;
    margin: 16px auto 0;
    background: linear-gradient(135deg, #4ECDC4, #44b5ad);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #1A9B93;
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }

  .next-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #1A9B93;
  }

  .next-btn.visible {
    display: block;
  }

  .result-screen {
    text-align: center;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 0;
  }

  .result-emoji {
    font-size: 5rem;
    display: block;
    margin-bottom: 16px;
    animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes bounceIn {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .result-title {
    font-size: clamp(1.5rem, 6vw, 2rem);
    font-weight: 900;
    margin-bottom: 8px;
  }

  .result-score-big {
    font-size: clamp(3rem, 12vw, 4.5rem);
    font-weight: 900;
    color: var(--active-color);
    line-height: 1;
    margin: 16px 0;
  }

  .result-score-big span {
    font-size: 0.45em;
    color: #888;
    vertical-align: middle;
  }

  .result-message {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    color: #555;
    margin-bottom: 24px;
    line-height: 1.6;
    white-space: pre-line;
  }

  .result-details {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    text-align: left;
  }

  .result-details h3 {
    font-size: 1rem;
    color: #888;
    margin-bottom: 12px;
    text-align: center;
    font-weight: 700;
  }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed #F0E8D8;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .result-item:last-child {
    border-bottom: none;
  }

  .result-item-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .result-item-word {
    font-weight: 700;
    color: #333;
  }

  .result-item-meaning {
    color: #666;
    font-size: 0.85rem;
  }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .retry-btn {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #C0392B;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .retry-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #C0392B;
  }

  .home-btn {
    background: white;
    color: #555;
    border: 3px solid #E0D8CC;
    border-radius: 16px;
    padding: 15px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .home-btn:active {
    transform: translateY(2px);
  }

  .stars-bg {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }

  .star-particle {
    position: absolute;
    font-size: 1.5rem;
    animation: floatStar 3s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes floatStar {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(180deg); }
  }

  @media (max-width: 400px) {
    .choices {
      grid-template-columns: 1fr;
    }

    .mode-grid {
      gap: 8px;
    }
  }

  body[data-mode="四字熟語"] {
    --active-color: var(--yoji-color);
    --active-light: var(--yoji-light);
  }

  body[data-mode="ことわざ"] {
    --active-color: var(--kotowaza-color);
    --active-light: var(--kotowaza-light);
  }

  body[data-mode="慣用句"] {
    --active-color: var(--kanyoku-color);
    --active-light: var(--kanyoku-light);
  }
</style>
</head>

<body>

<div id="screen-top" class="screen active">
  <div class="top-header">
    <div class="app-title">
      ことばクイズ<span class="star">🌟</span>
    </div>
    <div class="app-subtitle">よみかた・いみを おぼえよう！</div>
  </div>

  <div class="section-label">📚 もんだいのしゅるいをえらぼう</div>
  <div class="mode-grid">
    <button class="mode-card yoji" onclick="selectMode('四字熟語')">
      <span class="mode-icon">🎴</span>
      四字熟語
    </button>

    <button class="mode-card kotowaza" onclick="selectMode('ことわざ')">
      <span class="mode-icon">🌿</span>
      ことわざ
    </button>

    <button class="mode-card kanyoku" onclick="selectMode('慣用句')">
      <span class="mode-icon">💬</span>
      慣用句
    </button>
  </div>

  <div class="section-label">🎮 もんだいのかたちをえらぼう</div>
  <div class="quiz-type-grid">
    <button class="quiz-type-card" onclick="selectQuizType('meaning', this)">
      <span class="qt-icon">🔍</span>
      いみを<br>えらぶクイズ
    </button>

    <button class="quiz-type-card" onclick="selectQuizType('word', this)">
      <span class="qt-icon">✍️</span>
      ことばを<br>えらぶクイズ
    </button>
  </div>

  <div class="start-btn-wrap">
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
      🚀 スタート！
    </button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← もどる</button>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progress-text">1 / 10</div>
    </div>

    <div class="score-badge">⭐ <span id="score-display">0</span>てん</div>
  </div>

  <div class="quiz-card" id="quiz-card">
    <span class="type-badge" id="type-badge">四字熟語</span>
    <div class="question-label" id="question-label">つぎのことばの「いみ」はどれ？</div>
    <div class="question-main" id="question-main"></div>
    <div class="question-reading" id="question-reading"></div>
    <div class="question-body" id="question-body" style="display:none"></div>
    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedback-icon"></span>
      <span id="feedback-text"></span>
      <div class="feedback-answer" id="feedback-answer"></div>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎの もんだいへ →</button>
</div>

<div id="screen-result" class="screen">
  <div class="stars-bg" id="stars-bg"></div>

  <div class="result-screen">
    <span class="result-emoji" id="result-emoji">🎉</span>
    <div class="result-title" id="result-title">けっか発表！</div>

    <div class="result-score-big" id="result-score-big">
      10<span>/ 10もん せいかい</span>
    </div>

    <div class="result-message" id="result-message"></div>

    <div class="result-details" id="result-details">
      <h3>📝 まちがえた もんだい</h3>
      <div id="wrong-list"></div>
    </div>

    <div class="result-btns">
      <button class="retry-btn" onclick="startQuiz()">🔄 もう一度 あそぶ</button>
      <button class="home-btn" onclick="goHome()">🏠 トップに もどる</button>
    </div>
  </div>
</div>

<!-- ここで外部データを読み込みます。kotoba-data.js は同じ場所に置いてください -->
<script src="kotoba-data.js"></script>

<script>
let selectedMode = null;
let selectedQuizType = null;
let questions = [];
let currentIndex = 0;
let score = 0;
let wrongItems = [];
let answered = false;

function selectMode(mode) {
  selectedMode = mode;
  document.body.setAttribute('data-mode', mode);

  document.querySelectorAll('.mode-card').forEach(btn => {
    btn.classList.remove('selected');
  });

  const modeMap = {
    '四字熟語': 'yoji',
    'ことわざ': 'kotowaza',
    '慣用句': 'kanyoku'
  };

  document.querySelector(`.mode-card.${modeMap[mode]}`).classList.add('selected');
  updateStartBtn();
}

function selectQuizType(type, button) {
  selectedQuizType = type;

  document.querySelectorAll('.quiz-type-card').forEach(btn => {
    btn.classList.remove('selected');
  });

  button.classList.add('selected');
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('start-btn').disabled = !(selectedMode && selectedQuizType);
}

function startQuiz() {
  if (typeof DATA === 'undefined') {
    alert('データファイル kotoba-data.js が読み込めていません。');
    return;
  }

  const pool = DATA.filter(d => d.type === selectedMode);

  if (pool.length < 4) {
    alert(selectedMode + ' のデータが4個以上必要です。kotoba-data.js を確認してください。');
    return;
  }

  questions = shuffle([...pool]).slice(0, Math.min(10, pool.length));
  currentIndex = 0;
  score = 0;
  wrongItems = [];
  answered = false;

  showScreen('quiz');
  loadQuestion();
}

function loadQuestion() {
  answered = false;

  const q = questions[currentIndex];
  const total = questions.length;

  document.getElementById('progress-bar').style.width = `${(currentIndex / total) * 100}%`;
  document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('score-display').textContent = score;

  document.getElementById('type-badge').textContent = q.type;
  document.getElementById('next-btn').classList.remove('visible');

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  if (selectedQuizType === 'meaning') {
    document.getElementById('question-label').textContent = 'つぎのことばの「いみ」はどれ？';
    document.getElementById('question-main').textContent = q.word;
    document.getElementById('question-reading').textContent = q.reading;
    document.getElementById('question-body').style.display = 'none';
    document.getElementById('question-body').textContent = '';
    buildChoices(q, 'meaning');
  } else {
    document.getElementById('question-label').textContent = 'つぎの「いみ」にあうことばはどれ？';
    document.getElementById('question-main').textContent = '';
    document.getElementById('question-reading').textContent = '';
    document.getElementById('question-body').style.display = 'block';
    document.getElementById('question-body').textContent = q.meaning;
    buildChoices(q, 'word');
  }
}

function buildChoices(correct, type) {
  const pool = DATA.filter(d => d.type === selectedMode && d.word !== correct.word);
  const wrongs = shuffle(pool).slice(0, 3);
  const all = shuffle([correct, ...wrongs]);

  const container = document.getElementById('choices');
  container.innerHTML = '';

  all.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';

    const isCorrect = item.word === correct.word;
    const label = type === 'meaning' ? item.meaning : item.word;

    btn.innerHTML = `<span class="choice-num">${i + 1}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, isCorrect, correct, type);

    container.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, correct, type) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const correctAnswer = type === 'meaning' ? correct.meaning : correct.word;

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score-display').textContent = score;
    showFeedback(true, '', correct);
  } else {
    btn.classList.add('wrong');

    allBtns.forEach(b => {
      if (b.textContent.includes(correctAnswer)) {
        b.classList.add('correct');
      }
    });

    wrongItems.push(correct);
    showFeedback(false, correctAnswer, correct);
  }

  document.getElementById('next-btn').classList.add('visible');
}

function showFeedback(isCorrect, correctAnswer, item) {
  const fb = document.getElementById('feedback');
  const icon = document.getElementById('feedback-icon');
  const text = document.getElementById('feedback-text');
  const ans = document.getElementById('feedback-answer');

  if (isCorrect) {
    fb.className = 'feedback correct';
    icon.textContent = '⭕';
    text.textContent = 'せいかい！すごい！';
    ans.textContent = '';
  } else {
    fb.className = 'feedback wrong';
    icon.textContent = '❌';
    text.textContent = 'ざんねん…';
    ans.innerHTML = `せいかいは「${item.word}（${item.reading}）」<br>${item.meaning}`;
  }
}

function nextQuestion() {
  currentIndex++;

  if (currentIndex >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  const total = questions.length;
  showScreen('result');

  let emoji, title, msg;
  const pct = score / total;

  if (pct === 1) {
    emoji = '🏆';
    title = 'パーフェクト！！';
    msg = 'ぜんもんせいかい！\nすばらしい！';
  } else if (pct >= 0.8) {
    emoji = '🎉';
    title = 'すごい！';
    msg = 'とても上手にできました！\nもう少しで完璧！';
  } else if (pct >= 0.6) {
    emoji = '😊';
    title = 'よくできました！';
    msg = 'なかなか良い成績です！\nもう一度やってみよう！';
  } else if (pct >= 0.4) {
    emoji = '💪';
    title = 'がんばれ！';
    msg = 'もう少し練習しよう！\nきっとできるよ！';
  } else {
    emoji = '📖';
    title = 'もう一度！';
    msg = 'いっしょうけんめい練習して\nまたチャレンジしよう！';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score-big').innerHTML = `${score}<span>/ ${total}もん せいかい</span>`;
  document.getElementById('result-message').textContent = msg;

  const wrongList = document.getElementById('wrong-list');
  const details = document.getElementById('result-details');

  if (wrongItems.length === 0) {
    details.style.display = 'none';
  } else {
    details.style.display = 'block';

    wrongList.innerHTML = wrongItems.map(item =>
      `<div class="result-item">
        <span class="result-item-icon">❌</span>
        <div>
          <div class="result-item-word">${item.word}（${item.reading}）</div>
          <div class="result-item-meaning">${item.meaning}</div>
        </div>
      </div>`
    ).join('');
  }

  if (pct >= 0.6) {
    const starsEl = document.getElementById('stars-bg');
    const emojis = ['⭐','🌟','✨','🎊','🎉'];

    starsEl.innerHTML = Array.from({length: 12}, () => {
      const e = emojis[Math.floor(Math.random() * emojis.length)];
      const left = Math.random() * 100;
      const delay = Math.random() * 2;
      const dur = 2 + Math.random() * 2;
      const top = 10 + Math.random() * 80;

      return `<div class="star-particle" style="left:${left}%;top:${top}%;animation-delay:${delay}s;animation-duration:${dur}s">${e}</div>`;
    }).join('');
  }
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });

  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('top');
  document.getElementById('stars-bg').innerHTML = '';
}

function shuffle(arr) {
  const a = [...arr];

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}
