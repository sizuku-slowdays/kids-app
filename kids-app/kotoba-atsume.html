<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ことばあつめゲーム</title>

<link rel="apple-touch-icon" href="img/kotoba-atsume.png">
<link rel="icon" type="image/png" href="img/kotoba-atsume.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ことばあつめ">
<meta name="theme-color" content="#fff7d6">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #fff7d6 0%, #ffe6f0 48%, #e6f7ff 100%);
  color: #333;
  text-align: center;
  padding: 18px;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

h1 {
  font-size: clamp(30px, 8vw, 46px);
  color: #ff8a00;
  text-shadow: 2px 2px 0 #fff;
  margin: 18px 0 8px;
}

.subtitle {
  font-size: 17px;
  color: #666;
  margin-bottom: 22px;
}

.card,
.quiz-card {
  max-width: 620px;
  margin: 0 auto;
  background: rgba(255,255,255,0.94);
  border-radius: 30px;
  padding: 22px 16px;
  border: 4px solid #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 18px;
}

.mode-btn {
  border: none;
  border-radius: 24px;
  padding: 20px 8px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.16);
  color: #fff;
  line-height: 1.4;
}

.mode-btn.sound {
  background: linear-gradient(135deg, #7fdc82, #32b768);
}

.mode-btn.opposite {
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
}

.mode-btn.group {
  background: linear-gradient(135deg, #ffb347, #ff8a00);
}

.mode-btn.challenge {
  background: linear-gradient(135deg, #ff9a9e, #ff6b6b);
}

.mode-btn:active,
.choice-btn:active,
.big-btn:active,
.small-btn:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.16);
}

.note {
  margin-top: 18px;
  font-size: 14px;
  color: #777;
  line-height: 1.6;
}

.top-bar {
  max-width: 620px;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.small-btn {
  border: none;
  border-radius: 18px;
  background: #fff;
  color: #555;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: bold;
  box-shadow: 0 4px 0 rgba(0,0,0,0.12);
  cursor: pointer;
}

.status {
  flex: 1;
  background: #fff;
  border-radius: 18px;
  padding: 10px;
  font-size: 15px;
  font-weight: bold;
  color: #555;
  box-shadow: 0 4px 0 rgba(0,0,0,0.08);
}

.type-label {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 17px;
  font-weight: bold;
  background: #fff3b0;
  color: #8a6500;
  margin-bottom: 14px;
}

.question-box {
  background: #fffaf0;
  border: 3px dashed #ffd36e;
  border-radius: 24px;
  padding: 22px 14px;
  margin-bottom: 18px;
}

.question-text {
  font-size: clamp(23px, 6vw, 34px);
  font-weight: bold;
  line-height: 1.5;
  color: #333;
}

.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 540px;
  margin: 0 auto;
}

.choice-btn {
  border: 3px solid #e8e0d0;
  border-radius: 20px;
  background: #fff;
  padding: 18px 8px;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 0 #e0d8cc;
  color: #333;
  min-height: 78px;
}

.choice-btn.correct {
  border-color: #32b768;
  background: #e8ffe8;
  box-shadow: 0 5px 0 #279950;
}

.choice-btn.wrong {
  border-color: #ff6b6b;
  background: #fff0f0;
  box-shadow: 0 5px 0 #d94848;
}

.choice-btn:disabled {
  cursor: default;
}

.feedback {
  min-height: 72px;
  margin: 14px auto 10px;
  padding: 14px;
  max-width: 540px;
  border-radius: 22px;
  font-size: 22px;
  font-weight: bold;
  display: none;
}

.feedback.correct {
  display: block;
  background: #e8ffe8;
  color: #1e8f3a;
}

.feedback.wrong {
  display: block;
  background: #fff0f0;
  color: #d33;
}

.feedback .small {
  display: block;
  margin-top: 6px;
  font-size: 15px;
  color: #555;
  font-weight: normal;
  line-height: 1.5;
}

.big-btn {
  width: 100%;
  max-width: 420px;
  border: none;
  border-radius: 24px;
  padding: 17px 18px;
  font-size: 23px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.18);
  margin: 10px auto 0;
  display: block;
}

.next-btn {
  background: linear-gradient(135deg, #7fdc82, #32b768);
  display: none;
}

.next-btn.show {
  display: block;
}

.orange-btn {
  background: linear-gradient(135deg, #ffb347, #ff8a00);
}

.result-emoji {
  font-size: 72px;
  margin-bottom: 12px;
}

.result-title {
  font-size: 32px;
  color: #ff8a00;
  font-weight: bold;
  margin-bottom: 12px;
}

.result-score {
  font-size: 48px;
  font-weight: bold;
  color: #ff6b6b;
  margin: 10px 0;
}

.result-message {
  font-size: 18px;
  line-height: 1.7;
  color: #555;
  margin-bottom: 18px;
}

@media (max-width: 420px) {
  .mode-grid {
    gap: 10px;
  }

  .mode-btn {
    font-size: 18px;
    padding: 18px 6px;
  }

  .choices {
    grid-template-columns: 1fr;
  }

  .choice-btn {
    min-height: 66px;
  }
}
</style>
</head>

<body>

<div id="screen-top" class="screen active">
  <h1>ことばあつめゲーム</h1>
  <p class="subtitle">ことばのちからを のばそう！</p>

  <div class="card">
    <p style="font-size:20px; font-weight:bold;">どのゲームで あそぶ？</p>

    <div class="mode-grid">
      <button class="mode-btn sound" onclick="startQuiz('はじまりの音')">
        🌱 はじまり<br>の音
      </button>

      <button class="mode-btn opposite" onclick="startQuiz('はんたいことば')">
        🔄 はんたい<br>ことば
      </button>

      <button class="mode-btn group" onclick="startQuiz('なかま分け')">
        🍎 なかま<br>分け
      </button>

      <button class="mode-btn challenge" onclick="startQuiz('チャレンジ')">
        🚀 チャレンジ<br>ぜんぶ
      </button>
    </div>

    <p class="note">
      10もんチャレンジ！<br>
      よく考えて、ことばをえらぼう。
    </p>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="top-bar">
    <button class="small-btn" onclick="goHome()">← もどる</button>
    <div class="status">
      <span id="q-count">1 / 10</span>　⭐ <span id="score">0</span>てん
    </div>
  </div>

  <div class="quiz-card">
    <div class="type-label" id="type-label">はじまりの音</div>

    <div class="question-box">
      <div class="question-text" id="question-text"></div>
    </div>

    <div class="choices" id="choices"></div>

    <div id="feedback" class="feedback"></div>

    <button id="next-btn" class="big-btn next-btn" onclick="nextQuestion()">つぎの もんだいへ</button>
  </div>
</div>

<div id="screen-result" class="screen">
  <h1>けっか</h1>

  <div class="card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">よくできました！</div>
    <div class="result-score">
      <span id="final-score">0</span> / 10
    </div>
    <div class="result-message" id="result-message"></div>

    <button class="big-btn orange-btn" onclick="restartSameMode()">もう一度 あそぶ</button>
    <button class="big-btn next-btn show" onclick="goHome()">トップに もどる</button>
  </div>
</div>

const TOTAL_QUESTIONS = 10;

let selectedMode = "はじまりの音";
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;

const modeNames = {
  "はじまりの音": "はじまりの音",
  "はんたいことば": "はんたいことば",
  "なかま分け": "なかま分け",
  "チャレンジ": "チャレンジ"
};

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });

  document.getElementById("screen-" + name).classList.add("active");
  window.scrollTo(0, 0);
}

function startQuiz(mode) {
  selectedMode = mode;
  currentIndex = 0;
  score = 0;
  answered = false;

  let pool;

  if (selectedMode === "チャレンジ") {
    pool = [...QUESTIONS];
  } else {
    pool = QUESTIONS.filter(q => q.type === selectedMode);
  }

  currentQuestions = shuffle(pool).slice(0, TOTAL_QUESTIONS);

  showScreen("quiz");
  loadQuestion();
}

function restartSameMode() {
  startQuiz(selectedMode);
}

function goHome() {
  showScreen("top");
}

function loadQuestion() {
  answered = false;

  const q = currentQuestions[currentIndex];

  document.getElementById("q-count").textContent = (currentIndex + 1) + " / " + TOTAL_QUESTIONS;
  document.getElementById("score").textContent = score;
  document.getElementById("type-label").textContent = selectedMode === "チャレンジ" ? q.type : modeNames[selectedMode];
  document.getElementById("question-text").textContent = q.question;

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").innerHTML = "";

  document.getElementById("next-btn").classList.remove("show");

  const choices = shuffle(q.choices);
  const container = document.getElementById("choices");
  container.innerHTML = "";

  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(btn, choice, q);
    container.appendChild(btn);
  });
}

function checkAnswer(button, selected, question) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll(".choice-btn");

  buttons.forEach(btn => {
    btn.disabled = true;

    if (btn.textContent === question.answer) {
      btn.classList.add("correct");
    }
  });

  if (selected === question.answer) {
    score++;
    document.getElementById("score").textContent = score;
    button.classList.add("correct");
    showFeedback("correct", "⭕ せいかい！<span class='small'>" + question.explanation + "</span>");
  } else {
    button.classList.add("wrong");
    showFeedback(
      "wrong",
      "❌ もういちど！<span class='small'>こたえは「" + question.answer + "」だよ。<br>" + question.explanation + "</span>"
    );
  }

  if (currentIndex + 1 >= TOTAL_QUESTIONS) {
    document.getElementById("next-btn").textContent = "けっかをみる";
  } else {
    document.getElementById("next-btn").textContent = "つぎの もんだいへ";
  }

  document.getElementById("next-btn").classList.add("show");
}

function showFeedback(type, message) {
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + type;
  feedback.innerHTML = message;
}

function nextQuestion() {
  currentIndex++;

  if (currentIndex >= TOTAL_QUESTIONS) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  showScreen("result");

  document.getElementById("final-score").textContent = score;

  const emoji = document.getElementById("result-emoji");
  const title = document.getElementById("result-title");
  const message = document.getElementById("result-message");

  if (score === 10) {
    emoji.textContent = "🏆";
    title.textContent = "パーフェクト！";
    message.innerHTML = "ぜんぶ せいかい！<br>ことばマスターだね！";
  } else if (score >= 8) {
    emoji.textContent = "🎉";
    title.textContent = "すごい！";
    message.innerHTML = "とても よくできました！<br>もうすこしで パーフェクト！";
  } else if (score >= 5) {
    emoji.textContent = "😊";
    title.textContent = "よくできたね！";
    message.innerHTML = "半分以上できたよ！<br>もう一回やってみよう！";
  } else {
    emoji.textContent = "💪";
    title.textContent = "もう一回！";
    message.innerHTML = "れんしゅうすれば だいじょうぶ！<br>ゆっくり がんばろう！";
  }
}

function shuffle(arr) {
  const a = [...arr];

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}
