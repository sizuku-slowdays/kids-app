<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんじ書き順マスター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Kosugi+Maru&display=swap');

  :root {
    --sky: #eef6ff;
    --blue: #3b82f6;
    --blue-dark: #1d4ed8;
    --coral: #f97316;
    --coral-light: #fed7aa;
    --green: #22c55e;
    --green-dark: #15803d;
    --white: #ffffff;
    --gray-100: #f0f4f8;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-700: #334155;
    --ink: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Kosugi Maru', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(59,130,246,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(249,115,22,0.07) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 14px 14px 40px; }

  header { text-align: center; padding: 18px 0 14px; }
  header h1 {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    color: var(--blue-dark); letter-spacing: .05em;
  }
  header h1 span { color: var(--coral); }
  header p { color: var(--gray-400); font-size: .82rem; margin-top: 4px; }

  .grade-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 14px 0 10px; }
  .grade-btn {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: .83rem;
    padding: 6px 14px; border-radius: 99px;
    border: 2.5px solid var(--gray-200); background: white; color: var(--gray-700);
    cursor: pointer; transition: all .18s;
  }
  .grade-btn:hover { border-color: var(--blue); color: var(--blue); }
  .grade-btn.active { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 3px 12px rgba(59,130,246,.35); }

  .search-bar { display: flex; gap: 8px; margin: 0 auto 12px; max-width: 400px; }
  .search-bar input {
    flex: 1; font-family: 'Kosugi Maru', sans-serif; font-size: 1.1rem;
    padding: 9px 16px; border-radius: 99px;
    border: 2.5px solid var(--gray-200); background: white; outline: none;
    transition: border-color .18s;
  }
  .search-bar input:focus { border-color: var(--blue); }
  .search-bar button {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
    padding: 9px 18px; border-radius: 99px; border: none;
    background: var(--coral); color: white; cursor: pointer; font-size: .88rem;
    transition: all .18s;
  }
  .search-bar button:hover { background: #ea6c0a; }

  .kanji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 7px; margin: 0 0 14px;
    max-height: 280px; overflow-y: auto; padding: 3px;
  }
  .kanji-grid::-webkit-scrollbar { width: 5px; }
  .kanji-grid::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

  .kanji-card {
    aspect-ratio: 1; background: white; border-radius: 13px;
    border: 2.5px solid var(--gray-200);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all .18s; position: relative; overflow: hidden;
  }
  .kanji-card::before {
    content: attr(data-grade) '年'; position: absolute; top: 3px; right: 4px;
    font-size: .48rem; color: var(--gray-400);
  }
  .kanji-card:hover { border-color: var(--blue); transform: translateY(-2px) scale(1.04); box-shadow: 0 4px 16px rgba(59,130,246,.18); }
  .kanji-card.selected { border-color: var(--coral); background: var(--coral-light); box-shadow: 0 4px 14px rgba(249,115,22,.28); }
  .kanji-char { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 1.45rem; line-height: 1; }
  .kanji-reading { font-size: .44rem; color: var(--gray-400); margin-top: 2px; }

  .viewer {
    background: white; border-radius: 22px; padding: 20px;
    box-shadow: 0 6px 32px rgba(59,130,246,.14);
    margin: 0 0 14px; display: none;
  }
  .viewer.visible { display: block; animation: slideUp .3s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .viewer-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .viewer-kanji { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 3.2rem; color: var(--ink); line-height: 1; }
  .viewer-info { flex: 1; }
  .viewer-info .reading { font-size: .95rem; color: var(--blue-dark); font-weight: 700; margin-bottom: 3px; }
  .viewer-info .meaning { font-size: .82rem; color: var(--gray-700); }
  .stroke-badge { background: var(--blue); color: white; border-radius: 99px; padding: 4px 12px; font-size: .78rem; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; }

  .mode-tabs { display: flex; gap: 7px; margin-bottom: 16px; border-bottom: 2px solid var(--gray-200); padding-bottom: 12px; flex-wrap: wrap; }
  .mode-tab {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: .83rem;
    padding: 7px 16px; border-radius: 99px;
    border: 2px solid var(--gray-200); background: var(--gray-100); color: var(--gray-700);
    cursor: pointer; transition: all .18s;
  }
  .mode-tab.active { background: var(--green); border-color: var(--green); color: white; box-shadow: 0 3px 10px rgba(34,197,94,.32); }
  .mode-tab:hover:not(.active) { border-color: var(--green); color: var(--green-dark); }

  .canvas-area { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }

  .stroke-display { flex: 0 0 auto; }

  .svg-box {
    width: 220px; height: 220px;
    border: 2.5px solid var(--gray-200); border-radius: 16px;
    background: white; position: relative; overflow: hidden;
  }
  .svg-box-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(#e8eef5 1px, transparent 1px),
      linear-gradient(90deg, #e8eef5 1px, transparent 1px),
      linear-gradient(#e8eef5 1px, transparent 1px),
      linear-gradient(90deg, #e8eef5 1px, transparent 1px);
    background-size: 55px 55px, 55px 55px, 110px 110px, 110px 110px;
  }
  .svg-box-cross {
    position: absolute; inset: 0; pointer-events: none;
  }
  .svg-box-cross::before, .svg-box-cross::after {
    content: ''; position: absolute; background: #d0dcea;
  }
  .svg-box-cross::before { width: 100%; height: 1px; top: 50%; }
  .svg-box-cross::after  { height: 100%; width: 1px; left: 50%; }

  #strokeSvg {
    position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2;
  }

  .loading-overlay {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(255,255,255,.88);
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--gray-200); border-top-color: var(--blue);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .step-indicators { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; max-width: 220px; }
  .step-dot {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--gray-200); background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: .63rem; font-weight: 700; color: var(--gray-400);
    cursor: pointer; transition: all .15s;
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .step-dot.done { background: var(--blue); border-color: var(--blue); color: white; }
  .step-dot.current { background: var(--coral); border-color: var(--coral); color: white; transform: scale(1.2); }

  .controls { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
  .ctrl-btn {
    font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: .8rem;
    padding: 8px 15px; border-radius: 99px; border: none; cursor: pointer; transition: all .18s;
  }
  .ctrl-btn.play  { background: var(--green); color: white; }
  .ctrl-btn.play:hover  { background: var(--green-dark); }
  .ctrl-btn.prev  { background: var(--gray-200); color: var(--gray-700); }
  .ctrl-btn.prev:hover  { background: var(--gray-400); color: white; }
  .ctrl-btn.next  { background: var(--blue); color: white; }
  .ctrl-btn.next:hover  { background: var(--blue-dark); }
  .ctrl-btn.reset { background: var(--coral-light); color: var(--coral); }
  .ctrl-btn.reset:hover { background: var(--coral); color: white; }

  .progress-bar { margin: 10px 0 0; height: 7px; background: var(--gray-200); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 99px; transition: width .4s ease; width: 0; }
  .progress-label { font-size: .73rem; color: var(--gray-400); margin-top: 3px; text-align: right; }

  .speed-control { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: .75rem; color: var(--gray-600); }
  .speed-control input { width: 70px; accent-color: var(--blue); }

  .practice-area { flex: 1; min-width: 220px; }
  .practice-label { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: .88rem; color: var(--gray-700); margin-bottom: 8px; }
  .practice-label span { color: var(--coral); }

  #practiceCanvas {
    display: block; width: 220px; height: 220px;
    border: 2.5px solid var(--gray-200); border-radius: 16px;
    background: white; cursor: crosshair; touch-action: none;
    background-image:
      linear-gradient(#e8eef5 1px, transparent 1px),
      linear-gradient(90deg, #e8eef5 1px, transparent 1px);
    background-size: 55px 55px;
  }

  .practice-controls { display: flex; gap: 7px; margin-top: 9px; align-items: center; flex-wrap: wrap; }
  .color-pick { display: flex; gap: 5px; }
  .color-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; transition: all .15s;
  }
  .color-dot.selected { border-color: var(--ink); transform: scale(1.2); }
  .pen-size { display: flex; align-items: center; gap: 5px; font-size: .73rem; color: var(--gray-700); }
  .pen-size input { width: 58px; accent-color: var(--blue); }

  .feedback { margin-top: 14px; padding: 10px 14px; border-radius: 12px; font-size: .88rem; font-weight: 700; display: none; align-items: center; gap: 7px; }
  .feedback.show { display: flex; }
  .feedback.good  { background: #dcfce7; color: var(--green-dark); }
  .feedback.error { background: #fee2e2; color: #b91c1c; }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--gray-400); }
  .empty-state .emoji { font-size: 2.6rem; margin-bottom: 10px; }
  .empty-state p { font-size: .88rem; }

  @media (max-width: 480px) {
    .canvas-area { flex-direction: column; }
    .svg-box, #practiceCanvas { width: 190px; height: 190px; }
    .step-indicators { max-width: 190px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>かんじ書き順<span>マスター</span> ✏️</h1>
    <p>小学1〜6年生 ・ 本物の書き順データで練習しよう！</p>
  </header>

  <div class="grade-tabs">
    <button class="grade-btn active" data-grade="all" onclick="filterGrade('all')">すべて</button>
    <button class="grade-btn" data-grade="1"   onclick="filterGrade('1')">1年生</button>
    <button class="grade-btn" data-grade="2"   onclick="filterGrade('2')">2年生</button>
    <button class="grade-btn" data-grade="3"   onclick="filterGrade('3')">3年生</button>
    <button class="grade-btn" data-grade="4"   onclick="filterGrade('4')">4年生</button>
    <button class="grade-btn" data-grade="5"   onclick="filterGrade('5')">5年生</button>
    <button class="grade-btn" data-grade="6"   onclick="filterGrade('6')">6年生</button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="漢字を1文字入力..." maxlength="1"
           oninput="onSearch(this.value)">
    <button onclick="onSearch(document.getElementById('searchInput').value)">🔍</button>
  </div>

  <div class="kanji-grid" id="kanjiGrid"></div>

  <div class="viewer" id="viewer">
    <div class="viewer-header">
      <div class="viewer-kanji" id="viewerKanji">―</div>
      <div class="viewer-info">
        <div class="reading" id="viewerReading"></div>
        <div class="meaning" id="viewerMeaning"></div>
      </div>
      <div class="stroke-badge" id="strokeBadge">―画</div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabAnim"     onclick="switchMode('anim')">🎬 アニメーション</button>
      <button class="mode-tab"        id="tabStep"     onclick="switchMode('step')">👆 ステップ</button>
      <button class="mode-tab"        id="tabPractice" onclick="switchMode('practice')">✏️ 練習</button>
    </div>

    <div class="canvas-area">
      <div class="stroke-display">
        <div class="svg-box" id="svgBox">
          <div class="svg-box-grid"></div>
          <div class="svg-box-cross"></div>
          <svg id="strokeSvg" viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>
        </div>

        <div class="step-indicators" id="stepIndicators"></div>

        <div class="controls">
          <button class="ctrl-btn play"  id="playBtn" onclick="togglePlay()">▶ 再生</button>
          <button class="ctrl-btn prev"  onclick="prevStroke()">◀ 前</button>
          <button class="ctrl-btn next"  onclick="nextStroke()">次 ▶</button>
          <button class="ctrl-btn reset" onclick="resetStrokes()">↺ リセット</button>
        </div>

        <div class="speed-control">
          速さ
          <input type="range" min="300" max="1500" value="800" step="100" id="speedSlider">
          <span id="speedLabel">ふつう</span>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">0 / 0 画</div>
      </div>

      <div class="practice-area" id="practicePanel" style="display:none">
        <div class="practice-label">✏️ 書いてみよう！<span>（左のお手本を見ながら）</span></div>
        <canvas id="practiceCanvas" width="440" height="440"></canvas>
        <div class="practice-controls">
          <div class="color-pick">
            <div class="color-dot selected" style="background:#1e293b" data-color="#1e293b" onclick="setColor(this)"></div>
            <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="setColor(this)"></div>
            <div class="color-dot" style="background:#f97316" data-color="#f97316" onclick="setColor(this)"></div>
            <div class="color-dot" style="background:#22c55e" data-color="#22c55e" onclick="setColor(this)"></div>
            <div class="color-dot" style="background:#a855f7" data-color="#a855f7" onclick="setColor(this)"></div>
          </div>
          <div class="pen-size">太さ<input type="range" min="2" max="14" value="6" oninput="penSize=+this.value"></div>
          <button class="ctrl-btn reset" onclick="clearCanvas()">消す</button>
        </div>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="emoji">📖</div>
    <p>上の漢字をタップして書き順を確認しよう！</p>
  </div>
</div>

<script>

// ============================================================

// STATE
// ============================================================
let currentGrade = 'all';
let currentKanji = null;
let currentMode  = 'anim';
let strokePaths  = [];
let currentStep  = -1;
let animTimer    = null;
let isPlaying    = false;
let penColor     = '#1e293b';
let penSize      = 6;
let isDrawing    = false;
let lastX = 0, lastY = 0;
const svgCache   = {};

// ============================================================
// INIT
// ============================================================
function init() {
  renderGrid('all');
  initCanvas();
  document.getElementById('speedSlider').addEventListener('input', function() {
    const v = +this.value;
    document.getElementById('speedLabel').textContent =
      v <= 400 ? 'はやい' : v <= 900 ? 'ふつう' : 'ゆっくり';
  });
}

// ============================================================
// GRID
// ============================================================
function renderGrid(grade) {
  const grid = document.getElementById('kanjiGrid');
  grid.innerHTML = '';
  Object.entries(KANJI_LIST)
    .filter(([, v]) => grade === 'all' || String(v.g) === grade)
    .forEach(([char, data]) => {
      const card = document.createElement('div');
      card.className = 'kanji-card';
      card.dataset.grade = data.g;
      const reading = (data.kun || data.on).split('・')[0];
      card.innerHTML = `<span class="kanji-char">${char}</span><span class="kanji-reading">${reading}</span>`;
      card.onclick = () => selectKanji(char);
      grid.appendChild(card);
    });
}

function filterGrade(grade) {
  currentGrade = grade;
  document.querySelectorAll('.grade-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.grade === grade)
  );
  renderGrid(grade);
}

function onSearch(val) {
  if (!val) { renderGrid(currentGrade); return; }
  const grid = document.getElementById('kanjiGrid');
  grid.innerHTML = '';
  const entry = KANJI_LIST[val];
  if (!entry) {
    grid.innerHTML = `<div style="padding:16px;color:#94a3b8;grid-column:1/-1;text-align:center">「${val}」は見つかりませんでした</div>`;
    return;
  }
  const card = document.createElement('div');
  card.className = 'kanji-card';
  card.dataset.grade = entry.g;
  const reading = (entry.kun || entry.on).split('・')[0];
  card.innerHTML = `<span class="kanji-char">${val}</span><span class="kanji-reading">${reading}</span>`;
  card.onclick = () => selectKanji(val);
  grid.appendChild(card);
}

// ============================================================
// SELECT — 本物のKanjiVG SVGをKan-G CDNから取得
// ============================================================
async function selectKanji(char) {
  stopAnim();
  currentKanji = char;
  currentStep  = -1;
  strokePaths  = [];

  document.querySelectorAll('.kanji-card').forEach(c =>
    c.classList.toggle('selected', c.querySelector('.kanji-char')?.textContent === char)
  );

  const data = KANJI_LIST[char];
  document.getElementById('viewerKanji').textContent   = char;
  document.getElementById('viewerReading').textContent = `音：${data.on}　訓：${data.kun || 'ー'}`;
  document.getElementById('viewerMeaning').textContent = data.m;
  document.getElementById('strokeBadge').textContent   = '読込中…';

  document.getElementById('viewer').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
  showLoading(true);
  hideFeedback();

  try {
    const svgText = await fetchKanjiSvg(char);
    applyKanjiSvg(svgText);
  } catch (e) {
    showLoading(false);
    showFeedback('error', '⚠️ データ取得に失敗しました。ネット接続を確認してください。');
  }
}

async function fetchKanjiSvg(char) {
  if (svgCache[char]) return svgCache[char];
  const code = char.charCodeAt(0).toString(16).padStart(5, '0');
  const res  = await fetch(`https://kan-g.vnaka.dev/k/${code}.svg`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  svgCache[char] = text;
  return text;
}

// ============================================================
// SVG を DOM に展開してストロークを制御
// ============================================================
function applyKanjiSvg(svgText) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(svgText, 'image/svg+xml');
  const srcSvg = doc.querySelector('svg');
  if (!srcSvg) { showLoading(false); showFeedback('error', '⚠️ SVG解析に失敗しました'); return; }

  const vb     = srcSvg.getAttribute('viewBox') || '0 0 109 109';
  const target = document.getElementById('strokeSvg');
  target.innerHTML = '';
  target.setAttribute('viewBox', vb);

  const pathsGroup   = doc.querySelector('.kgPaths');
  const numbersGroup = doc.querySelector('.kgNumbers');

  if (!pathsGroup) {
    showLoading(false);
    showFeedback('error', '⚠️ ストロークデータが見つかりません');
    return;
  }

  // ゴースト（全体薄く表示）
  const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  ghost.id = 'ghostLayer';
  Array.from(pathsGroup.querySelectorAll('path')).forEach(p => {
    const gp = p.cloneNode(true);
    gp.setAttribute('stroke', '#c8d5e8');
    gp.setAttribute('stroke-width', p.getAttribute('stroke-width') || '3');
    gp.removeAttribute('style');
    gp.setAttribute('fill', 'none');
    ghost.appendChild(gp);
  });
  target.appendChild(ghost);

  // 実際のストロークを1本ずつ管理
  strokePaths = [];
  const pathsG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  pathsG.id = 'strokeLayer';
  Array.from(pathsGroup.querySelectorAll('path')).forEach(p => {
    const np = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    np.setAttribute('d', p.getAttribute('d'));
    np.setAttribute('stroke', '#1e293b');
    np.setAttribute('stroke-width', p.getAttribute('stroke-width') || '3');
    np.setAttribute('stroke-linecap', 'round');
    np.setAttribute('stroke-linejoin', 'round');
    np.setAttribute('fill', 'none');
    np.style.display = 'none';
    pathsG.appendChild(np);
    strokePaths.push(np);
  });
  target.appendChild(pathsG);

  // 番号ラベル
  if (numbersGroup) {
    const numG = numbersGroup.cloneNode(true);
    numG.id = 'numberLayer';
    // すべて非表示に
    numG.querySelectorAll('text').forEach(t => { t.style.display = 'none'; });
    target.appendChild(numG);
  }

  const total = strokePaths.length;
  document.getElementById('strokeBadge').textContent = `${total}画`;
  buildStepDots(total);
  updateProgress(-1, total);
  showLoading(false);
  showStrokesUpTo(-1);
  switchMode(currentMode);
}

// ============================================================
// ストローク表示ロジック
// ============================================================
function showStrokesUpTo(idx) {
  strokePaths.forEach((p, i) => {
    if (i <= idx) {
      p.style.display = '';
      p.setAttribute('stroke', i === idx ? '#f97316' : '#1e293b');
      p.setAttribute('stroke-width', i === idx ? '4.5' : '3');
    } else {
      p.style.display = 'none';
    }
  });

  // 番号ラベル
  const numLayer = document.getElementById('numberLayer');
  if (numLayer) {
    numLayer.querySelectorAll('text').forEach((t, i) => {
      t.style.display = i <= idx ? '' : 'none';
    });
  }

  updateDots(idx, strokePaths.length);
  updateProgress(idx, strokePaths.length);
}

function showAllStrokes() {
  strokePaths.forEach(p => {
    p.style.display = '';
    p.setAttribute('stroke', '#1e293b');
    p.setAttribute('stroke-width', '3');
  });
  const numLayer = document.getElementById('numberLayer');
  if (numLayer) numLayer.querySelectorAll('text').forEach(t => { t.style.display = ''; });
  const n = strokePaths.length;
  updateDots(n - 1, n);
  updateProgress(n - 1, n);
}

// ============================================================
// ステップドット
// ============================================================
function buildStepDots(total) {
  const cont = document.getElementById('stepIndicators');
  cont.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot';
    d.textContent = i + 1;
    const ii = i;
    d.onclick = () => { stopAnim(); currentStep = ii; showStrokesUpTo(ii); };
    cont.appendChild(d);
  }
}

function updateDots(step, total) {
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.remove('done', 'current');
    if (i < step) d.classList.add('done');
    else if (i === step) d.classList.add('current');
  });
}

function updateProgress(step, total) {
  const shown = step + 1;
  const pct   = total > 0 ? Math.max(0, shown / total * 100) : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${Math.max(0, shown)} / ${total} 画`;
}

// ============================================================
// コントロール
// ============================================================
function nextStroke() {
  if (!strokePaths.length) return;
  stopAnim();
  if (currentStep < strokePaths.length - 1) {
    currentStep++;
    showStrokesUpTo(currentStep);
  } else {
    showFeedback('good', '✨ 全部の書き順を確認したね！すごい！');
  }
}

function prevStroke() {
  if (!strokePaths.length) return;
  stopAnim();
  currentStep = Math.max(-1, currentStep - 1);
  showStrokesUpTo(currentStep);
}

function resetStrokes() {
  stopAnim();
  currentStep = -1;
  showStrokesUpTo(-1);
  hideFeedback();
}

function togglePlay() {
  isPlaying ? stopAnim() : startAnim();
}

function startAnim() {
  if (!strokePaths.length) return;
  isPlaying    = true;
  currentStep  = -1;
  document.getElementById('playBtn').textContent = '⏸ 停止';
  showStrokesUpTo(-1);
  hideFeedback();

  const speed = +document.getElementById('speedSlider').value;

  (function tick() {
    if (!isPlaying) return;
    currentStep++;
    if (currentStep < strokePaths.length) {
      showStrokesUpTo(currentStep);
      animTimer = setTimeout(tick, speed);
    } else {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶ 再生';
      showFeedback('good', '✨ 書き順を覚えよう！練習モードで練習してみてね！');
    }
  })();
}

function stopAnim() {
  isPlaying = false;
  clearTimeout(animTimer);
  document.getElementById('playBtn').textContent = '▶ 再生';
}

// ============================================================
// モード切替
// ============================================================
function switchMode(mode) {
  currentMode = mode;
  ['anim','step','practice'].forEach(m => {
    const t = document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1));
    if (t) t.classList.toggle('active', m === mode);
  });

  const pp = document.getElementById('practicePanel');
  if (mode === 'practice') {
    pp.style.display = 'block';
    stopAnim();
    if (strokePaths.length) showAllStrokes();
  } else {
    pp.style.display = 'none';
    if (mode === 'anim' && strokePaths.length) {
      currentStep = -1;
      showStrokesUpTo(-1);
    }
  }
}

// ============================================================
// 練習キャンバス
// ============================================================
function initCanvas() {
  const canvas = document.getElementById('practiceCanvas');
  const ctx    = canvas.getContext('2d');
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  function getPos(e) {
    const r  = canvas.getBoundingClientRect();
    const sx = canvas.width  / r.width;
    const sy = canvas.height / r.height;
    const s  = e.touches ? e.touches[0] : e;
    return { x: (s.clientX - r.left) * sx, y: (s.clientY - r.top) * sy };
  }
  function onStart(e) {
    e.preventDefault();
    isDrawing = true;
    const p = getPos(e); lastX = p.x; lastY = p.y;
    ctx.beginPath(); ctx.arc(lastX, lastY, penSize / 2, 0, Math.PI * 2);
    ctx.fillStyle = penColor; ctx.fill();
  }
  function onMove(e) {
    e.preventDefault();
    if (!isDrawing) return;
    const p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = penColor; ctx.lineWidth = penSize; ctx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function onEnd(e) { e.preventDefault(); isDrawing = false; }

  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
  canvas.addEventListener('mouseleave', onEnd);
  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove',  onMove,  { passive: false });
  canvas.addEventListener('touchend',   onEnd,   { passive: false });
}

function clearCanvas() {
  const c = document.getElementById('practiceCanvas');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function setColor(el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  penColor = el.dataset.color;
}

// ============================================================
// フィードバック・ローディング
// ============================================================
function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.className = `feedback show ${type}`;
  el.textContent = msg;
}
function hideFeedback() {
  document.getElementById('feedback').classList.remove('show');
}
function showLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !on);
}

init();
</script>
