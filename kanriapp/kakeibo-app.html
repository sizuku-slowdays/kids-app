<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>家計簿</title>
  <link rel="apple-touch-icon" href="img/kakeibo.png">
  <link rel="icon" type="image/png" href="img/kakeibo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <meta name="theme-color" content="#fff3c4">
  <style>
    :root{
      --bg:#fff8e7;--card:#fff;--main:#ffb84d;--safe:#2e9f62;--danger:#e63946;
      --text:#333;--muted:#777;--line:#eadfc9;
      --shadow:0 8px 20px rgba(130,90,30,.12);--radius:18px
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#fff2bf 0%,var(--bg) 220px);
      color:var(--text);line-height:1.6;padding-bottom:100px}
    header{padding:20px 16px 8px;text-align:center}
    header h1{margin:0;font-size:1.6rem;letter-spacing:.04em}
    header p{margin:4px 0 0;color:#6b4b1f;font-size:.88rem}
    .app{width:min(680px,100%);margin:0 auto;padding:10px 14px}

    /* カード共通 */
    .card{background:rgba(255,255,255,.94);border:1px solid rgba(234,223,201,.9);
      border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .card h2{margin:0 0 12px;font-size:1.05rem;font-weight:800}

    /* ── クラウド設定（常に最上部・アコーディオン） ── */
    .sync-box{background:linear-gradient(135deg,#eef8ff,#fff);border:2px solid #bfe4ff}
    .sync-head{display:flex;align-items:center;justify-content:space-between;gap:8px;
      cursor:pointer;user-select:none;-webkit-user-select:none}
    .sync-head h2{margin:0;font-size:1rem;font-weight:800;pointer-events:none}
    .sync-head-right{display:flex;align-items:center;gap:8px;pointer-events:none}
    .sync-badge{font-size:.75rem;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
    .sync-badge.ok{background:#d4f5e3;color:#247344}
    .sync-badge.ng{background:#ffe8e8;color:#a4161a}
    .sync-badge.idle{background:#f0f0f0;color:#888}
    .sync-toggle-icon{font-size:.82rem;color:var(--muted);font-weight:700;white-space:nowrap}
    .sync-body{margin-top:14px}
    label.form-label{display:block;font-size:.85rem;font-weight:700;margin-bottom:5px}
    input.text-input,input.pass-input{width:100%;border:1px solid #dfd1ba;border-radius:10px;
      padding:10px 12px;font-size:.95rem;background:#fffdf8;color:var(--text);margin-bottom:10px}
    .inline-check{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:700;margin:4px 0 10px}
    .inline-check input{width:auto}
    .sync-status{margin-top:8px;padding:9px 10px;border-radius:10px;background:#fffdf8;
      border:1px solid var(--line);font-size:.85rem;color:var(--muted)}
    .sync-status.ok{background:#f0fff7;border-color:#c6ead6;color:#247344;font-weight:700}
    .sync-status.ng{background:#fff1f2;border-color:#f4a7af;color:#a4161a;font-weight:700}
    .hint{color:var(--muted);font-size:.8rem;margin:8px 0 0}
    .btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}

    /* 月ナビ */
    .month-nav{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:14px}
    .month-nav strong{min-width:130px;text-align:center;font-size:1.1rem;font-weight:800}
    .nav-btn{border:none;border-radius:999px;padding:9px 16px;font-size:.92rem;font-weight:700;
      cursor:pointer;background:#fff3d1;color:#5b3a05;border:1px solid #ebd19a}

    /* 表示切替 */
    .view-switch{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
    .view-switch label{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
      border-radius:999px;background:#fffdf8;border:1px solid var(--line);font-size:.88rem;cursor:pointer}
    .view-switch input{width:auto}

    /* 合計サマリ */
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .summary-box{background:#fff9ed;border:1px solid var(--line);border-radius:14px;
      padding:12px;text-align:center}
    .summary-label{color:var(--muted);font-size:.8rem}
    .summary-value{margin-top:4px;font-size:1.2rem;font-weight:800}
    .income-note{margin-top:10px;font-size:.82rem;color:var(--muted)}

    /* 支払い元別 */
    .payment-list{display:grid;gap:8px}
    .payment-row{display:flex;justify-content:space-between;align-items:center;
      padding:10px 14px;background:#fff9ed;border:1px solid var(--line);border-radius:12px}
    .payment-name{font-size:.9rem;font-weight:700}
    .payment-amount{font-size:1.05rem;font-weight:800}
    .payment-row.pink{background:linear-gradient(135deg,#ffe3ef,#fff7fb);border-color:#ffc3dc}
    .payment-row.pink .payment-name{color:#a6164b}

    /* PINKメーター */
    .pink-box{background:linear-gradient(135deg,#ffe3ef,#fff7fb);border:2px solid #ffc3dc}
    .pink-title{display:flex;justify-content:space-between;align-items:center;
      font-weight:800;color:#a6164b;margin-bottom:8px}
    .meter{height:14px;background:#ffeef5;border-radius:999px;overflow:hidden;border:1px solid #ffc3dc}
    .meter-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff7baa,#ff2f79);
      border-radius:999px;transition:width .3s ease}
    .pink-message{margin-top:8px;font-size:.88rem;font-weight:700}

    /* 最近の入力 */
    .recent-list{display:grid;gap:8px}
    .recent-item{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
      padding:10px 12px;background:#fffdf8;border:1px solid var(--line);border-radius:12px;font-size:.88rem}
    .recent-date{color:var(--muted);font-size:.82rem;white-space:nowrap}
    .recent-detail{min-width:0}
    .recent-memo{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .recent-payment{font-size:.78rem;color:var(--muted);margin-top:2px}
    .recent-amount{font-weight:800;font-size:.98rem;white-space:nowrap;text-align:right}
    .tag{display:inline-block;padding:2px 7px;border-radius:999px;
      background:#f4ead8;font-size:.74rem;font-weight:700}
    .tag.pink-tag{background:#ffe1ee;color:#a6164b}

    /* ボタン共通 */
    button{border:none;border-radius:999px;padding:11px 18px;font-size:.95rem;font-weight:800;
      cursor:pointer;background:var(--main);color:#3e2600;
      box-shadow:0 4px 10px rgba(160,105,25,.16);display:inline-flex;align-items:center;
      justify-content:center;gap:6px;text-decoration:none;white-space:nowrap}
    button.secondary{background:#fff3d1;border:1px solid #ebd19a;box-shadow:none}
    button.mini{padding:7px 12px;font-size:.82rem;box-shadow:none}

    /* 入力FABボタン */
    .fab-area{position:fixed;bottom:0;left:0;right:0;z-index:100;
      display:flex;justify-content:center;padding:12px 16px;
      background:linear-gradient(to top,var(--bg) 70%,transparent);
      pointer-events:none}
    .fab{pointer-events:auto;border:none;border-radius:999px;
      padding:16px 36px;font-size:1.15rem;font-weight:900;
      cursor:pointer;background:linear-gradient(135deg,#ffb84d,#ff8c00);color:#3e2600;
      box-shadow:0 6px 24px rgba(180,100,0,.32);letter-spacing:.04em}

    .loading{text-align:center;color:var(--muted);padding:24px;font-size:.92rem}
    .empty{text-align:center;color:var(--muted);padding:20px 8px;font-size:.9rem}

    @media(max-width:480px){
      .summary-grid{grid-template-columns:1fr 1fr}
      .summary-grid .summary-box:last-child{grid-column:1/-1}
    }
  </style>
</head>
<body>
  <header>
    <h1>💰 家計簿</h1>
    <p>今月のお金の流れを確認する</p>
  </header>
  <main class="app">

    <!-- ☁️ クラウド設定（常に最上部・アコーディオン） -->
    <div class="card sync-box">
      <div class="sync-head" id="syncHead">
        <h2>☁️ クラウド設定</h2>
        <div class="sync-head-right">
          <span class="sync-badge idle" id="syncBadge">未同期</span>
          <span class="sync-toggle-icon" id="syncIcon">▼</span>
        </div>
      </div>
      <div class="sync-body" id="syncBody" style="display:none">
        <label class="form-label" for="apiUrl">API URL</label>
        <input class="text-input" type="url" id="apiUrl" placeholder="https://api.cetus.fun/api/app-data">
        <label class="form-label" for="apiPassword">保存用パスワード</label>
        <input class="pass-input" type="password" id="apiPassword" placeholder="パスワードを入力">
        <label class="inline-check"><input type="checkbox" id="autoCloudSave"> 保存のたびにクラウドへ自動保存</label>
        <div class="btn-row">
          <button type="button" id="loadCloud">クラウドから読み込み</button>
          <button type="button" class="secondary" id="saveCloud">今すぐ保存</button>
        </div>
        <div class="sync-status" id="syncStatus">まだ同期していません。</div>
        <p class="hint">パスワードはこの端末のブラウザ内のみに保存されます。</p>
      </div>
    </div>

    <!-- 月ナビ -->
    <div class="month-nav">
      <button class="nav-btn" id="prevMonth">← 前月</button>
      <strong id="currentMonthLabel">読み込み中</strong>
      <button class="nav-btn" id="nextMonth">翌月 →</button>
    </div>
    <div class="view-switch">
      <label><input type="radio" name="viewMode" value="settle" checked> 引落・反映月で見る</label>
      <label><input type="radio" name="viewMode" value="use"> 利用日で見る</label>
    </div>

    <!-- 今月の合計 -->
    <div class="card">
      <h2>📊 今月の合計</h2>
      <div class="summary-grid">
        <div class="summary-box"><div class="summary-label">収入</div><div class="summary-value" id="incomeTotal">―</div></div>
        <div class="summary-box"><div class="summary-label">支出</div><div class="summary-value" id="expenseTotal">―</div></div>
        <div class="summary-box"><div class="summary-label">差し引き</div><div class="summary-value" id="balanceTotal">―</div></div>
      </div>
      <div class="income-note" id="incomeNote"></div>
    </div>

    <!-- 支払い元別 -->
    <div class="card">
      <h2>💳 支払い元別 支出</h2>
      <div class="payment-list" id="paymentList">
        <div class="loading">読み込み中…</div>
      </div>
    </div>

    <!-- PINKカード監視 -->
    <div class="card pink-box">
      <div class="pink-title">
        <span>🌸 楽天PINKカード</span>
        <span id="pinkTotal">―</span>
      </div>
      <div class="meter"><div class="meter-fill" id="pinkMeter"></div></div>
      <div class="pink-message" id="pinkMessage"></div>
      <p class="hint">目標：50,000円 ／ 警告：100,000円</p>
    </div>

    <!-- 最近の入力 -->
    <div class="card">
      <h2>🕐 最近の入力</h2>
      <div class="recent-list" id="recentList">
        <div class="loading">読み込み中…</div>
      </div>
    </div>

  </main>

  <!-- 入力ボタン（固定） -->
  <div class="fab-area">
    <button class="fab" id="goInput">＋ 支出を入力する</button>
  </div>

  <script>
    const STORAGE_KEY  = "kakeibo-app-stable-v3";
    const SETTINGS_KEY = "kakeibo-cloud-settings-v1";
    const APP_KEY      = "kakeibo-app";
    const APP_VERSION  = 3;
    const DEFAULT_API  = "https://api.cetus.fun/api/app-data";
    const PINK_GOAL    = 50000;
    const PINK_WARNING = 100000;
    const PAYMENTS     = ["楽天PINK","楽天VISA","現金","auじぶん銀行"];

    let entries      = [];
    let currentMonth = new Date();
    currentMonth.setDate(1);

    /* ── ユーティリティ ── */
    function $(id){return document.getElementById(id)}
    function yen(v){return Number(v||0).toLocaleString("ja-JP")+"円"}
    function pad(n){return String(n).padStart(2,"0")}
    function monthString(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)}
    function makeId(){return crypto.randomUUID ? crypto.randomUUID() : "id-"+Date.now()+"-"+Math.random().toString(36).slice(2)}
    function htmlEsc(v){return String(v==null?"":v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
    function normalizePaymentName(n){
      return String(n||"").toLowerCase().replace(/\s/g,"")
        .replace("楽天ピンク","楽天pink").replace("rakutenpink","楽天pink")
        .replace("楽天ビザ","楽天visa");
    }

    function normalizeEntry(e){
      return {
        id:          e.id || makeId(),
        date:        e.date || "",
        type:        e.type === "income" ? "income" : "expense",
        amount:      Number(e.amount || 0),
        payment:     e.payment || "その他",
        category:    e.category || "その他",
        settleMonth: e.settleMonth || (e.date ? String(e.date).slice(0,7) : monthString(new Date())),
        memo:        e.memo || "",
        createdAt:   e.createdAt || new Date().toISOString(),
        updatedAt:   e.updatedAt || e.createdAt || new Date().toISOString()
      };
    }

    /* ── ストレージ ── */
    function loadEntries(){
      try{
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved){ entries = JSON.parse(saved||"[]").map(normalizeEntry); return; }
        for(const key of ["kakeibo-app-stable-v2","kakeibo-app-stable-v1"]){
          const leg = localStorage.getItem(key);
          if(leg){ entries = JSON.parse(leg||"[]").map(normalizeEntry); saveLocal(); return; }
        }
        entries = [];
      }catch(e){ entries = []; }
    }
    function saveLocal(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    /* ── クラウド設定 ── */
    function getCloudSettings(){
      try{
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");
        return { apiUrl:s.apiUrl||DEFAULT_API, password:s.password||"", autoCloudSave:!!s.autoCloudSave };
      }catch(e){ return {apiUrl:DEFAULT_API,password:"",autoCloudSave:false}; }
    }
    function saveCloudSettings(){
      const s = { apiUrl:$("apiUrl").value.trim()||DEFAULT_API, password:$("apiPassword").value, autoCloudSave:$("autoCloudSave").checked };
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
      return s;
    }
    function loadCloudSettingsToForm(){
      const s = getCloudSettings();
      $("apiUrl").value          = s.apiUrl || DEFAULT_API;
      $("apiPassword").value     = s.password || "";
      $("autoCloudSave").checked = !!s.autoCloudSave;
    }

    /* ── アコーディオン開閉 ── */
    let syncOpen = false;
    function openSync(){ syncOpen=true;  $("syncBody").style.display="block"; $("syncIcon").textContent="▲"; }
    function closeSync(){ syncOpen=false; $("syncBody").style.display="none";  $("syncIcon").textContent="▼"; }
    function toggleSync(){ syncOpen ? closeSync() : openSync(); }

    /* ── バッジ更新 ── */
    function setSyncBadge(text, kind){
      const b = $("syncBadge");
      b.textContent = text;
      b.className = "sync-badge " + (kind||"idle");
    }

    /* ── ステータス更新 ── */
    function setSyncStatus(msg, kind){
      const el = $("syncStatus");
      el.textContent = msg;
      el.className = "sync-status" + (kind ? " "+kind : "");
      if(kind === "ok"){
        setSyncBadge("✓ 同期済み","ok");
        // 成功後1.5秒で自動で閉じる
        setTimeout(closeSync, 1500);
      } else if(kind === "ng"){
        setSyncBadge("エラー","ng");
      }
    }

    /* ── クラウド保存・読み込み ── */
    async function saveToCloud(opts){
      const silent = opts && opts.silent;
      const s = saveCloudSettings();
      if(!s.password){ if(!silent)setSyncStatus("パスワードを入力してから保存してください。","ng"); return; }
      try{
        if(!silent)setSyncStatus("クラウドへ保存中…");
        const payload = { app:APP_KEY, version:APP_VERSION, entries:entries.map(normalizeEntry), savedAt:new Date().toISOString() };
        const res = await fetch(s.apiUrl, {
          method:"POST",
          headers:{"Content-Type":"application/json","X-App-Password":s.password},
          body:JSON.stringify({key:APP_KEY, app:APP_KEY, data:payload})
        });
        const text = await res.text();
        let json = {}; try{ json=text?JSON.parse(text):{}; }catch(e){}
        if(!res.ok) throw new Error((json&&(json.error||json.message))||"HTTP "+res.status);
        setSyncStatus("クラウド保存できました。最終保存："+new Date().toLocaleString("ja-JP"),"ok");
      }catch(err){ setSyncStatus("クラウド保存に失敗しました："+err.message,"ng"); }
    }

    async function loadFromCloud(){
      const s = saveCloudSettings();
      if(!s.password){ setSyncStatus("パスワードを入力してから読み込んでください。","ng"); return; }
      if(entries.length>0 && !confirm("クラウドのデータでこの端末の表示を置き換えますか？")) return;
      try{
        setSyncStatus("クラウドから読み込み中…");
        const url = new URL(s.apiUrl);
        url.searchParams.set("key",APP_KEY);
        const res = await fetch(url.toString(), {method:"GET", headers:{"X-App-Password":s.password}});
        const text = await res.text();
        let json = {}; try{ json=text?JSON.parse(text):{}; }catch(e){}
        if(!res.ok) throw new Error((json&&(json.error||json.message))||"HTTP "+res.status);
        const root = json && typeof json === "object" ? json : {};
        const data = root.data && typeof root.data === "object" ? root.data : root;
        const cloudData = Array.isArray(data.entries) ? data : (Array.isArray(root.entries) ? root : null);
        if(!cloudData || !Array.isArray(cloudData.entries)) throw new Error("クラウドに家計簿データが見つかりません。");
        entries = cloudData.entries.map(normalizeEntry);
        saveLocal();
        render();
        const savedAt = cloudData.savedAt ? new Date(cloudData.savedAt).toLocaleString("ja-JP") : "不明";
        setSyncStatus("クラウドから読み込みました。クラウド保存日時："+savedAt,"ok");
      }catch(err){ setSyncStatus("クラウド読込に失敗しました："+err.message,"ng"); }
    }

    /* ── 表示モード ── */
    function viewMode(){
      const r = document.querySelector("input[name='viewMode']:checked");
      return r ? r.value : "settle";
    }
    function entryMonth(e){
      return viewMode() === "use"
        ? String(e.date||"").slice(0,7)
        : (e.settleMonth || String(e.date||"").slice(0,7));
    }

    /* ── レンダリング ── */
    function render(){
      const m = monthString(currentMonth);
      $("currentMonthLabel").textContent = m.replace("-","年")+"月";

      const monthEntries = entries.filter(e => entryMonth(e) === m);
      const expenses     = monthEntries.filter(e => e.type === "expense");
      const incomeList   = monthEntries.filter(e => e.type === "income");
      const totalExp     = expenses.reduce((s,e) => s+Number(e.amount||0), 0);
      const totalInc     = incomeList.reduce((s,e) => s+Number(e.amount||0), 0);
      const balance      = totalInc - totalExp;

      $("incomeTotal").textContent  = yen(totalInc);
      $("expenseTotal").textContent = yen(totalExp);
      $("balanceTotal").textContent = yen(balance);
      $("balanceTotal").style.color = balance >= 0 ? "var(--safe)" : "var(--danger)";
      $("incomeNote").textContent   = (viewMode()==="use" ? "利用日" : "引落・反映月") + "ベースで集計しています。";

      renderPayments(expenses);
      renderPink(expenses);
      renderRecent(monthEntries);
    }

    function renderPayments(expenses){
      const area = $("paymentList");
      const rows = PAYMENTS.map(name => {
        const total = expenses
          .filter(e => normalizePaymentName(e.payment) === normalizePaymentName(name))
          .reduce((s,e) => s+Number(e.amount||0), 0);
        return {name, total};
      });
      const grandTotal = rows.reduce((s,r) => s+r.total, 0);
      if(grandTotal === 0){
        area.innerHTML = '<div class="empty">今月の支出はまだありません</div>'; return;
      }
      area.innerHTML = rows.map(r => {
        const isPink = normalizePaymentName(r.name) === normalizePaymentName("楽天PINK");
        return `<div class="payment-row${isPink?" pink":""}">
          <span class="payment-name">${htmlEsc(r.name)}</span>
          <span class="payment-amount">${yen(r.total)}</span>
        </div>`;
      }).join("") +
      `<div class="payment-row" style="background:#f5f2ea;border-color:#d8cdb4">
        <span class="payment-name" style="color:var(--muted)">合計</span>
        <span class="payment-amount">${yen(grandTotal)}</span>
      </div>`;
    }

    function renderPink(expenses){
      const total = expenses
        .filter(e => normalizePaymentName(e.payment) === normalizePaymentName("楽天PINK"))
        .reduce((s,e) => s+Number(e.amount||0), 0);
      $("pinkTotal").textContent = yen(total);
      $("pinkMeter").style.width = Math.min((total/PINK_WARNING)*100, 100) + "%";
      if(total===0)                 $("pinkMessage").textContent = "今月のPINK利用はまだ0円。";
      else if(total<=PINK_GOAL)     $("pinkMessage").textContent = "目標5万円まであと "+yen(PINK_GOAL-total)+"。安全圏！";
      else if(total<PINK_WARNING)   $("pinkMessage").textContent = "5万円を "+yen(total-PINK_GOAL)+" オーバー。慎重に！";
      else                          $("pinkMessage").textContent = "10万円ライン到達。PINKブラックゾーン。";
    }

    function renderRecent(monthEntries){
      const area = $("recentList");
      const list = [...monthEntries]
        .sort((a,b) => String(b.date||"").localeCompare(String(a.date||"")))
        .slice(0,20);
      if(list.length === 0){
        area.innerHTML = '<div class="empty">今月の入力はまだありません</div>'; return;
      }
      area.innerHTML = list.map(e => {
        const isPink   = normalizePaymentName(e.payment) === normalizePaymentName("楽天PINK");
        const typeLabel = e.type === "income" ? "収入" : "支出";
        const amtColor  = e.type === "income" ? "var(--safe)" : "var(--text)";
        return `<div class="recent-item">
          <span class="recent-date">${htmlEsc(e.date||"")}</span>
          <div class="recent-detail">
            <div class="recent-memo">${htmlEsc(e.memo || e.category || typeLabel)}</div>
            <div class="recent-payment">
              <span class="tag${isPink?" pink-tag":""}">${htmlEsc(e.payment)}</span>
              ${e.memo && e.category ? `<span class="tag" style="margin-left:4px">${htmlEsc(e.category)}</span>` : ""}
            </div>
          </div>
          <span class="recent-amount" style="color:${amtColor}">${e.type==="income"?"+":""}${yen(e.amount)}</span>
        </div>`;
      }).join("");
    }

    /* ── 初期化 ── */
    function init(){
      loadEntries();
      loadCloudSettingsToForm();
      render();

      // アコーディオン：パスワード未設定なら最初から開く
      const _s = getCloudSettings();
      if(!_s.password){ openSync(); } else { setSyncBadge("✓ 設定済み","ok"); }

      $("syncHead").addEventListener("click", toggleSync);
      $("loadCloud").addEventListener("click", loadFromCloud);
      $("saveCloud").addEventListener("click", () => saveToCloud({silent:false}));
      $("apiUrl").addEventListener("change", saveCloudSettings);
      $("apiPassword").addEventListener("change", saveCloudSettings);
      $("autoCloudSave").addEventListener("change", saveCloudSettings);

      $("prevMonth").addEventListener("click", () => { currentMonth.setMonth(currentMonth.getMonth()-1); render(); });
      $("nextMonth").addEventListener("click", () => { currentMonth.setMonth(currentMonth.getMonth()+1); render(); });
      document.querySelectorAll("input[name='viewMode']").forEach(r => r.addEventListener("change", render));

      $("goInput").addEventListener("click", () => { location.href = "kakeibo-input.html"; });

      document.addEventListener("visibilitychange", () => {
        if(!document.hidden){ loadEntries(); render(); }
      });
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
