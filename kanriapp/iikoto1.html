<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>きょうのいいこと 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --paper: #fff9f0;
    --paper2: #ffffff;
    --ink: #3a3028;
    --ink-light: #7a6e64;
    --ink-faint: #c8bfb4;
    --accent: #e8845a;
    --accent-soft: #f5c4a8;
    --accent-bg: #fdf0e8;
    --green: #6ab89a;
    --green-bg: #eaf6f0;
    --blue: #6a9fc2;
    --blue-bg: #e8f2f9;
    --red: #e06060;
    --line: #ede7de;
    --shadow: 0 2px 12px rgba(58,48,40,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .app-header {
    background: var(--paper);
    border-bottom: 2px solid var(--line);
    padding: 14px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .net-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 700;
    background: var(--green-bg);
    color: var(--green);
  }
  .net-status.loading { background: var(--bg); color: var(--ink-faint); }
  .net-status.error { background: #ffeaea; color: var(--red); }

  .tabs {
    display: flex;
    background: var(--paper);
    border-bottom: 2px solid var(--line);
    padding: 0 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: transparent;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  .page { display: none; padding: 20px 16px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* ホーム */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--paper2);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 14px;
    box-shadow: var(--shadow);
  }
  .stat-card.wide { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; }
  .stat-icon { font-size: 28px; }
  .stat-label { font-size: 11px; color: var(--ink-light); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.05em; }
  .stat-value { font-family: 'Kaisei Decol', serif; font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-value span { font-size: 13px; font-weight: 500; color: var(--ink-light); font-family: 'Zen Maru Gothic', sans-serif; }
  .stat-card.accent-card { background: var(--accent-bg); border-color: var(--accent-soft); }
  .stat-card.accent-card .stat-value { color: var(--accent); }
  .stat-card.green-card { background: var(--green-bg); border-color: #b8e2d2; }
  .stat-card.green-card .stat-value { color: var(--green); }
  .stat-card.blue-card { background: var(--blue-bg); border-color: #c0ddf0; }
  .stat-card.blue-card .stat-value { color: var(--blue); }

  .section-title {
    font-size: 14px; font-weight: 700; color: var(--ink-light);
    letter-spacing: 0.06em; margin-bottom: 12px; padding-left: 2px;
    display: flex; align-items: center; gap: 6px;
  }

  /* 記録カード */
  .record-list { display: flex; flex-direction: column; gap: 10px; }
  .record-card {
    background: var(--paper2);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .record-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .record-title { font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.4; flex: 1; }
  .record-point { font-family: 'Kaisei Decol', serif; font-size: 18px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .record-point::after { content: ' pt'; font-size: 11px; font-weight: 500; font-family: 'Zen Maru Gothic', sans-serif; color: var(--accent-soft); }
  .record-meta { font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; }
  .record-memo { font-size: 13px; color: var(--ink-light); background: var(--bg); border-radius: 8px; padding: 8px 10px; margin-top: 8px; line-height: 1.5; }
  .record-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .btn-delete {
    border: none; background: none; color: var(--ink-faint); font-size: 12px;
    font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer;
    padding: 4px 8px; border-radius: 6px; transition: all 0.15s;
  }
  .btn-delete:hover { background: #ffeaea; color: var(--red); }
  .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }

  .today-badge {
    display: inline-block; background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 100px; margin-left: 6px; vertical-align: middle;
  }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--ink-faint); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* フォーム */
  .form-card {
    background: var(--paper2); border: 1.5px solid var(--line);
    border-radius: var(--radius); padding: 20px 18px;
    box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .form-label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .form-label .required { color: var(--accent); margin-left: 4px; font-size: 11px; }
  .form-label .optional { color: var(--ink-faint); margin-left: 4px; font-size: 11px; font-weight: 400; }
  .form-input, .form-textarea {
    width: 100%; border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    padding: 12px 14px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px;
    color: var(--ink); background: var(--bg); transition: border-color 0.15s; outline: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: #fff; }
  .form-input.error, .form-textarea.error { border-color: var(--red); }
  .form-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }
  .form-group { margin-bottom: 20px; }

  .point-quick { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .btn-quick {
    flex: 1; min-width: 52px; padding: 10px 4px;
    border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    background: var(--bg); font-family: 'Kaisei Decol', serif;
    font-size: 15px; font-weight: 700; color: var(--ink); cursor: pointer; transition: all 0.15s;
  }
  .btn-quick:active, .btn-quick.selected {
    background: var(--accent-bg); border-color: var(--accent); color: var(--accent);
  }

  .error-msg { color: var(--red); font-size: 12px; margin-top: 5px; display: none; }
  .error-msg.show { display: block; }

  .btn-submit {
    width: 100%; padding: 16px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-family: 'Kaisei Decol', serif; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 16px rgba(232,132,90,0.35); letter-spacing: 0.05em;
  }
  .btn-submit:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(232,132,90,0.2); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* 集計 */
  .summary-section { margin-bottom: 24px; }
  .summary-row {
    background: var(--paper2); border: 1.5px solid var(--line);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .summary-row-label { font-size: 14px; color: var(--ink-light); display: flex; align-items: center; gap: 8px; }
  .summary-row-value { font-family: 'Kaisei Decol', serif; font-size: 20px; font-weight: 700; color: var(--ink); }
  .summary-row-value .unit { font-family: 'Zen Maru Gothic', sans-serif; font-size: 12px; color: var(--ink-light); }

  .month-nav {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin-bottom: 16px; background: var(--paper2);
    border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 10px 16px;
  }
  .month-nav button { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--ink-light); padding: 4px 8px; border-radius: 8px; line-height: 1; }
  .month-label { font-family: 'Kaisei Decol', serif; font-size: 16px; font-weight: 700; color: var(--ink); min-width: 90px; text-align: center; }

  /* トースト */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: #fff; padding: 12px 24px;
    border-radius: 100px; font-size: 14px; font-weight: 500;
    z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ダイアログ */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(58,48,40,0.4); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.show { display: flex; }
  .dialog {
    background: var(--paper2); border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px; width: 100%; max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .dialog-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .dialog-msg { font-size: 14px; color: var(--ink-light); line-height: 1.6; margin-bottom: 24px; }
  .dialog-btns { display: flex; gap: 12px; }
  .btn-cancel {
    flex: 1; padding: 14px; border: 1.5px solid var(--line);
    border-radius: var(--radius-sm); background: var(--bg);
    font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; color: var(--ink-light); cursor: pointer;
  }
  .btn-confirm-delete {
    flex: 1; padding: 14px; border: none; border-radius: var(--radius-sm);
    background: var(--red); font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
  }

  .page-heading { font-family: 'Kaisei Decol', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }

  /* スケルトン */
  .skeleton { background: linear-gradient(90deg, var(--line) 25%, var(--bg) 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skeleton-card { height: 90px; border-radius: var(--radius); margin-bottom: 10px; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">📓 きょうのいいこと 🌸</div>
  <div class="net-status loading" id="net-status">読込中</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('home')">🏠 ホーム</button>
  <button class="tab-btn" onclick="showTab('record')">✏️ 記録する</button>
  <button class="tab-btn" onclick="showTab('history')">📋 履歴</button>
  <button class="tab-btn" onclick="showTab('stats')">📊 集計</button>
</nav>

<!-- ホーム -->
<div id="page-home" class="page active">
  <div class="stats-grid">
    <div class="stat-card wide accent-card">
      <div class="stat-icon">⭐</div>
      <div>
        <div class="stat-label">合計ポイント</div>
        <div class="stat-value" id="home-total">— <span>pt</span></div>
      </div>
    </div>
    <div class="stat-card green-card">
      <div class="stat-label">今日のポイント</div>
      <div class="stat-value" id="home-today">— <span>pt</span></div>
    </div>
    <div class="stat-card blue-card">
      <div class="stat-label">記録した回数</div>
      <div class="stat-value" id="home-count">— <span>回</span></div>
    </div>
  </div>
  <div class="section-title">📌 最近の記録</div>
  <div id="home-recent">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
  <div style="text-align:center;margin-top:20px;">
    <button onclick="showTab('record')"
      style="background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
             font-family:'Kaisei Decol',serif;font-size:16px;font-weight:700;
             padding:14px 32px;cursor:pointer;box-shadow:0 4px 16px rgba(232,132,90,0.35);">
      ＋ 記録する
    </button>
  </div>
</div>

<!-- 記録する -->
<div id="page-record" class="page">
  <div class="form-card">
    <div class="form-group">
      <label class="form-label">なにをした？<span class="required">必須</span></label>
      <input type="text" id="input-title" class="form-input"
        placeholder="例：宿題を最後までやった" maxlength="100">
      <div class="error-msg" id="err-title">なにをしたか入力してください</div>
    </div>
    <div class="form-group">
      <label class="form-label">ポイント<span class="required">必須</span></label>
      <div class="point-quick">
        <button class="btn-quick" onclick="setPoint(10)">10</button>
        <button class="btn-quick" onclick="setPoint(50)">50</button>
        <button class="btn-quick" onclick="setPoint(100)">100</button>
        <button class="btn-quick" onclick="setPoint(500)">500</button>
        <button class="btn-quick" onclick="setPoint(1000)">1000</button>
      </div>
      <input type="number" id="input-point" class="form-input"
        placeholder="自由入力（1〜100,000,000）" min="1" max="100000000"
        oninput="clearQuickSelect()">
      <div class="error-msg" id="err-point">1〜100,000,000のポイントを入力してください</div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">メモ<span class="optional">任意</span></label>
      <textarea id="input-memo" class="form-textarea"
        placeholder="ひとことメモ（なくてもOK）" maxlength="300"></textarea>
    </div>
  </div>
  <button class="btn-submit" id="btn-submit" onclick="submitRecord()">📝 登録する</button>
</div>

<!-- 履歴 -->
<div id="page-history" class="page">
  <div class="page-heading">📋 すべての記録</div>
  <div class="record-list" id="history-list">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
  <div class="empty-state" id="history-empty" style="display:none">
    <div class="empty-icon">📭</div>
    <p>まだ記録がありません。<br>「記録する」からはじめてみよう！</p>
  </div>
</div>

<!-- 集計 -->
<div id="page-stats" class="page">
  <div class="page-heading">📊 集計</div>
  <div class="summary-section">
    <div class="section-title">🌟 全期間</div>
    <div class="summary-row">
      <div class="summary-row-label">⭐ 合計ポイント</div>
      <div class="summary-row-value" id="stats-total">— <span class="unit">pt</span></div>
    </div>
    <div class="summary-row">
      <div class="summary-row-label">📋 記録した回数</div>
      <div class="summary-row-value" id="stats-count">— <span class="unit">回</span></div>
    </div>
  </div>
  <div class="summary-section">
    <div class="section-title">☀️ 今日</div>
    <div class="summary-row">
      <div class="summary-row-label">⭐ 今日のポイント</div>
      <div class="summary-row-value" id="stats-today-pt">— <span class="unit">pt</span></div>
    </div>
    <div class="summary-row">
      <div class="summary-row-label">📋 今日の記録数</div>
      <div class="summary-row-value" id="stats-today-count">— <span class="unit">回</span></div>
    </div>
  </div>
  <div class="summary-section">
    <div class="month-nav">
      <button onclick="prevMonth()">‹</button>
      <div class="month-label" id="stats-month-label"></div>
      <button onclick="nextMonth()">›</button>
    </div>
    <div class="summary-row">
      <div class="summary-row-label">⭐ 月間ポイント</div>
      <div class="summary-row-value" id="stats-month-pt">— <span class="unit">pt</span></div>
    </div>
    <div class="summary-row">
      <div class="summary-row-label">📋 月間の記録数</div>
      <div class="summary-row-value" id="stats-month-count">— <span class="unit">回</span></div>
    </div>
  </div>
</div>

<!-- 削除確認ダイアログ -->
<div class="overlay" id="delete-overlay">
  <div class="dialog">
    <div class="dialog-title">🗑️ 削除しますか？</div>
    <div class="dialog-msg" id="dialog-msg">この記録を削除します。元に戻せません。</div>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeDialog()">キャンセル</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定（このファイル固有）
// ============================================================
const OWNER      = "saru";
const API_BASE   = "https://iikoto-api.sslowdayss.workers.dev";
const MAX_POINT  = 100_000_000;

// ============================================================
// 状態
// ============================================================
let records      = [];   // APIから取得したキャッシュ
let isLoading    = false;

let statsYear    = new Date().getFullYear();
let statsMonth   = new Date().getMonth();

let deleteTargetId = null;

// ============================================================
// API層（ここを差し替えればバックエンドを変更できる）
// ============================================================
async function apiGetRecords() {
  const res = await fetch(`${API_BASE}/api/iikoto?owner=${OWNER}`);
  if (!res.ok) throw new Error(`GET failed: ${res.status}`);
  const data = await res.json();
  return data.records; // [{ id, owner, title, point, memo, created_at }, ...]
}

async function apiPostRecord(title, point, memo) {
  const res = await fetch(`${API_BASE}/api/iikoto`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ owner: OWNER, title, point, memo }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `POST failed: ${res.status}`);
  }
  return (await res.json()).record;
}

async function apiDeleteRecord(id) {
  const res = await fetch(`${API_BASE}/api/iikoto/${id}`, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ owner: OWNER }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `DELETE failed: ${res.status}`);
  }
  return true;
}

// ============================================================
// データ取得＆全画面更新
// ============================================================
async function fetchAndUpdate() {
  setStatus("loading");
  try {
    records = await apiGetRecords();
    setStatus("ok");
    updateAll();
  } catch (e) {
    console.error(e);
    setStatus("error");
    showToast("⚠️ データの取得に失敗しました");
  }
}

// ============================================================
// 集計ヘルパー
// ============================================================
function calcTotal(recs) {
  return recs.reduce((s, r) => s + r.point, 0);
}

function calcToday(recs) {
  const today = new Date().toLocaleDateString("ja-JP");
  return recs.filter(r => new Date(r.created_at).toLocaleDateString("ja-JP") === today);
}

function calcMonth(recs, year, month) {
  return recs.filter(r => {
    const d = new Date(r.created_at);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

// ============================================================
// 表示更新
// ============================================================
function updateAll() {
  updateHome();
  updateHistory();
  updateStats();
}

function updateHome() {
  const todayRecs = calcToday(records);
  setText("home-total", fmt(calcTotal(records)) + " pt");
  setText("home-today", fmt(calcTotal(todayRecs)) + " pt");
  setText("home-count", records.length + " 回");

  const el = document.getElementById("home-recent");
  const recent = records.slice(0, 5);
  if (recent.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✨</div>
      <p>まだ記録がありません。<br>今日のいいことを記録してみよう！</p>
    </div>`;
  } else {
    el.innerHTML = recent.map(r => recordCardHTML(r, false)).join("");
  }
}

function updateHistory() {
  const list  = document.getElementById("history-list");
  const empty = document.getElementById("history-empty");
  if (records.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    list.innerHTML = records.map(r => recordCardHTML(r, true)).join("");
  }
}

function updateStats() {
  const todayRecs = calcToday(records);
  const monthRecs = calcMonth(records, statsYear, statsMonth);

  setText("stats-total",       fmt(calcTotal(records))    + ` <span class="unit">pt</span>`);
  setText("stats-count",       records.length             + ` <span class="unit">回</span>`);
  setText("stats-today-pt",    fmt(calcTotal(todayRecs))  + ` <span class="unit">pt</span>`);
  setText("stats-today-count", todayRecs.length           + ` <span class="unit">回</span>`);
  setText("stats-month-pt",    fmt(calcTotal(monthRecs))  + ` <span class="unit">pt</span>`);
  setText("stats-month-count", monthRecs.length           + ` <span class="unit">回</span>`);
  setText("stats-month-label", `${statsYear}年${statsMonth + 1}月`);
}

function recordCardHTML(r, showDelete) {
  const d       = new Date(r.created_at);
  const today   = new Date().toLocaleDateString("ja-JP");
  const isToday = d.toLocaleDateString("ja-JP") === today;
  const dateStr = d.toLocaleDateString("ja-JP", { year:"numeric", month:"short", day:"numeric" })
                + " " + d.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });

  const badge   = isToday ? `<span class="today-badge">今日</span>` : "";
  const memo    = r.memo ? `<div class="record-memo">💬 ${esc(r.memo)}</div>` : "";
  const delBtn  = showDelete
    ? `<button class="btn-delete" onclick="requestDelete(${r.id},'${esc(r.title)}')">🗑️ 削除</button>`
    : "";

  return `<div class="record-card">
    <div class="record-header">
      <div class="record-title">${esc(r.title)}</div>
      <div class="record-point">${fmt(r.point)}</div>
    </div>
    <div class="record-meta">${dateStr}${badge}</div>
    ${memo}
    ${showDelete ? `<div class="record-footer">${delBtn}</div>` : ""}
  </div>`;
}

// ============================================================
// フォーム送信
// ============================================================
async function submitRecord() {
  const title    = document.getElementById("input-title").value.trim();
  const pointRaw = document.getElementById("input-point").value.trim();
  const memo     = document.getElementById("input-memo").value.trim();
  let valid = true;

  if (!title) { showErr("err-title", "input-title"); valid = false; }
  else         { hideErr("err-title", "input-title"); }

  const point = parseInt(pointRaw, 10);
  if (!pointRaw || isNaN(point) || point < 1 || point > MAX_POINT || String(point) !== pointRaw) {
    document.getElementById("err-point").textContent = "1〜100,000,000のポイントを入力してください";
    showErr("err-point", "input-point");
    valid = false;
  } else {
    // クライアント側の合計上限チェック
    if (calcTotal(records) + point > MAX_POINT) {
      document.getElementById("err-point").textContent = "合計ポイントが上限（100,000,000）を超えてしまいます";
      showErr("err-point", "input-point");
      valid = false;
    } else {
      hideErr("err-point", "input-point");
    }
  }

  if (!valid) return;

  const btn = document.getElementById("btn-submit");
  btn.disabled = true;
  btn.textContent = "送信中…";

  try {
    await apiPostRecord(title, point, memo);
    // フォームリセット
    document.getElementById("input-title").value = "";
    document.getElementById("input-point").value = "";
    document.getElementById("input-memo").value  = "";
    document.querySelectorAll(".btn-quick").forEach(b => b.classList.remove("selected"));
    showToast("✅ 記録しました！");
    await fetchAndUpdate();
    showTab("home");
  } catch (e) {
    showToast("⚠️ " + (e.message || "登録に失敗しました"));
  } finally {
    btn.disabled = false;
    btn.textContent = "📝 登録する";
  }
}

// ============================================================
// ポイントボタン
// ============================================================
function setPoint(v) {
  document.getElementById("input-point").value = v;
  hideErr("err-point", "input-point");
  document.querySelectorAll(".btn-quick").forEach(b =>
    b.classList.toggle("selected", parseInt(b.textContent) === v)
  );
}

function clearQuickSelect() {
  document.querySelectorAll(".btn-quick").forEach(b => b.classList.remove("selected"));
  hideErr("err-point", "input-point");
}

// ============================================================
// 削除
// ============================================================
function requestDelete(id, title) {
  deleteTargetId = id;
  document.getElementById("dialog-msg").textContent =
    `「${title}」の記録を削除します。元に戻せません。`;
  document.getElementById("delete-overlay").classList.add("show");
}

function closeDialog() {
  deleteTargetId = null;
  document.getElementById("delete-overlay").classList.remove("show");
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  const id = deleteTargetId;
  closeDialog();

  // 楽観的UI：先にキャッシュから除く
  records = records.filter(r => r.id !== id);
  updateAll();

  try {
    await apiDeleteRecord(id);
    showToast("🗑️ 削除しました");
    await fetchAndUpdate(); // サーバー状態と同期
  } catch (e) {
    showToast("⚠️ 削除に失敗しました。再読み込みします");
    await fetchAndUpdate();
  }
}

// ============================================================
// タブ
// ============================================================
function showTab(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  const idx = ["home","record","history","stats"].indexOf(name);
  if (idx >= 0) document.querySelectorAll(".tab-btn")[idx].classList.add("active");
}

// ============================================================
// 集計月ナビ
// ============================================================
function prevMonth() {
  statsMonth--;
  if (statsMonth < 0) { statsMonth = 11; statsYear--; }
  updateStats();
}

function nextMonth() {
  statsMonth++;
  if (statsMonth > 11) { statsMonth = 0; statsYear++; }
  updateStats();
}

// ============================================================
// ステータス表示
// ============================================================
function setStatus(state) {
  const el = document.getElementById("net-status");
  if (state === "ok") {
    el.textContent = "✓ 同期済み";
    el.className   = "net-status";
  } else if (state === "loading") {
    el.textContent = "読込中…";
    el.className   = "net-status loading";
  } else {
    el.textContent = "⚠ エラー";
    el.className   = "net-status error";
  }
}

// ============================================================
// ユーティリティ
// ============================================================
function fmt(n) { return n.toLocaleString("ja-JP"); }

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function setText(id, html) { document.getElementById(id).innerHTML = html; }

function showErr(errId, inputId) {
  document.getElementById(errId).classList.add("show");
  document.getElementById(inputId).classList.add("error");
}
function hideErr(errId, inputId) {
  document.getElementById(errId).classList.remove("show");
  document.getElementById(inputId).classList.remove("error");
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// ============================================================
// 起動
// ============================================================
document.getElementById("delete-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeDialog();
});

fetchAndUpdate();
</script>
</body>
</html>
