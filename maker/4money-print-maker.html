<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>お金・お買い物計算プリントメーカー</title>

  <!-- ホーム画面追加用：maker/img/money-print.png を使います -->
  <link rel="apple-touch-icon" href="img/money-print.png">
  <link rel="icon" type="image/png" href="img/money-print.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="お金プリント">
  <meta name="theme-color" content="#fff4cf">

  <style>
    :root {
      --bg: #fff7df;
      --card: #ffffff;
      --main: #ffbf5e;
      --accent: #8bdc9b;
      --text: #2f3328;
      --soft: #fffaf0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #fff7df 0%, #eaf8ef 100%);
      color: var(--text);
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      text-align: center;
      margin: 12px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #667047;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel, .preview-wrap {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(95, 76, 31, 0.16);
      padding: 18px;
    }

    .panel h2, .preview-wrap h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: 900;
      margin: 14px 0 6px;
      font-size: 15px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e8d6a9;
      border-radius: 14px;
      font-size: 16px;
      background: #fffdf7;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .checkbox-row input {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }

    .main-btn { background: var(--main); color: #4a2e00; }
    .print-btn { background: #79dc8c; color: #123a1d; }
    .sub-btn { background: #eaf5ff; color: #154a72; }

    .note {
      margin-top: 14px;
      padding: 12px;
      background: #fffaf0;
      border-left: 5px solid var(--main);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-area {
      overflow: auto;
      background: #ece5d6;
      border-radius: 18px;
      padding: 16px;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      color: #222;
      padding: 12mm 12mm;
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10mm;
      margin-bottom: 7px;
    }

    .print-title {
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .title-stars {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.8fr;
      gap: 8px;
      font-size: 15px;
      margin-bottom: 7mm;
      align-items: end;
    }

    .meta-box {
      border-bottom: 1.8px solid #222;
      min-height: 26px;
      padding: 2px 4px;
    }

    .sticker-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24mm;
      height: 10mm;
      margin-left: 2mm;
      border: 1.8px solid #222;
      border-radius: 6px;
      font-size: 11px;
      color: #777;
      vertical-align: middle;
    }

    .problems {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6mm 7mm;
    }

    .problem {
      min-height: 34mm;
      page-break-inside: avoid;
      border: 1.8px solid #222;
      border-radius: 8px;
      padding: 3mm 4mm;
    }

    .problem-number {
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 2mm;
    }

    .question-text {
      font-size: 17px;
      line-height: 1.55;
      font-weight: 800;
    }

    .items-line {
      margin: 1mm 0;
      font-size: 16px;
      line-height: 1.55;
    }

    .answer-row {
      margin-top: 2mm;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2mm;
      font-size: 16px;
      font-weight: 900;
    }

    .answer-line {
      display: inline-block;
      width: 28mm;
      height: 9mm;
      border-bottom: 2px solid #222;
    }

    .choice-row {
      margin-top: 3mm;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2mm 5mm;
      font-size: 15px;
      font-weight: 800;
    }

    .answer-small {
      margin-top: 2mm;
      font-size: 12px;
      color: #666;
      text-align: right;
    }

    .paper.count-12 .problems {
      gap: 4mm 7mm;
    }

    .paper.count-12 .problem {
      min-height: 30mm;
      padding: 2.5mm 3.5mm;
    }

    .paper.count-12 .question-text {
      font-size: 15px;
      line-height: 1.45;
    }

    .paper.count-12 .items-line {
      font-size: 14px;
      line-height: 1.45;
    }

    .paper.count-12 .answer-line {
      width: 24mm;
      height: 7mm;
    }

    .paper.count-16 .print-title {
      font-size: 23px;
    }

    .paper.count-16 .title-stars {
      font-size: 16px;
    }

    .paper.count-16 .title-row {
      gap: 6mm;
      margin-bottom: 4px;
    }

    .paper.count-16 .meta {
      margin-bottom: 5mm;
      font-size: 13px;
    }

    .paper.count-16 .problems {
      gap: 3mm 5mm;
    }

    .paper.count-16 .problem {
      min-height: 24mm;
      padding: 2mm 3mm;
    }

    .paper.count-16 .problem-number {
      font-size: 11px;
      margin-bottom: 1mm;
    }

    .paper.count-16 .question-text {
      font-size: 13px;
      line-height: 1.35;
    }

    .paper.count-16 .items-line {
      font-size: 12px;
      line-height: 1.35;
    }

    .paper.count-16 .answer-row {
      font-size: 12px;
      margin-top: 1mm;
    }

    .paper.count-16 .answer-line {
      width: 20mm;
      height: 6mm;
    }

    .paper.count-16 .choice-row {
      font-size: 12px;
      gap: 1mm 3mm;
      margin-top: 1mm;
    }

    .paper.count-16 .sticker-box {
      width: 20mm;
      height: 8mm;
      font-size: 9px;
    }

    .answer-page { margin-top: 16px; }

    .answers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7mm 5mm;
      font-size: 17px;
      margin-top: 10mm;
    }

    .answer-item {
      border-bottom: 1px solid #999;
      padding-bottom: 3mm;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .paper {
        transform: scale(0.55);
        transform-origin: top left;
        margin: 0;
      }
      .preview-area { height: 720px; }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white; }
      header, .panel, .preview-wrap > h2, .note, .no-print { display: none !important; }
      .app { max-width: none; padding: 0; }
      .layout { display: block; }
      .preview-wrap { box-shadow: none; padding: 0; border-radius: 0; }
      .preview-area { overflow: visible; padding: 0; background: white; border-radius: 0; }
      .paper {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        transform: none !important;
        transform-origin: initial !important;
      }
      .paper:last-child { page-break-after: auto; }
      .answer-page.hidden-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>お金・お買い物計算プリントメーカー</h1>
      <div class="subtitle">合計・おつり・買えるかな？をA4プリントで練習できます</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>プリント設定</h2>

        <label for="childName">なまえ</label>
        <input id="childName" type="text" placeholder="れい：はる" />

        <label for="titleText">プリント名</label>
        <input id="titleText" type="text" value="お買い物計算プリント" />

        <div class="row">
          <div>
            <label for="questionType">問題タイプ</label>
            <select id="questionType">
              <option value="total" selected>合計はいくら？</option>
              <option value="change">おつりはいくら？</option>
              <option value="canBuy">買えるかな？</option>
              <option value="mix">ミックス</option>
            </select>
          </div>
          <div>
            <label for="level">むずかしさ</label>
            <select id="level">
              <option value="easy">かんたん：100円まで</option>
              <option value="normal" selected>ふつう：500円まで</option>
              <option value="hard">むずかしい：1000円まで</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="count">問題数</label>
            <select id="count">
              <option value="8" selected>8問</option>
              <option value="12">12問</option>
              <option value="16">16問</option>
            </select>
          </div>
          <div>
            <label for="dateText">日付</label>
            <input id="dateText" type="text" />
          </div>
        </div>

        <div class="checkbox-row">
          <input id="showAnswers" type="checkbox" />
          <span>問題ページに小さく答えを表示</span>
        </div>

        <div class="checkbox-row">
          <input id="printAnswerPage" type="checkbox" checked />
          <span>答えページも作る</span>
        </div>

        <div class="buttons">
          <button class="main-btn" onclick="makeWorksheet()">問題をつくる</button>
          <button class="print-btn" onclick="window.print()">A4で印刷する</button>
          <button class="sub-btn" onclick="resetSettings()">設定をもどす</button>
        </div>

        <div class="note no-print">
          最初は「8問」がおすすめです。<br>
          16問はA4に収めるため、少しコンパクトになります。
        </div>
      </section>

      <section class="preview-wrap">
        <h2>プレビュー</h2>
        <div class="preview-area" id="previewArea">
          <section class="paper" id="worksheetPage">
            <div class="title-row">
              <div class="print-title" id="paperTitle">お買い物計算プリント</div>
              <div class="title-stars">☆☆☆☆☆</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="paperName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="paperDate">　月　日</span></div>
              <div>シール：<span class="sticker-box">はる</span></div>
            </div>
            <div class="problems" id="problems"></div>
          </section>

          <section class="paper answer-page" id="answerPage">
            <div class="title-row">
              <div class="print-title">こたえ</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="answerName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="answerDate">　月　日</span></div>
              <div></div>
            </div>
            <div class="answers-grid" id="answers"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const ITEMS = [
      "あめ", "ガム", "チョコ", "クッキー", "ジュース", "パン", "おにぎり", "アイス",
      "りんご", "バナナ", "えんぴつ", "けしゴム", "ノート", "シール", "カード", "えほん"
    ];

    let currentProblems = [];

    function todayText() {
      const d = new Date();
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function yen(num) {
      return `${num}円`;
    }

    function getLevelSetting(level) {
      if (level === "easy") {
        return { priceMin: 10, priceMax: 90, step: 10, payOptions: [100], itemCount: [1, 2] };
      }
      if (level === "normal") {
        return { priceMin: 30, priceMax: 300, step: 10, payOptions: [100, 500], itemCount: [2, 3] };
      }
      return { priceMin: 50, priceMax: 800, step: 10, payOptions: [500, 1000], itemCount: [2, 3] };
    }

    function randomPrice(setting) {
      const unitMin = Math.ceil(setting.priceMin / setting.step);
      const unitMax = Math.floor(setting.priceMax / setting.step);
      return rand(unitMin, unitMax) * setting.step;
    }

    function pickItems(setting) {
      const count = rand(setting.itemCount[0], setting.itemCount[1]);
      const used = new Set();
      const items = [];
      while (items.length < count) {
        const name = ITEMS[rand(0, ITEMS.length - 1)];
        if (used.has(name)) continue;
        used.add(name);
        items.push({ name, price: randomPrice(setting) });
      }
      return items;
    }

    function sumItems(items) {
      return items.reduce((sum, item) => sum + item.price, 0);
    }

    function pickPayment(total, setting) {
      const sorted = [...setting.payOptions].sort((a, b) => a - b);
      for (const pay of sorted) {
        if (pay >= total) return pay;
      }
      return sorted[sorted.length - 1];
    }

    function makeOneProblem(type, level) {
      const setting = getLevelSetting(level);
      let qType = type;
      if (type === "mix") {
        const types = ["total", "change", "canBuy"];
        qType = types[rand(0, types.length - 1)];
      }

      let items = pickItems(setting);
      let total = sumItems(items);

      if (qType === "change") {
        let guard = 0;
        while (total > Math.max(...setting.payOptions) && guard < 100) {
          guard++;
          items = pickItems(setting);
          total = sumItems(items);
        }
        const payment = pickPayment(total, setting);
        return { type: qType, items, total, payment, answer: payment - total };
      }

      if (qType === "canBuy") {
        const payment = setting.payOptions[rand(0, setting.payOptions.length - 1)];
        return { type: qType, items, total, payment, answer: payment >= total ? "買える" : "買えない" };
      }

      return { type: qType, items, total, payment: null, answer: total };
    }

    function itemsText(items) {
      return items.map(item => `${item.name} ${yen(item.price)}`).join("、");
    }

    function makeProblemHtml(problem, index, showAnswers) {
      let question = "";
      let answerLabel = "";
      let choices = "";

      if (problem.type === "total") {
        question = "合計はいくらですか。";
        answerLabel = "こたえ";
      } else if (problem.type === "change") {
        question = `${yen(problem.payment)}出しました。おつりはいくらですか。`;
        answerLabel = "おつり";
      } else {
        question = `${yen(problem.payment)}で買えますか。`;
        answerLabel = "こたえ";
        choices = `<div class="choice-row"><div>□ 買える</div><div>□ 買えない</div></div>`;
      }

      return `
        <div class="problem-number">${index + 1}</div>
        <div class="items-line">${itemsText(problem.items)}</div>
        <div class="question-text">${question}</div>
        ${choices}
        <div class="answer-row"><span>${answerLabel}</span><span class="answer-line"></span><span>${problem.type === "canBuy" ? "" : "円"}</span></div>
        ${showAnswers ? `<div class="answer-small">こたえ：${problem.answer}${typeof problem.answer === "number" ? "円" : ""}</div>` : ""}
      `;
    }

    function makeWorksheet() {
      const childName = document.getElementById("childName").value.trim();
      const titleText = document.getElementById("titleText").value.trim() || "お買い物計算プリント";
      const questionType = document.getElementById("questionType").value;
      const level = document.getElementById("level").value;
      const count = Number(document.getElementById("count").value);
      const dateText = document.getElementById("dateText").value.trim() || todayText();
      const showAnswers = document.getElementById("showAnswers").checked;
      const printAnswerPage = document.getElementById("printAnswerPage").checked;

      const worksheetPage = document.getElementById("worksheetPage");
      worksheetPage.classList.remove("count-8", "count-12", "count-16");
      worksheetPage.classList.add(`count-${count}`);

      document.getElementById("paperTitle").textContent = titleText;
      document.getElementById("paperName").textContent = childName || "　　　　　　　　";
      document.getElementById("paperDate").textContent = dateText;
      document.getElementById("answerName").textContent = childName || "　　　　　　　　";
      document.getElementById("answerDate").textContent = dateText;

      currentProblems = [];
      for (let i = 0; i < count; i++) {
        currentProblems.push(makeOneProblem(questionType, level));
      }

      const problemsEl = document.getElementById("problems");
      const answersEl = document.getElementById("answers");
      problemsEl.innerHTML = "";
      answersEl.innerHTML = "";

      currentProblems.forEach((p, index) => {
        const problem = document.createElement("div");
        problem.className = "problem";
        problem.innerHTML = makeProblemHtml(p, index, showAnswers);
        problemsEl.appendChild(problem);

        const answer = document.createElement("div");
        answer.className = "answer-item";
        answer.textContent = `${index + 1}. ${p.answer}${typeof p.answer === "number" ? "円" : ""}`;
        answersEl.appendChild(answer);
      });

      const answerPage = document.getElementById("answerPage");
      if (printAnswerPage) {
        answerPage.classList.remove("hidden-print");
        answerPage.style.display = "block";
      } else {
        answerPage.classList.add("hidden-print");
        answerPage.style.display = "none";
      }
    }

    function resetSettings() {
      document.getElementById("childName").value = "";
      document.getElementById("titleText").value = "お買い物計算プリント";
      document.getElementById("questionType").value = "total";
      document.getElementById("level").value = "normal";
      document.getElementById("count").value = "8";
      document.getElementById("dateText").value = todayText();
      document.getElementById("showAnswers").checked = false;
      document.getElementById("printAnswerPage").checked = true;
      makeWorksheet();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dateText").value = todayText();
      makeWorksheet();
    });
  </script>
</body>
</html>
