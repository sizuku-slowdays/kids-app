
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:1rem 0}
.header{text-align:center;margin-bottom:1rem}
.header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:3px}
.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer}
.tab-btn.active{background:#185FA5;color:#E6F1FB;border-color:#185FA5;font-weight:500}
.score-bar{display:flex;justify-content:space-around;padding:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:10px}
.score-item{text-align:center}
.score-label{font-size:11px;color:var(--color-text-secondary)}
.score-val{font-size:16px;font-weight:500}
.question-banner{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:8px;text-align:center}
.q-label{font-size:11px;color:var(--color-text-secondary)}
.q-name{font-size:20px;font-weight:500;color:#185FA5;margin-top:2px}
.map-outer{width:100%;overflow:auto;-webkit-overflow-scrolling:touch;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:#ddeeff}
.pref-path{fill:#8aabcc;stroke:#fff;stroke-width:1.2;cursor:pointer;transition:fill 0.1s}
.pref-path:hover{fill:#4d88bb}
.pref-path.correct{fill:#52a832;cursor:default}
.pref-path.wrong{fill:#d94040;cursor:default}
.pref-path.reveal{fill:#e09820;cursor:default}
.pref-path.done{cursor:default}
.feedback-bar{margin:8px 0;padding:10px;border-radius:var(--border-radius-md);text-align:center;font-size:14px;font-weight:500}
.feedback-bar.correct{background:#EAF3DE;color:#27500A}
.feedback-bar.wrong{background:#FCEBEB;color:#501313}
.next-btn{display:block;width:100%;padding:11px;background:#185FA5;color:#E6F1FB;border:none;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;font-weight:500;margin-top:8px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem}
.opt-btn{padding:11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer}
.opt-btn:hover:not(:disabled){background:var(--color-background-secondary)}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.result-screen{text-align:center;padding:2rem 1rem}
.result-screen h2{font-size:24px;font-weight:500;margin-bottom:8px}
.result-screen p{color:var(--color-text-secondary);font-size:14px;margin-bottom:1.5rem}
.restart-btn{padding:11px 28px;background:#185FA5;color:#E6F1FB;border:none;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;font-weight:500}
</style>

<div id="app">
  <div class="header">
    <h1>都道府県パズル</h1>
    <p>日本の都道府県を覚えよう</p>
  </div>
  <div class="mode-tabs">
    <button class="tab-btn active" id="tab-silhouette" onclick="setMode('silhouette')">シルエット当て</button>
    <button class="tab-btn" id="tab-map" onclick="setMode('map')">地図タップ</button>
    <button class="tab-btn" id="tab-capital" onclick="setMode('capital')">県庁所在地</button>
  </div>
  <div id="game-area"></div>
</div>

<script>
const PREFS=[

  {id:"02",name:"青森県",capital:"青森市"},

  {id:"17",name:"石川県",capital:"金沢市"},
  {id:"18",name:"福井県",capital:"福井市"},
  {id:"19",name:"山梨県",capital:"甲府市"},
  {id:"20",name:"長野県",capital:"長野市"},
  {id:"21",name:"岐阜県",capital:"岐阜市"},
  {id:"22",name:"静岡県",capital:"静岡市"},
  {id:"23",name:"愛知県",capital:"名古屋市"},
  {id:"24",name:"三重県",capital:"津市"},
  {id:"25",name:"滋賀県",capital:"大津市"},
  {id:"26",name:"京都府",capital:"京都市"},
  {id:"27",name:"大阪府",capital:"大阪市"},
  {id:"28",name:"兵庫県",capital:"神戸市"},
  {id:"29",name:"奈良県",capital:"奈良市"},
  {id:"30",name:"和歌山県",capital:"和歌山市"},
  {id:"31",name:"鳥取県",capital:"鳥取市"},
  {id:"32",name:"島根県",capital:"松江市"},
  {id:"33",name:"岡山県",capital:"岡山市"},
  {id:"34",name:"広島県",capital:"広島市"},
  {id:"35",name:"山口県",capital:"山口市"},
  {id:"36",name:"徳島県",capital:"徳島市"},
  {id:"37",name:"香川県",capital:"高松市"},
  {id:"38",name:"愛媛県",capital:"松山市"},
  {id:"39",name:"高知県",capital:"高知市"},
  {id:"40",name:"福岡県",capital:"福岡市"},
  {id:"41",name:"佐賀県",capital:"佐賀市"},
  {id:"42",name:"長崎県",capital:"長崎市"},
  {id:"43",name:"熊本県",capital:"熊本市"},
  {id:"44",name:"大分県",capital:"大分市"},
  {id:"45",name:"宮崎県",capital:"宮崎市"},
  {id:"46",name:"鹿児島県",capital:"鹿児島市"},
  {id:"47",name:"沖縄県",capital:"那覇市"},
];

// Real geographic coordinate-based SVG paths
// Japan lon 122-147, lat 24-46, projected to 400x500 SVG
const PATHS={
"01":"M304,11 L368,34 L376,57 L352,80 L320,96 L296,96 L280,80 L285,57 L296,34 Z",
"02":"M312,100 L304,125 L296,130 L280,125 L288,102 Z",
"03":"M317,125 L315,148 L312,166 L301,166 L296,148 L301,125 Z",
"04":"M312,166 L312,182 L304,193 L296,182 L293,171 L301,166 Z",
"05":"M301,125 L296,148 L288,166 L280,159 L277,136 L288,125 Z",
"06":"M296,166 L293,182 L288,193 L280,193 L277,182 L280,166 Z",
"07":"M304,193 L304,209 L296,216 L280,209 L272,205 L280,193 L293,182 L296,193 Z",
"08":"M301,209 L296,232 L288,239 L280,227 L285,216 L296,209 Z",
"09":"M296,209 L296,223 L288,227 L280,223 L280,209 Z",
"10":"M280,209 L280,223 L272,227 L264,223 L264,209 Z",
"11":"M285,223 L285,234 L277,239 L269,234 L272,223 Z",
"12":"M301,232 L296,246 L288,255 L280,255 L280,239 L288,239 L296,232 Z",
"13":"M286,232 L286,239 L280,239 L280,234 Z",
"14":"M285,239 L283,246 L277,250 L272,246 L277,239 Z",
"15":"M280,171 L280,193 L264,209 L248,209 L240,193 L253,182 L264,164 Z",
"16":"M248,209 L248,223 L237,216 L232,209 L240,205 Z",
"17":"M240,193 L245,209 L237,223 L224,216 L232,205 Z",
"18":"M232,223 L229,232 L221,239 L216,227 L221,216 Z",
"19":"M269,232 L269,246 L261,250 L253,246 L256,232 Z",
"20":"M264,209 L264,227 L256,239 L248,239 L240,227 L248,209 Z",
"21":"M248,223 L248,239 L237,246 L229,239 L232,223 Z",
"22":"M269,246 L269,255 L256,261 L248,255 L256,246 Z",
"23":"M248,239 L248,255 L237,261 L232,250 L237,239 Z",
"24":"M237,250 L232,261 L224,273 L221,261 L224,250 Z",
"25":"M229,239 L229,255 L221,255 L216,246 L221,239 Z",
"26":"M221,232 L221,250 L213,250 L208,239 L213,232 Z",
"27":"M221,255 L216,266 L211,261 L213,255 Z",
"28":"M216,246 L216,261 L205,268 L197,261 L200,250 L208,239 Z",
"29":"M224,255 L221,266 L213,268 L213,255 Z",
"30":"M224,266 L221,277 L213,284 L208,273 L213,261 Z",
"31":"M200,239 L200,250 L184,250 L184,239 Z",
"32":"M184,239 L184,250 L168,255 L160,246 L168,239 Z",
"33":"M200,250 L200,261 L189,268 L181,261 L184,250 Z",
"34":"M184,255 L181,268 L168,273 L160,261 L168,250 Z",
"35":"M160,261 L152,273 L141,273 L136,261 L144,250 Z",
"36":"M205,268 L205,277 L192,284 L189,273 L197,268 Z",
"37":"M197,266 L197,273 L184,273 L184,266 Z",
"38":"M184,273 L181,284 L168,291 L160,277 L168,268 Z",
"39":"M192,277 L189,291 L176,300 L168,291 L176,277 Z",
"40":"M144,277 L141,291 L128,291 L128,277 L136,268 Z",
"41":"M133,284 L128,291 L120,291 L120,284 L128,277 Z",
"42":"M128,291 L125,300 L115,307 L112,296 L120,284 Z",
"43":"M144,291 L141,307 L131,314 L128,300 L136,291 Z",
"44":"M157,277 L157,296 L144,300 L141,284 L149,277 Z",
"45":"M152,307 L149,323 L141,330 L136,318 L144,300 Z",
"46":"M144,318 L141,334 L131,341 L128,330 L136,314 Z",
"47":"M104,436 L96,448 L88,443 L93,436 Z",
};

let mode='silhouette',score=0,total=0,streak=0,answered=false,queue=[],currentQ=null;
const QUIZ_COUNT=10;
const SVG_W=400,SVG_H=500;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}
function getOptions(correct,key,n=4){
  const pool=shuffle(PREFS.filter(p=>p.name!==correct.name)).slice(0,n-1).map(p=>p[key]);
  return shuffle([correct[key],...pool]);
}
function setMode(m){
  mode=m;score=0;total=0;streak=0;queue=[];answered=false;
  ['silhouette','map','capital'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('active',id===m);
  });
  startGame();
}
function startGame(){queue=shuffle(PREFS).slice(0,QUIZ_COUNT);nextQuestion();}
function nextQuestion(){
  if(!queue.length){renderResult();return;}
  currentQ=queue.shift();answered=false;
  if(mode==='silhouette')renderSilhouette();
  else if(mode==='map')renderMapQ();
  else renderCapital();
}
function scoreBar(){
  return`<div class="score-bar">
    <div class="score-item"><div class="score-label">正解</div><div class="score-val" style="color:#3B6D11">${score}</div></div>
    <div class="score-item"><div class="score-label">問題数</div><div class="score-val">${total}/${QUIZ_COUNT}</div></div>
    <div class="score-item"><div class="score-label">連続正解</div><div class="score-val" style="color:#BA7517">${streak}</div></div>
  </div>`;
}

// Compute tight bounding box for a path string
function pathBBox(d){
  const pts=d.match(/[\d.]+,[\d.]+/g).map(s=>{const[x,y]=s.split(',');return[+x,+y];});
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  return{minX:Math.min(...xs),minY:Math.min(...ys),maxX:Math.max(...xs),maxY:Math.max(...ys)};
}

function renderSilhouette(){
  const d=PATHS[currentQ.id]||'';
  const opts=getOptions(currentQ,'name');
  let svgContent='';
  if(d){
    const b=pathBBox(d);
    const pad=10,w=b.maxX-b.minX+pad*2,h=b.maxY-b.minY+pad*2;
    // translate path to fit tight viewBox
    const tx=pad-b.minX,ty=pad-b.minY;
    const translated=d.replace(/([\d.]+),([\d.]+)/g,(_,x,y)=>`${(+x+tx).toFixed(1)},${(+y+ty).toFixed(1)}`);
    const scale=Math.min(160/w,130/h);
    const dw=Math.round(w*scale),dh=Math.round(h*scale);
    svgContent=`<svg width="${dw}" height="${dh}" viewBox="0 0 ${w.toFixed(1)} ${h.toFixed(1)}" xmlns="http://www.w3.org/2000/svg">
      <path d="${translated}" fill="#B5D4F4" stroke="#185FA5" stroke-width="1.5"/>
    </svg>`;
  }
  document.getElementById('game-area').innerHTML=scoreBar()+`
  <div style="padding:0 0 1rem">
    <div class="question-banner"><div class="q-label">この形の都道府県はどこ？</div></div>
    <div style="display:flex;justify-content:center;margin:14px 0;min-height:80px;align-items:center">${svgContent}</div>
    <div class="options-grid" id="opts">${getOptions(currentQ,'name').map(o=>`<button class="opt-btn" onclick="answerQ('${o}','name')">${o}</button>`).join('')}</div>
    <div id="feedback"></div>
    <button class="next-btn" id="nxt" style="display:none" onclick="nextQuestion()">次の問題 →</button>
  </div>`;
  // re-render options with correct set
  document.getElementById('opts').innerHTML=opts.map(o=>`<button class="opt-btn" onclick="answerQ('${o}','name')">${o}</button>`).join('');
}

function renderCapital(){
  const opts=getOptions(currentQ,'capital');
  document.getElementById('game-area').innerHTML=scoreBar()+`
  <div style="padding:0 0 1rem">
    <div class="question-banner"><div class="q-label">県庁所在地はどこ？</div><div class="q-name">${currentQ.name}</div></div>
    <div class="options-grid" id="opts">${opts.map(o=>`<button class="opt-btn" onclick="answerQ('${o}','capital')">${o}</button>`).join('')}</div>
    <div id="feedback"></div>
    <button class="next-btn" id="nxt" style="display:none" onclick="nextQuestion()">次の問題 →</button>
  </div>`;
}

function answerQ(chosen,key){
  if(answered)return;
  answered=true;total++;
  const correct=currentQ[key];
  const ok=chosen===correct;
  if(ok){score++;streak++;}else{streak=0;}
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&!ok)b.classList.add('wrong');
  });
  document.getElementById('feedback').innerHTML=`<div class="feedback-bar ${ok?'correct':'wrong'}">${ok?'⭕ 正解！':`❌ 不正解… 正解は「${correct}」`}</div>`;
  document.getElementById('nxt').style.display='block';
}

function buildMapSVG(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',SVG_W);svg.setAttribute('height',SVG_H);
  svg.setAttribute('viewBox',`0 0 ${SVG_W} ${SVG_H}`);
  svg.style.display='block';
  PREFS.forEach(p=>{
    const el=document.createElementNS(ns,'path');
    el.setAttribute('d',PATHS[p.id]||'');
    el.setAttribute('class','pref-path');
    el.dataset.pid=p.id;
    svg.appendChild(el);
  });
  return svg;
}

function renderMapQ(){
  document.getElementById('game-area').innerHTML=scoreBar()+`
  <div class="question-banner"><div class="q-label">地図から探してタップ！</div><div class="q-name">${currentQ.name}</div></div>
  <div id="feedback-map"></div>
  <div class="map-outer" style="height:460px;overflow:auto">
    <div id="map-box" style="width:${SVG_W}px"></div>
  </div>
  <button class="next-btn" id="nxt-map" style="display:none;margin-top:8px" onclick="nextQuestion()">次の問題 →</button>`;

  const svg=buildMapSVG();
  document.getElementById('map-box').appendChild(svg);

  svg.querySelectorAll('.pref-path').forEach(el=>{
    el.addEventListener('click',()=>{
      if(answered)return;
      answered=true;total++;
      const pid=el.dataset.pid;
      const ok=pid===currentQ.id;
      if(ok){score++;streak++;}else{streak=0;}
      svg.querySelectorAll('.pref-path').forEach(p=>{p.classList.add('done');p.style.pointerEvents='none';});
      if(ok){el.classList.add('correct');}
      else{el.classList.add('wrong');const c=svg.querySelector(`[data-pid="${currentQ.id}"]`);if(c)c.classList.add('reveal');}
      document.getElementById('feedback-map').innerHTML=`<div class="feedback-bar ${ok?'correct':'wrong'}">${ok?'⭕ 正解！':'❌ 不正解… 正解はオレンジ色の場所'}</div>`;
      document.getElementById('nxt-map').style.display='block';
    });
  });
}

function renderResult(){
  const pct=Math.round(score/QUIZ_COUNT*100);
  const msg=pct>=80?'🎉 すごい！':pct>=50?'👍 なかなか！':'💪 もう一回！';
  document.getElementById('game-area').innerHTML=`<div class="result-screen"><h2>${msg}</h2><p>${QUIZ_COUNT}問中 <strong>${score}問</strong> 正解 (${pct}%)</p><button class="restart-btn" onclick="setMode('${mode}')">もう一度</button></div>`;
}

startGame();
</script>
