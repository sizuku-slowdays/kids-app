<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九九マスター</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f0;
    --primary: #ff6b35;
    --secondary: #ffd166;
    --accent: #06d6a0;
    --blue: #118ab2;
    --purple: #9b5de5;
    --pink: #f72585;
    --dark: #2d3047;
    --card: #ffffff;
    --shadow: 0 8px 32px rgba(45,48,71,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* floating bubbles background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,107,53,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(9,180,160,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(155,93,229,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    color: var(--dark);
    letter-spacing: 0.06em;
    line-height: 1.2;
  }
  header h1 span { color: var(--primary); }
  header p {
    margin-top: 6px;
    font-size: 0.9rem;
    color: #888;
  }

  /* ── MODE TABS ── */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .tab-btn {
    padding: 8px 20px;
    border-radius: 999px;
    border: 2.5px solid transparent;
    background: white;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .tab-btn.active {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255,107,53,0.35);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
  }

  /* ── QUIZ MODE ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .score-badge {
    background: var(--secondary);
    border-radius: 999px;
    padding: 6px 16px;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--dark);
  }
  .streak {
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--pink);
  }

  .question-display {
    text-align: center;
    margin: 16px 0 28px;
  }
  .question-display .problem {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2.8rem, 12vw, 5rem);
    color: var(--dark);
    line-height: 1.1;
    letter-spacing: 0.04em;
  }
  .problem .op { color: var(--blue); }
  .problem .eq { color: var(--purple); }
  .problem .blank {
    display: inline-block;
    min-width: 1.2em;
    border-bottom: 4px solid var(--primary);
    color: var(--primary);
  }

  .answer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .ans-btn {
    padding: 14px 6px;
    border-radius: 14px;
    border: 2.5px solid #e8e8e8;
    background: white;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--dark);
  }
  .ans-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: #e8f4fd;
    transform: scale(1.05);
  }
  .ans-btn.correct {
    border-color: var(--accent);
    background: #e6fdf5;
    color: var(--accent);
    animation: pop 0.3s ease;
  }
  .ans-btn.wrong {
    border-color: var(--pink);
    background: #fff0f5;
    color: var(--pink);
    animation: shake 0.3s ease;
  }
  .ans-btn:disabled { cursor: default; }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%  { transform: translateX(-6px); }
    75%  { transform: translateX(6px); }
  }

  .feedback {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 1.6em;
    transition: all 0.2s;
  }
  .feedback.ok { color: var(--accent); }
  .feedback.ng { color: var(--pink); }

  /* ── TABLE MODE ── */
  .table-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .num-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 2.5px solid #e0e0e0;
    background: white;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--dark);
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }
  .num-btn.active {
    border-color: var(--purple);
    background: var(--purple);
    color: white;
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(155,93,229,0.4);
  }

  .table-grid {
    display: grid;
    gap: 4px;
  }
  .table-row {
    display: flex;
    align-items: center;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: none; }
  }
  .table-row .lhs {
    background: var(--purple);
    color: white;
    font-weight: 900;
    font-size: 1rem;
    padding: 10px 14px;
    min-width: 90px;
    text-align: right;
    font-family: 'Kaisei Decol', serif;
    letter-spacing: 0.05em;
  }
  .table-row .rhs {
    background: #f3ecfd;
    color: var(--dark);
    font-weight: 700;
    font-size: 1.1rem;
    padding: 10px 14px;
    flex: 1;
    font-family: 'Kaisei Decol', serif;
    letter-spacing: 0.05em;
  }

  /* ── ALL TABLE MODE ── */
  .all-table {
    overflow-x: auto;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.85rem;
  }
  th, td {
    width: 48px;
    height: 42px;
    text-align: center;
    font-weight: 700;
    border-radius: 4px;
  }
  th {
    background: var(--dark);
    color: white;
    font-family: 'Kaisei Decol', serif;
    font-size: 1rem;
  }
  td {
    background: white;
    color: var(--dark);
    border: 1px solid #f0f0f0;
    transition: background 0.15s;
    cursor: default;
  }
  td:hover { background: var(--secondary); }
  td.highlight { background: #fde68a; font-weight: 900; }

  /* ── STATS ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
  }
  .stat-chip {
    background: white;
    border-radius: 12px;
    padding: 10px 18px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .stat-chip .val {
    font-size: 1.6rem;
    font-weight: 900;
    display: block;
    color: var(--primary);
  }
  .stat-chip .lbl {
    font-size: 0.75rem;
    color: #999;
  }

  /* ── NEXT BTN ── */
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--pink));
    color: white;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    letter-spacing: 0.06em;
  }
  .next-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(255,107,53,0.45);
  }
  .next-btn:active { transform: translateY(0); }

  /* range selector */
  .range-row {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: var(--dark);
    font-weight: 700;
  }
  .range-row select {
    padding: 6px 12px;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    background: white;
    cursor: pointer;
    color: var(--dark);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 420px) {
    .answer-grid { grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .ans-btn { font-size: 1.15rem; padding: 11px 4px; }
    th, td { width: 36px; height: 36px; font-size: 0.75rem; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>九九<span>マスター</span> 🌟</h1>
    <p>楽しく覚えよう！</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showMode('quiz')">✏️ クイズ</button>
    <button class="tab-btn" onclick="showMode('table')">📖 一覧</button>
    <button class="tab-btn" onclick="showMode('all')">🗺️ 全体表</button>
  </div>

  <!-- QUIZ MODE -->
  <div id="mode-quiz" class="card">
    <div class="quiz-header">
      <div class="score-badge">✅ <span id="correct-count">0</span> 問正解</div>
      <div class="streak">🔥 <span id="streak-count">0</span> 連続</div>
      <div class="score-badge">📝 <span id="total-count">0</span> 問目</div>
    </div>
    <div class="range-row">
      <span>の段：</span>
      <select id="dan-select">
        <option value="0">ランダム（全部）</option>
        <option value="1">１の段</option>
        <option value="2">２の段</option>
        <option value="3">３の段</option>
        <option value="4">４の段</option>
        <option value="5">５の段</option>
        <option value="6">６の段</option>
        <option value="7">７の段</option>
        <option value="8">８の段</option>
        <option value="9">９の段</option>
      </select>
    </div>
    <div class="question-display">
      <div class="problem" id="problem-text"></div>
    </div>
    <div class="answer-grid" id="answer-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">つぎの問題 →</button>
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat-chip"><span class="val" id="stat-correct">0</span><span class="lbl">正解</span></div>
      <div class="stat-chip"><span class="val" id="stat-wrong">0</span><span class="lbl">不正解</span></div>
      <div class="stat-chip"><span class="val" id="stat-pct">0%</span><span class="lbl">正答率</span></div>
    </div>
  </div>

  <!-- TABLE MODE -->
  <div id="mode-table" class="card" style="display:none">
    <div class="table-selector" id="table-selector"></div>
    <div class="table-grid" id="table-display"></div>
  </div>

  <!-- ALL TABLE MODE -->
  <div id="mode-all" class="card" style="display:none">
    <div class="all-table">
      <table id="all-table"></table>
    </div>
    <p style="text-align:center;margin-top:12px;font-size:0.8rem;color:#aaa">セルにホバーで強調表示</p>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
let qA = 1, qB = 1, correctAnswer = 1;
let correctCount = 0, wrongCount = 0, streak = 0, totalCount = 0;
let answered = false;

// ─────────────────────────────────────────────
// QUIZ
function pickQuestion() {
  const dan = parseInt(document.getElementById('dan-select').value);
  if (dan === 0) {
    qA = Math.ceil(Math.random() * 9);
    qB = Math.ceil(Math.random() * 9);
  } else {
    qA = dan;
    qB = Math.ceil(Math.random() * 9);
  }
  correctAnswer = qA * qB;
}

function generateChoices(correct) {
  const set = new Set([correct]);
  while (set.size < 8) {
    const a = Math.ceil(Math.random() * 9);
    const b = Math.ceil(Math.random() * 9);
    set.add(a * b);
  }
  return shuffle([...set]).slice(0, 8);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  document.getElementById('problem-text').innerHTML =
    `<span class="op">${qA}</span> <span class="eq">×</span> <span class="op">${qB}</span> <span class="eq">=</span> <span class="blank">？</span>`;

  const choices = generateChoices(correctAnswer);
  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = c;
    btn.onclick = () => checkAnswer(c, btn, choices);
    grid.appendChild(btn);
  });
}

function checkAnswer(val, btn, choices) {
  if (answered) return;
  answered = true;
  totalCount++;
  document.getElementById('total-count').textContent = totalCount;

  const allBtns = document.querySelectorAll('.ans-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (val === correctAnswer) {
    btn.classList.add('correct');
    correctCount++;
    streak++;
    fb.textContent = ['すごい！🎉', 'やったね！✨', 'かんぺき！⭐', 'すばらしい！🌟'][Math.floor(Math.random()*4)];
    fb.className = 'feedback ok';
  } else {
    btn.classList.add('wrong');
    // highlight correct
    allBtns.forEach(b => { if (parseInt(b.textContent) === correctAnswer) b.classList.add('correct'); });
    wrongCount++;
    streak = 0;
    fb.textContent = `ざんねん… 正解は ${correctAnswer} だよ`;
    fb.className = 'feedback ng';
  }

  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('streak-count').textContent = streak;

  // stats
  const pct = totalCount ? Math.round(correctCount / totalCount * 100) : 0;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stats-bar').style.display = 'flex';

  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  pickQuestion();
  renderQuestion();
}

// ─────────────────────────────────────────────
// TABLE MODE
function initTableSelector() {
  const sel = document.getElementById('table-selector');
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (i === 1 ? ' active' : '');
    btn.textContent = i;
    btn.dataset.n = i;
    btn.onclick = () => {
      document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTableFor(i);
    };
    sel.appendChild(btn);
  }
  renderTableFor(1);
}

function renderTableFor(n) {
  const disp = document.getElementById('table-display');
  disp.innerHTML = '';
  const colors = ['#7c3aed','#2563eb','#0891b2','#059669','#d97706','#dc2626','#db2777','#7c3aed','#4f46e5'];
  const bg = colors[(n-1) % colors.length];
  for (let i = 1; i <= 9; i++) {
    const row = document.createElement('div');
    row.className = 'table-row';
    row.style.animationDelay = `${(i-1)*0.04}s`;
    row.innerHTML = `<div class="lhs" style="background:${bg}">${n} × ${i}</div><div class="rhs">= ${n*i}</div>`;
    disp.appendChild(row);
  }
}

// ─────────────────────────────────────────────
// ALL TABLE
function initAllTable() {
  const tbl = document.getElementById('all-table');
  let html = '<tr><th>×</th>';
  for (let j = 1; j <= 9; j++) html += `<th>${j}</th>`;
  html += '</tr>';
  for (let i = 1; i <= 9; i++) {
    html += `<tr><th>${i}</th>`;
    for (let j = 1; j <= 9; j++) {
      html += `<td data-a="${i}" data-b="${j}">${i*j}</td>`;
    }
    html += '</tr>';
  }
  tbl.innerHTML = html;

  tbl.addEventListener('mouseover', e => {
    if (e.target.tagName !== 'TD') return;
    const a = e.target.dataset.a, b = e.target.dataset.b;
    tbl.querySelectorAll('td').forEach(td => {
      td.classList.toggle('highlight', td.dataset.a === a || td.dataset.b === b);
    });
  });
  tbl.addEventListener('mouseleave', () => {
    tbl.querySelectorAll('td').forEach(td => td.classList.remove('highlight'));
  });
}

// ─────────────────────────────────────────────
// MODE SWITCH
function showMode(mode) {
  ['quiz','table','all'].forEach(m => {
    document.getElementById(`mode-${m}`).style.display = m === mode ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['quiz','table','all'][i] === mode);
  });
}

// ─────────────────────────────────────────────
// INIT
pickQuestion();
renderQuestion();
initTableSelector();
initAllTable();

document.getElementById('dan-select').addEventListener('change', () => {
  correctCount = 0; wrongCount = 0; streak = 0; totalCount = 0;
  document.getElementById('correct-count').textContent = 0;
  document.getElementById('streak-count').textContent = 0;
  document.getElementById('total-count').textContent = 0;
  document.getElementById('stats-bar').style.display = 'none';
  pickQuestion();
  renderQuestion();
});
</script>
</body>
</html>
