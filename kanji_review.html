<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字れんしゅう</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem 3rem; min-height: 100vh; background: #fff; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08); }
.screen { display: none; }
.screen.active { display: block; }

.app-header { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
.app-sub { font-size: 13px; color: #888; margin-bottom: 1rem; }

.section-label { font-size: 13px; font-weight: 600; color: #1a1a1a; margin: 1rem 0 0.35rem; }

.grade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.grade-btn { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 0.8rem 0.5rem; cursor: pointer; text-align: center; transition: background 0.12s, transform 0.1s; }
.grade-btn:hover { background: #f5f4f0; }
.grade-btn:active { transform: scale(0.97); }
.grade-btn .num { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.grade-btn .sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.grade-btn.selected { border: 2px solid #378ADD; background: #EAF3FB; }
.grade-btn.selected .num { color: #185FA5; }

.tab-row { display: flex; gap: 6px; margin: 0.4rem 0; }
.tab-btn { flex: 1; padding: 0.5rem; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; color: #888; transition: background 0.12s; text-align: center; font-family: inherit; }
.tab-btn.active { background: #EAF3FB; color: #185FA5; border-color: #378ADD; font-weight: 600; }
.form-desc { font-size: 12px; color: #aaa; margin-bottom: 0.25rem; }

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.4rem; }
.mode-btn { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1rem 0.75rem; cursor: pointer; text-align: center; transition: background 0.12s, transform 0.1s; }
.mode-btn:hover { background: #f5f4f0; }
.mode-btn:active { transform: scale(0.97); }
.mode-btn .icon { font-size: 20px; }
.mode-btn .label { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-top: 5px; }
.mode-btn .desc { font-size: 11px; color: #aaa; margin-top: 2px; }

.progress-bar-wrap { background: #eee; border-radius: 99px; height: 5px; margin: 0.6rem 0; overflow: hidden; }
.progress-bar { height: 5px; background: #378ADD; border-radius: 99px; transition: width 0.3s; }

.kanji-card { background: #fff; border: 0.5px solid #e8e8e8; border-radius: 14px; padding: 1.5rem 1rem; text-align: center; margin: 0.75rem 0; }
.kanji-display { font-size: 80px; font-weight: 600; color: #1a1a1a; line-height: 1; margin-bottom: 0.75rem; }
.word-display { font-size: 46px; font-weight: 600; color: #1a1a1a; line-height: 1.1; margin-bottom: 0.75rem; }
.hint-text { font-size: 14px; color: #888; }
.sub-text { font-size: 12px; color: #bbb; margin-top: 4px; }

.reading-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
.rtag { font-size: 12px; padding: 3px 10px; border-radius: 99px; }
.rtag.on { background: #EAF3FB; color: #185FA5; }
.rtag.kun { background: #EAF3E5; color: #2E7D32; }
.rtag.wr { background: #f0f0f0; color: #555; font-size: 13px; padding: 3px 12px; }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 0.6rem 0; }
.choice-btn { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.7rem 0.5rem; cursor: pointer; font-size: 14px; color: #1a1a1a; transition: background 0.12s, transform 0.1s; text-align: center; line-height: 1.4; font-family: inherit; }
.choice-btn:hover:not(:disabled) { background: #f5f4f0; }
.choice-btn:active:not(:disabled) { transform: scale(0.97); }
.choice-btn.correct { background: #EAF3E5; border-color: #4CAF50; color: #2E7D32; }
.choice-btn.wrong { background: #FDECEA; border-color: #E53935; color: #B71C1C; }

.feedback-text { text-align: center; font-size: 14px; min-height: 18px; margin: 4px 0; }

.action-row { display: flex; gap: 8px; margin-top: 0.7rem; }
.btn { flex: 1; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.65rem 1rem; cursor: pointer; font-size: 14px; color: #1a1a1a; transition: background 0.12s, transform 0.1s; text-align: center; font-family: inherit; }
.btn:hover { background: #f5f4f0; }
.btn:active { transform: scale(0.97); }
.btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
.btn.primary:hover { background: #0C447C; }
.btn.success { background: #EAF3E5; color: #2E7D32; border-color: #4CAF50; }
.btn.danger-soft { background: #FDECEA; color: #B71C1C; border-color: #E53935; }

.fc-card { background: #fff; border: 0.5px solid #e8e8e8; border-radius: 14px; padding: 1.5rem 1rem; text-align: center; margin: 0.75rem 0; cursor: pointer; }
.reveal-divider { border-top: 0.5px solid #e8e8e8; padding-top: 1rem; margin-top: 1rem; display: none; }
.reveal-divider.shown { display: block; }
.tap-hint { font-size: 12px; color: #bbb; margin-top: 6px; }

.writing-area { margin: 0.75rem 0; text-align: center; }
.writing-area canvas { border: 0.5px solid #ddd; border-radius: 10px; touch-action: none; display: block; margin: 0 auto; cursor: crosshair; }
.writing-hint-text { font-size: 12px; color: #bbb; margin-top: 4px; }

.result-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 1rem auto; }
.result-circle.great { background: #EAF3E5; }
.result-circle.ok { background: #FFF8E1; }
.result-circle.low { background: #FDECEA; }
.stat-row { display: flex; gap: 8px; margin: 1rem 0; }
.stat-card { flex: 1; background: #f5f4f0; border-radius: 10px; padding: 0.75rem; text-align: center; }
.stat-card .val { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.stat-card .lbl { font-size: 11px; color: #888; margin-top: 2px; }

.header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.back-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #888; padding: 2px 6px; border-radius: 8px; font-family: inherit; }
.back-btn:hover { background: #f0f0f0; }
.screen-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.qcount { font-size: 13px; color: #aaa; margin-left: auto; }
</style>
</head>
<body>
<div id="app">

<!-- Home -->
<div id="screen-home" class="screen active">
  <p class="app-header">漢字れんしゅう</p>
  <p class="app-sub">小学校の漢字を復習しよう</p>

  <div class="section-label">学年を選ぼう <span style="font-size:11px;font-weight:400;color:#aaa;">（複数OK）</span></div>
  <div class="grade-grid" id="grade-grid"></div>

  <div class="section-label" style="margin-top:1rem;">出題形式</div>
  <div class="tab-row" id="form-tabs">
    <button class="tab-btn active" onclick="setForm('kanji', this)">一文字</button>
    <button class="tab-btn" onclick="setForm('word', this)">単語</button>
  </div>
  <p id="form-desc" class="form-desc">漢字一文字の音読み・訓読みを学ぶ</p>

  <div class="section-label">モードを選ぼう</div>
  <div class="mode-grid">
    <div class="mode-btn" onclick="startMode('quiz')">
      <div class="icon">📝</div>
      <div class="label">読み問題</div>
      <div class="desc">読み方を4択で答えよう</div>
    </div>
    <div class="mode-btn" onclick="startMode('meaning')">
      <div class="icon">💡</div>
      <div class="label">意味問題</div>
      <div class="desc">意味を4択で答えよう</div>
    </div>
    <div class="mode-btn" onclick="startMode('flashcard')">
      <div class="icon">🃏</div>
      <div class="label">フラッシュカード</div>
      <div class="desc">タップして確認</div>
    </div>
    <div class="mode-btn" onclick="startMode('writing')">
      <div class="icon">✏️</div>
      <div class="label">書き取り</div>
      <div class="desc">書いて覚えよう</div>
    </div>
  </div>
</div>

<!-- Quiz -->
<div id="screen-quiz" class="screen">
  <div class="header-row">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="screen-title" id="quiz-title">読み問題</span>
    <span class="qcount" id="quiz-qcount">1 / 10</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="quiz-pb"></div></div>
  <div class="kanji-card">
    <div id="quiz-display"></div>
    <div class="hint-text" id="quiz-hint"></div>
    <div class="sub-text" id="quiz-sub"></div>
  </div>
  <div class="choices" id="quiz-choices"></div>
  <div class="feedback-text" id="quiz-feedback"></div>
  <div class="action-row" id="quiz-next-row" style="display:none;">
    <button class="btn primary" onclick="nextQuestion()">次へ →</button>
  </div>
</div>

<!-- Flashcard -->
<div id="screen-flashcard" class="screen">
  <div class="header-row">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="screen-title">フラッシュカード</span>
    <span class="qcount" id="fc-qcount">1 / 10</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="fc-pb"></div></div>
  <div class="fc-card" onclick="revealCard()">
    <div id="fc-display"></div>
    <p class="tap-hint" id="fc-tap">タップして答えを見る</p>
    <div class="reveal-divider" id="fc-reveal">
      <div id="fc-answer-content"></div>
    </div>
  </div>
  <div class="action-row" id="fc-actions" style="display:none;">
    <button class="btn danger-soft" onclick="fcAnswer(false)">😓 もう一度</button>
    <button class="btn success" onclick="fcAnswer(true)">😊 わかった！</button>
  </div>
</div>

<!-- Writing -->
<div id="screen-writing" class="screen">
  <div class="header-row">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="screen-title">書き取り</span>
    <span class="qcount" id="wr-qcount">1 / 10</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="wr-pb"></div></div>
  <div class="kanji-card">
    <div id="wr-prompt"></div>
  </div>
  <div class="writing-area">
    <canvas id="draw-canvas" width="200" height="200"></canvas>
    <div class="writing-hint-text">なぞって書こう</div>
  </div>
  <div id="wr-answer-reveal" style="display:none;text-align:center;margin:0.5rem 0;">
    <div id="wr-answer-display" style="font-size:64px;font-weight:600;color:#1a1a1a;"></div>
  </div>
  <div class="action-row">
    <button class="btn" onclick="clearCanvas()">🗑 消す</button>
    <button class="btn primary" id="wr-reveal-btn" onclick="wrToggleReveal()">答えを見る</button>
  </div>
  <div class="action-row" id="wr-next-row" style="display:none;">
    <button class="btn danger-soft" onclick="wrNext(false)">もう一度</button>
    <button class="btn success" onclick="wrNext(true)">わかった！</button>
  </div>
</div>

<!-- Result -->
<div id="screen-result" class="screen">
  <p style="font-size:20px;font-weight:600;color:#1a1a1a;text-align:center;margin-top:1rem;">結果</p>
  <div id="result-circle" class="result-circle great"></div>
  <p style="text-align:center;font-size:16px;font-weight:600;color:#1a1a1a;" id="result-msg"></p>
  <div class="stat-row">
    <div class="stat-card"><div class="val" id="res-correct">0</div><div class="lbl">正解</div></div>
    <div class="stat-card"><div class="val" id="res-total">0</div><div class="lbl">問題数</div></div>
    <div class="stat-card"><div class="val" id="res-pct">0%</div><div class="lbl">正答率</div></div>
  </div>
  <div class="action-row" style="margin-top:1rem;">
    <button class="btn" onclick="goHome()">ホームへ</button>
    <button class="btn primary" onclick="retryMode()">もう一度</button>
  </div>
</div>

</div><!-- #app -->

let selectedGrades = [1];
let currentForm = 'kanji';
let currentMode = '';
let questions = [];
let currentQ = 0;
let score = 0;
let revealShown = false;
let wrAnswerShown = false;
let drawCtx, isDrawing = false, lastX = 0, lastY = 0;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function getPool() {
  const data = currentForm === 'kanji' ? KANJI : WORDS;
  let pool = [];
  selectedGrades.forEach(g => { if (data[g]) pool = pool.concat(data[g]); });
  return pool;
}

function initGrades() {
  const grid = document.getElementById('grade-grid');
  grid.innerHTML = '';
  for (let g = 1; g <= 6; g++) {
    const btn = document.createElement('div');
    btn.className = 'grade-btn' + (selectedGrades.includes(g) ? ' selected' : '');
    btn.innerHTML = `<div class="num">${g}年生</div><div class="sub">${g}年の漢字</div>`;
    btn.onclick = () => toggleGrade(g, btn);
    grid.appendChild(btn);
  }
}

function toggleGrade(g, btn) {
  if (selectedGrades.includes(g)) {
    if (selectedGrades.length === 1) return;
    selectedGrades = selectedGrades.filter(x => x !== g);
    btn.classList.remove('selected');
  } else {
    selectedGrades.push(g);
    btn.classList.add('selected');
  }
}

function setForm(form, btn) {
  currentForm = form;
  document.querySelectorAll('#form-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-desc').textContent =
    form === 'kanji' ? '漢字一文字の音読み・訓読みを学ぶ' : '単語の読み方や意味を学ぶ（読みが確定！）';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function goHome() { showScreen('home'); }

function startMode(mode) {
  const pool = getPool();
  if (pool.length < 4) { alert('もっと学年を選んでください'); return; }
  currentMode = mode;
  questions = shuffle(pool).slice(0, Math.min(10, pool.length));
  currentQ = 0; score = 0;
  if (mode === 'quiz' || mode === 'meaning') startQuiz();
  else if (mode === 'flashcard') startFlashcard();
  else if (mode === 'writing') startWriting();
}
function retryMode() { startMode(currentMode); }

function buildDisplay(q, showReading) {
  if (currentForm === 'kanji') {
    const onStr = q.on.join('・');
    const kunStr = q.kun.filter(x => x).join('・');
    let html = `<div class="kanji-display">${q.k}</div>`;
    if (showReading) {
      html += `<div class="reading-tags">`;
      if (onStr) html += `<span class="rtag on">音：${onStr}</span>`;
      if (kunStr) html += `<span class="rtag kun">訓：${kunStr}</span>`;
      html += `</div>`;
    }
    return html;
  } else {
    let html = `<div class="word-display">${q.w}</div>`;
    if (showReading) html += `<div class="reading-tags"><span class="rtag wr">${q.r}</span></div>`;
    return html;
  }
}

function getLabel(q, mode) {
  if (mode === 'meaning') return q.m.split('・')[0];
  if (currentForm === 'word') return q.r;
  return q.on[0] || q.kun[0] || '';
}

function startQuiz() {
  showScreen('quiz');
  document.getElementById('quiz-title').textContent = currentMode === 'quiz' ? '読み問題' : '意味問題';
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('quiz-qcount').textContent = (currentQ + 1) + ' / ' + total;
  document.getElementById('quiz-pb').style.width = Math.round((currentQ / total) * 100) + '%';
  document.getElementById('quiz-display').innerHTML = buildDisplay(q, false);
  document.getElementById('quiz-hint').textContent =
    currentMode === 'quiz'
      ? (currentForm === 'word' ? 'この単語の読み方は？' : 'この漢字の読み方は？')
      : (currentForm === 'word' ? 'この単語の意味は？' : 'この漢字の意味は？');
  document.getElementById('quiz-sub').textContent =
    (currentMode === 'quiz' && currentForm === 'kanji') ? '（代表的な読みを選ぼう）' : '';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-next-row').style.display = 'none';

  const pool = getPool();
  const qKey = currentForm === 'kanji' ? q.k : q.w;
  let opts = shuffle(pool).filter(x => (currentForm === 'kanji' ? x.k : x.w) !== qKey).slice(0, 3);
  opts.push(q);
  opts = shuffle(opts);

  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = getLabel(opt, currentMode);
    const isCorrect = (currentForm === 'kanji' ? opt.k : opt.w) === qKey;
    btn.onclick = () => selectAnswer(btn, isCorrect, q);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(btn, correct, q) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('quiz-feedback');
  if (correct) {
    btn.classList.add('correct');
    fb.textContent = '✓ 正解！'; fb.style.color = '#2E7D32';
    score++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗ 残念…'; fb.style.color = '#B71C1C';
    const cl = getLabel(q, currentMode);
    document.querySelectorAll('.choice-btn').forEach(b => { if (b.textContent === cl) b.classList.add('correct'); });
  }
  document.getElementById('quiz-display').innerHTML = buildDisplay(q, true);
  document.getElementById('quiz-next-row').style.display = 'flex';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else loadQuestion();
}

function startFlashcard() { showScreen('flashcard'); loadFlashcard(); }

function loadFlashcard() {
  revealShown = false;
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('fc-qcount').textContent = (currentQ + 1) + ' / ' + total;
  document.getElementById('fc-pb').style.width = Math.round((currentQ / total) * 100) + '%';
  document.getElementById('fc-display').innerHTML = buildDisplay(q, false);
  document.getElementById('fc-tap').textContent = 'タップして答えを見る';
  document.getElementById('fc-reveal').classList.remove('shown');
  document.getElementById('fc-actions').style.display = 'none';

  let html = '';
  if (currentForm === 'kanji') {
    const onStr = q.on.join('・');
    const kunStr = q.kun.filter(x => x).join('・');
    if (onStr) html += `<p style="margin:4px 0;"><span class="rtag on">音読み：${onStr}</span></p>`;
    if (kunStr) html += `<p style="margin:4px 0;"><span class="rtag kun">訓読み：${kunStr}</span></p>`;
  } else {
    html += `<p style="font-size:17px;font-weight:600;color:#1a1a1a;margin:4px 0;">${q.r}</p>`;
  }
  html += `<p style="font-size:14px;color:#888;margin-top:6px;">${q.m}</p>`;
  document.getElementById('fc-answer-content').innerHTML = html;
}

function revealCard() {
  if (revealShown) return;
  revealShown = true;
  document.getElementById('fc-reveal').classList.add('shown');
  document.getElementById('fc-tap').textContent = '';
  document.getElementById('fc-actions').style.display = 'flex';
}

function fcAnswer(knew) {
  if (knew) score++;
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else loadFlashcard();
}

function startWriting() { showScreen('writing'); setupCanvas(); loadWriting(); }

function setupCanvas() {
  const canvas = document.getElementById('draw-canvas');
  drawCtx = canvas.getContext('2d');
  clearCanvas();
  const pos = e => {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return [s.clientX - r.left, s.clientY - r.top];
  };
  const start = e => { e.preventDefault(); isDrawing = true; [lastX, lastY] = pos(e); };
  const draw = e => {
    if (!isDrawing) return; e.preventDefault();
    const [x, y] = pos(e);
    drawCtx.beginPath(); drawCtx.moveTo(lastX, lastY); drawCtx.lineTo(x, y);
    drawCtx.strokeStyle = '#378ADD'; drawCtx.lineWidth = 4; drawCtx.lineCap = 'round'; drawCtx.stroke();
    [lastX, lastY] = [x, y];
  };
  const stop = () => isDrawing = false;
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, {passive: false});
  canvas.addEventListener('touchmove', draw, {passive: false});
  canvas.addEventListener('touchend', stop);
}

function clearCanvas() {
  if (!drawCtx) return;
  drawCtx.clearRect(0, 0, 200, 200);
  drawCtx.strokeStyle = 'rgba(0,0,0,0.08)';
  drawCtx.lineWidth = 1;
  drawCtx.setLineDash([]);
  drawCtx.beginPath(); drawCtx.moveTo(100,0); drawCtx.lineTo(100,200); drawCtx.stroke();
  drawCtx.beginPath(); drawCtx.moveTo(0,100); drawCtx.lineTo(200,100); drawCtx.stroke();
  drawCtx.setLineDash([4,4]);
  [50,150].forEach(v => {
    drawCtx.beginPath(); drawCtx.moveTo(v,0); drawCtx.lineTo(v,200); drawCtx.stroke();
    drawCtx.beginPath(); drawCtx.moveTo(0,v); drawCtx.lineTo(200,v); drawCtx.stroke();
  });
  drawCtx.setLineDash([]);
}

function loadWriting() {
  wrAnswerShown = false;
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('wr-qcount').textContent = (currentQ + 1) + ' / ' + total;
  document.getElementById('wr-pb').style.width = Math.round((currentQ / total) * 100) + '%';
  let html = '';
  if (currentForm === 'kanji') {
    const onStr = q.on.join('・');
    const kunStr = q.kun.filter(x => x).join('・');
    html = `<div style="font-size:13px;color:#888;margin-bottom:8px;">この漢字を書こう</div>`;
    if (onStr) html += `<p><span class="rtag on">音読み：${onStr}</span></p>`;
    if (kunStr) html += `<p style="margin-top:5px;"><span class="rtag kun">訓読み：${kunStr}</span></p>`;
    html += `<p style="font-size:13px;color:#aaa;margin-top:6px;">${q.m}</p>`;
    document.getElementById('wr-answer-display').textContent = q.k;
  } else {
    html = `<div style="font-size:13px;color:#888;margin-bottom:8px;">この単語を書こう</div>`;
    html += `<p style="font-size:20px;font-weight:600;color:#1a1a1a;">${q.r}</p>`;
    html += `<p style="font-size:13px;color:#aaa;margin-top:4px;">${q.m}</p>`;
    document.getElementById('wr-answer-display').textContent = q.w;
  }
  document.getElementById('wr-prompt').innerHTML = html;
  document.getElementById('wr-answer-reveal').style.display = 'none';
  document.getElementById('wr-reveal-btn').textContent = '答えを見る';
  document.getElementById('wr-next-row').style.display = 'none';
  clearCanvas();
}

function wrToggleReveal() {
  wrAnswerShown = !wrAnswerShown;
  document.getElementById('wr-answer-reveal').style.display = wrAnswerShown ? 'block' : 'none';
  document.getElementById('wr-reveal-btn').textContent = wrAnswerShown ? '答えを隠す' : '答えを見る';
  document.getElementById('wr-next-row').style.display = wrAnswerShown ? 'flex' : 'none';
}

function wrNext(knew) {
  if (knew) score++;
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else loadWriting();
}

function showResult() {
  showScreen('result');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-pct').textContent = pct + '%';
  const circle = document.getElementById('result-circle');
  const msg = document.getElementById('result-msg');
  circle.className = 'result-circle';
  if (pct >= 80) { circle.classList.add('great'); circle.textContent = '🎉'; msg.textContent = 'すごい！よくできました！'; }
  else if (pct >= 50) { circle.classList.add('ok'); circle.textContent = '😊'; msg.textContent = 'まあまあ！もう少し練習しよう'; }
  else { circle.classList.add('low'); circle.textContent = '😓'; msg.textContent = 'もう一度がんばろう！'; }
}

initGrades();
</script>
</body>
</html>
