<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おてつだい当番</title>
<style>
  :root {
    --bg: #fdf6ee;
    --card: #ffffff;
    --accent: #e8834a;
    --accent2: #6db88f;
    --text: #3a2f28;
    --muted: #8c7b70;
    --border: #e8ddd4;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(58,47,40,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif; min-height: 100vh; }

  /* ヘッダー */
  header { background: var(--accent); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
  header .today-date { font-size: 0.82rem; opacity: 0.9; }

  /* タブ */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); overflow-x: auto; }
  .tab { flex: 1; min-width: 70px; padding: 12px 8px; text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ページ */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* カード */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px; }

  /* 今日のおてつだいカード */
  .chore-card { display: flex; align-items: center; gap: 14px; }
  .chore-icon { font-size: 2.4rem; flex-shrink: 0; }
  .chore-info { flex: 1; }
  .chore-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .chore-meta { display: flex; gap: 12px; font-size: 0.82rem; color: var(--muted); }
  .chore-pts { color: var(--accent); font-weight: 700; }
  .chore-yen { color: var(--accent2); font-weight: 700; }
  .chore-assignee { font-size: 0.85rem; margin-top: 6px; }
  .btn-yatta { background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
  .btn-yatta:hover { opacity: 0.85; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 32px; }
  .modal h2 { text-align: center; font-size: 1.1rem; margin-bottom: 18px; }
  .member-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; margin-bottom: 10px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; cursor: pointer; transition: all 0.15s; }
  .member-btn:hover, .member-btn.selected { border-color: var(--accent); background: #fff5ee; }
  .member-btn .micon { font-size: 1.5rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-cancel { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: #fff; font-size: 0.95rem; cursor: pointer; }
  .btn-save { flex: 2; padding: 12px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; }

  /* 認証 */
  .auth-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .auth-bar input { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.9rem; }
  .auth-bar button { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .auth-ok { color: var(--accent2); font-size: 0.85rem; font-weight: 700; }
  .auth-ng { color: #e05; font-size: 0.85rem; }

  /* カレンダー */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-header button { background: none; border: 2px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 1rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 700; color: var(--muted); padding: 4px 0; }
  .cal-dow:first-child { color: #e05; }
  .cal-dow:last-child { color: #57a; }
  .cal-cell { background: #fff; border-radius: 8px; min-height: 64px; padding: 4px; cursor: pointer; transition: background 0.15s; }
  .cal-cell:hover { background: #fff5ee; }
  .cal-cell.empty { background: none; cursor: default; }
  .cal-cell.today { outline: 2px solid var(--accent); }
  .cal-day { font-size: 0.75rem; font-weight: 700; margin-bottom: 2px; }
  .cal-logs { display: flex; flex-wrap: wrap; gap: 1px; }
  .cal-log-icon { font-size: 0.85rem; }

  /* 集計 */
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .summary-card { background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 14px; text-align: center; }
  .summary-card .smicon { font-size: 1.8rem; }
  .summary-card .smname { font-size: 0.8rem; color: var(--muted); margin: 4px 0; }
  .summary-card .smval { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

  /* 設定 */
  .setting-section { margin-bottom: 20px; }
  .setting-title { font-size: 0.85rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .setting-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row .sr-icon { font-size: 1.4rem; }
  .setting-row .sr-main { flex: 1; }
  .setting-row .sr-name { font-weight: 700; font-size: 0.95rem; }
  .setting-row .sr-sub { font-size: 0.8rem; color: var(--muted); }
  .toggle { width: 42px; height: 24px; background: var(--border); border-radius: 12px; cursor: pointer; position: relative; transition: background 0.2s; }
  .toggle.on { background: var(--accent2); }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left 0.2s; }
  .toggle.on::after { left: 21px; }

  /* ポイントビュー */
  .pv-header { display: flex; gap: 10px; margin-bottom: 14px; }
  .pv-btn { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 10px; background: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 700; text-align: center; transition: all 0.15s; }
  .pv-btn.active { border-color: var(--accent2); background: var(--accent2); color: #fff; }
  .balance-box { text-align: center; padding: 20px; }
  .balance-box .bl-icon { font-size: 2.5rem; }
  .balance-box .bl-name { font-size: 1rem; color: var(--muted); margin: 6px 0; }
  .balance-box .bl-pts { font-size: 2.4rem; font-weight: 700; color: var(--accent); }
  .balance-box .bl-sub { font-size: 0.82rem; color: var(--muted); }
  .log-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-row:last-child { border-bottom: none; }
  .log-row .lr-icon { font-size: 1.4rem; }
  .log-row .lr-main { flex: 1; }
  .log-row .lr-name { font-weight: 700; font-size: 0.9rem; }
  .log-row .lr-sub { font-size: 0.78rem; color: var(--muted); }
  .log-row .lr-pts { font-weight: 700; color: var(--accent); font-size: 0.95rem; }

  /* rewards */
  .reward-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .reward-row:last-child { border-bottom: none; }
  .reward-row .rr-name { flex: 1; font-weight: 700; }
  .reward-row .rr-pts { color: var(--accent); font-weight: 700; }
  .rq-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rq-row:last-child { border-bottom: none; }
  .rq-status { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
  .rq-status.pending { background: #fff3cd; color: #856404; }
  .rq-status.approved { background: #d1e7dd; color: #155724; }
  .rq-status.rejected { background: #f8d7da; color: #842029; }
  .btn-sm { padding: 6px 14px; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
  .btn-approve { background: var(--accent2); color: #fff; }
  .btn-reject { background: #e05; color: #fff; margin-left: 6px; }

  .loading { text-align: center; padding: 30px; color: var(--muted); }
  .empty { text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }

  .detail-modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 40px; max-height: 70vh; overflow-y: auto; }
  .close-btn { display: block; width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: #fff; font-size: 0.95rem; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.5rem;">🏠</span>
  <h1>おてつだい当番</h1>
  <span class="today-date" id="headerDate"></span>
</header>

<div class="tabs">
  <div class="tab active" data-tab="today">📋 今日</div>
  <div class="tab" data-tab="calendar">📅 カレンダー</div>
  <div class="tab" data-tab="summary">📊 集計</div>
  <div class="tab" data-tab="settings">⚙️ 設定</div>
  <div class="tab" data-tab="points">⭐ ポイント</div>
</div>

<!-- ======================== 今日 ======================== -->
<div class="page active" id="page-today">
  <div class="auth-bar">
    <input type="password" id="pwInput" placeholder="パスワード" />
    <button onclick="setPassword()">✔</button>
    <span id="pwStatus"></span>
  </div>
  <div id="todayList" class="loading">よみこみ中…</div>
</div>

<!-- ======================== カレンダー ======================== -->
<div class="page" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button onclick="calPrev()">◀</button>
      <strong id="calTitle"></strong>
      <button onclick="calNext()">▶</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
      <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>
      <div class="cal-dow">土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- ======================== 集計 ======================== -->
<div class="page" id="page-summary">
  <div class="card">
    <div class="cal-header">
      <button onclick="sumPrev()">◀</button>
      <strong id="sumTitle"></strong>
      <button onclick="sumNext()">▶</button>
    </div>
  </div>
  <div id="summaryContent" class="loading">よみこみ中…</div>
</div>

<!-- ======================== 設定 ======================== -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="setting-section">
      <div class="setting-title">🏡 作業リスト</div>
      <div id="choreSettings" class="loading">よみこみ中…</div>
    </div>
  </div>
  <div class="card">
    <div class="setting-section">
      <div class="setting-title">🔄 ローテーション</div>
      <div id="rotationSettings" class="loading">よみこみ中…</div>
    </div>
  </div>
  <div class="card">
    <div class="setting-section">
      <div class="setting-title">🎁 ごほうびリスト</div>
      <div id="rewardSettings" class="loading">よみこみ中…</div>
    </div>
    <div style="margin-top:12px;display:grid;gap:8px;">
      <div style="display:flex;gap:8px;">
        <input id="newRewardName" placeholder="ごほうび名" style="flex:1;padding:8px 10px;border:2px solid var(--border);border-radius:8px;">
        <input id="newRewardPts" type="number" placeholder="pt" style="width:80px;padding:8px 10px;border:2px solid var(--border);border-radius:8px;">
      </div>
      <input id="newRewardImg" placeholder="画像URL（例: https://cetus.fun/kids-app/kanriapp/points/ice.jpg）" style="width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:8px;font-size:0.82rem;">
      <button onclick="addReward()" style="padding:8px 14px;background:var(--accent2);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">追加</button>
    </div>
  </div>
  <div class="card">
    <div class="setting-section">
      <div class="setting-title">💸 ママ銀行連携</div>
      <div id="bankPending"></div>
      <button onclick="loadBankPending()" style="margin-top:8px;padding:10px 18px;border:2px solid var(--border);border-radius:10px;background:#fff;font-weight:700;cursor:pointer;">🔍 未反映ログを確認する</button>
    </div>
  </div>
</div>

<!-- ======================== ポイント ======================== -->
<div class="page" id="page-points">
  <div class="pv-header">
    <div class="pv-btn" data-member="mama" onclick="selectPointMember('mama')">👩 ママ</div>
    <div class="pv-btn active" data-member="ane" onclick="selectPointMember('ane')">🌸 あね</div>
    <div class="pv-btn" data-member="imouto" onclick="selectPointMember('imouto')">🦄 いもうと</div>
  </div>
  <div id="pointsContent" class="loading">よみこみ中…</div>
  <div class="card" style="margin-top:14px;">
    <div class="setting-title">🎁 こうかんリクエスト</div>
    <div id="rewardRequestList" class="loading">よみこみ中…</div>
  </div>
</div>

<!-- ===== やった！モーダル ===== -->
<div class="modal-overlay" id="yattaModal">
  <div class="modal">
    <h2>だれがやった？ <span id="modalChoreIcon"></span></h2>
    <div id="memberBtns"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveComplete()">ほぞん</button>
    </div>
  </div>
</div>

<!-- ===== カレンダー詳細モーダル ===== -->
<div class="modal-overlay" id="calDetailModal">
  <div class="detail-modal">
    <h2 id="calDetailTitle" style="text-align:center;margin-bottom:14px;"></h2>
    <div id="calDetailContent"></div>
    <button class="close-btn" onclick="closeCalDetail()">とじる</button>
  </div>
</div>

<script>
const API = 'https://otetsudai-api.sslowdayss.workers.dev';
let password = '';
let members = [];
let chores = [];
let currentChoreId = null;
let selectedMember = null;
let calYear, calMonth, sumYear, sumMonth;

const today = new Date();
const todayStr = today.toISOString().slice(0, 10);

document.getElementById('headerDate').textContent =
  `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

calYear = today.getFullYear();
calMonth = today.getMonth() + 1;
sumYear = today.getFullYear();
sumMonth = today.getMonth() + 1;

// ──────── パスワード ────────
function setPassword() {
  password = document.getElementById('pwInput').value;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwStatus').textContent = password ? '🔓 セット済' : '';
  document.getElementById('pwStatus').className = 'auth-ok';
  loadToday();
}

function apiHeaders() {
  return { 'Content-Type': 'application/json', 'X-App-Password': password };
}

// ──────── タブ ────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('page-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'calendar') renderCalendar();
    if (t.dataset.tab === 'summary') loadSummary();
    if (t.dataset.tab === 'settings') loadSettings();
    if (t.dataset.tab === 'points') loadPoints();
  });
});

// ──────── メンバー読み込み ────────
async function loadMembers() {
  const r = await fetch(`${API}/api/members`);
  members = await r.json();
}

// ──────── 今日 ────────
async function loadToday() {
  const el = document.getElementById('todayList');
  el.innerHTML = '<div class="loading">よみこみ中…</div>';
  await loadMembers();
  const r = await fetch(`${API}/api/chores/today`);
  chores = await r.json();
  if (!chores.length) { el.innerHTML = '<div class="empty">おてつだいがありません</div>'; return; }
  el.innerHTML = chores.map(c => `
    <div class="card">
      <div class="chore-card">
        <div class="chore-icon">${c.icon}</div>
        <div class="chore-info">
          <div class="chore-name">${c.name}</div>
          <div class="chore-assignee">担当：${c.assignee ? c.assignee.icon + ' ' + c.assignee.name : '—'}</div>
          <div class="chore-meta">
            <span class="chore-pts">⭐ ${c.points}pt</span>
            ${c.money > 0 ? `<span class="chore-yen">💴 ${c.money}円</span>` : ''}
          </div>
        </div>
        <button class="btn-yatta" onclick="openYatta('${c.id}')">やった！</button>
      </div>
    </div>
  `).join('');
}

// ──────── やった！モーダル ────────
function openYatta(choreId) {
  if (!password) { alert('先にパスワードをにゅうりょくしてください'); return; }
  currentChoreId = choreId;
  selectedMember = null;
  const chore = chores.find(c => c.id === choreId);
  document.getElementById('modalChoreIcon').textContent = chore.icon;
  document.getElementById('memberBtns').innerHTML = members.map(m => `
    <button class="member-btn" data-id="${m.id}" onclick="selectMember('${m.id}')">
      <span class="micon">${m.icon}</span> ${m.name}
    </button>
  `).join('');
  document.getElementById('yattaModal').classList.add('open');
}

function selectMember(id) {
  selectedMember = id;
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.member-btn[data-id="${id}"]`).classList.add('selected');
}

function closeModal() {
  document.getElementById('yattaModal').classList.remove('open');
}

async function saveComplete() {
  if (!selectedMember) { alert('だれがやったか えらんでください'); return; }
  const body = { chore_id: currentChoreId, completed_by: selectedMember, completed_date: todayStr };
  const r = await fetch(`${API}/api/chores/complete`, {
    method: 'POST', headers: apiHeaders(), body: JSON.stringify(body)
  });
  const data = await r.json();
  if (data.ok) {
    closeModal();
    alert(`ほぞんしました！ ⭐${data.log.points}pt`);
    loadToday();
  } else {
    alert('エラー: ' + (data.error || '?'));
  }
}

// ──────── カレンダー ────────
function calPrev() { calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } renderCalendar(); }

async function renderCalendar() {
  document.getElementById('calTitle').textContent = `${calYear}年${calMonth}月`;
  const monthStr = `${calYear}-${String(calMonth).padStart(2,'0')}`;
  const r = await fetch(`${API}/api/chores/logs?month=${monthStr}`);
  const logs = await r.json();

  // 日付ごとにグループ
  const byDate = {};
  for (const l of logs) {
    if (!byDate[l.completed_date]) byDate[l.completed_date] = [];
    byDate[l.completed_date].push(l);
  }

  const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  const lastDate = new Date(calYear, calMonth, 0).getDate();
  const grid = document.getElementById('calGrid');
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= lastDate; d++) {
    const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const dayLogs = byDate[ds] || [];
    html += `<div class="cal-cell${isToday?' today':''}" onclick="showCalDetail('${ds}', ${JSON.stringify(dayLogs).replace(/"/g,'&quot;')})">
      <div class="cal-day">${d}</div>
      <div class="cal-logs">${dayLogs.map(l => {
        const chore = chores.find(c => c.id === l.chore_id);
        const mem = members.find(m => m.id === l.completed_by);
        return `<span class="cal-log-icon" title="${l.chore_name}">${chore?.icon||'📋'}${mem?.icon||''}</span>`;
      }).join('')}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

function showCalDetail(ds, logs) {
  const [y, mo, d] = ds.split('-');
  document.getElementById('calDetailTitle').textContent = `${parseInt(mo)}月${parseInt(d)}日`;
  if (!logs.length) {
    document.getElementById('calDetailContent').innerHTML = '<div class="empty">おてつだいなし</div>';
  } else {
    document.getElementById('calDetailContent').innerHTML = logs.map(l => {
      const chore = chores.find(c => c.id === l.chore_id);
      const assigned = members.find(m => m.id === l.assigned_to);
      const completed = members.find(m => m.id === l.completed_by);
      return `<div class="log-row">
        <div class="lr-icon">${chore?.icon||'📋'}</div>
        <div class="lr-main">
          <div class="lr-name">${l.chore_name}</div>
          <div class="lr-sub">担当：${assigned?.icon||''}${assigned?.name||l.assigned_to}　実施：${completed?.icon||''}${completed?.name||l.completed_by}</div>
        </div>
        <div class="lr-pts">⭐${l.points}pt</div>
      </div>`;
    }).join('');
  }
  document.getElementById('calDetailModal').classList.add('open');
}

function closeCalDetail() { document.getElementById('calDetailModal').classList.remove('open'); }

  document.getElementById('choreSettings').innerHTML = choreList.map(c => `
    <div class="setting-row">

      <div class="sr-main">
        <div class="sr-name">${c.name}</div>
        <div class="sr-sub">⭐${c.points}pt / 💴${c.money}円</div>
      </div>
      <div class="toggle ${c.enabled?'on':''}" onclick="toggleChore('${c.id}',${c.enabled}, ${JSON.stringify(c).replace(/"/g,'&quot;')})"></div>

  const r2 = await fetch(`${API}/api/settings/rewards`, { headers: apiHeaders() });

  document.getElementById('rewardSettings').innerHTML = rewardList.map(r => `
    <div class="reward-row" style="flex-direction:column;align-items:stretch;gap:8px;">

        <span class="rr-name">${r.name}</span>

        <button onclick="saveRewardImage(${r.id},${JSON.stringify(r).replace(/"/g,'&quot;')})" style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;">保存</button>

  });

}

async function toggleReward(id, currentEnabled, rewardObj) {
  const updated = { ...rewardObj, enabled: currentEnabled ? 0 : 1 };
  await fetch(`${API}/api/settings/rewards/${id}`, {
    method: 'PUT', headers: apiHeaders(), body: JSON.stringify(updated)
  });

async function addReward() {
  const name = document.getElementById('newRewardName').value.trim();
  const pts = parseInt(document.getElementById('newRewardPts').value);

// ──────── ママ銀行連携 ────────
const MAMA_BANK_API = 'https://api.cetus.fun/api';
const MAMA_BANK_KEYS = ['mama-bank', 'mama-bank-view'];

// completed_by → ママ銀行の口座キー（mama は加算しない）
const MEMBER_TO_ACCOUNT = { ane: 'usagi', imouto: 'kuma' };

async function loadBankPending() {
  const el = document.getElementById('bankPending');
  el.innerHTML = '<div class="empty">よみこみ中…</div>';
  if (!password) { el.innerHTML = '<div class="empty">先にパスワードをセットしてください</div>'; return; }

  const r = await fetch(`${API}/api/bank/pending`, { headers: apiHeaders() });
  if (!r.ok) { el.innerHTML = '<div class="empty">認証エラー：パスワードを確認してください</div>'; return; }
  const logs = await r.json();

  // mama は対象外
  const targets = logs.filter(l => MEMBER_TO_ACCOUNT[l.completed_by]);

  if (!targets.length) {
    el.innerHTML = '<div class="empty">ママ銀行に反映するログがありません</div>';
    return;
  }

  const total = targets.reduce((s, l) => s + l.money, 0);
  const aneTotal = targets.filter(l => l.completed_by === 'ane').reduce((s, l) => s + l.money, 0);
  const imoutoTotal = targets.filter(l => l.completed_by === 'imouto').reduce((s, l) => s + l.money, 0);

  el.innerHTML = `
    <div style="background:#fff8f0;border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;">
      <div style="font-weight:700;margin-bottom:6px;">📋 反映予定 ${targets.length}件 / 合計 ${total}円</div>
      ${aneTotal > 0 ? `<div style="font-size:0.85rem;">🌸 あね → 🐰 うさぎ口座 ＋${aneTotal}円</div>` : ''}
      ${imoutoTotal > 0 ? `<div style="font-size:0.85rem;">🦄 いもうと → 🦄 ユニコーン口座 ＋${imoutoTotal}円</div>` : ''}
    </div>
    ${targets.map(l => `
      <div class="log-row">
        <div class="lr-main">
          <div class="lr-name">${l.chore_name}</div>
          <div class="lr-sub">${l.completed_date} / ${l.completed_by === 'ane' ? '🌸→🐰' : '🦄→🦄'}</div>
        </div>
        <div class="lr-pts">💴${l.money}円</div>
      </div>`).join('')}
    <button onclick="syncBankToMamaBank()" style="margin-top:12px;width:100%;padding:12px;background:linear-gradient(135deg,#ffb347,#e8834a);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;">
      🏦 ママ銀行に反映する
    </button>
  `;

  // グローバルに保持して syncBankToMamaBank() で使う
  window._bankPendingLogs = targets;
}

async function syncBankToMamaBank() {
  const logs = window._bankPendingLogs;
  if (!logs || !logs.length) return;

  const total = logs.reduce((s, l) => s + l.money, 0);
  const aneTotal = logs.filter(l => l.completed_by === 'ane').reduce((s, l) => s + l.money, 0);
  const imoutoTotal = logs.filter(l => l.completed_by === 'imouto').reduce((s, l) => s + l.money, 0);

  const msg = [
    `以下の内容をママ銀行に反映します。`,
    aneTotal > 0 ? `🌸 あね → 🐰 うさぎ口座 ＋${aneTotal}円` : '',
    imoutoTotal > 0 ? `🦄 いもうと → 🦄 ユニコーン口座 ＋${imoutoTotal}円` : '',
    `合計 ${total}円 / ${logs.length}件`,
    `よろしいですか？`
  ].filter(Boolean).join('\n');

  if (!confirm(msg)) return;

  const el = document.getElementById('bankPending');
  el.innerHTML = '<div class="empty">ママ銀行データ取得中…</div>';

  try {
    // ① ママ銀行の app-data を取得
    const mamaData = await fetchMamaBankData();
    if (!mamaData) {
      el.innerHTML = '<div class="empty" style="color:#e05">ママ銀行データの取得に失敗しました。ママ銀行アプリを一度開いて保存してから試してください。</div>';
      return;
    }

    // ② 残高・履歴を更新
    const balances = mamaData.balances || { usagi: 0, kuma: 0 };
    const history = Array.isArray(mamaData.history) ? mamaData.history : [];
    const now = new Date();
    const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;

    for (const log of logs) {
      const acc = MEMBER_TO_ACCOUNT[log.completed_by];
      if (!acc) continue;
      balances[acc] = Number(balances[acc] || 0) + Number(log.money);
      history.push({
        acc,
        type: 'deposit',
        amount: log.money,
        memo: `おてつだい：${log.chore_name}`,
        date: `${dateStr} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
      });
    }

    // ③ app-data に書き戻し
    const updatedData = { ...mamaData, balances, history, savedAt: new Date().toISOString() };
    const saved = await saveMamaBankData(updatedData);
    if (!saved) {
      el.innerHTML = '<div class="empty" style="color:#e05">ママ銀行への保存に失敗しました。ログは変更していません。</div>';
      return;
    }

    // ④ D1の bank_synced を更新
    const ids = logs.map(l => l.id);
    await fetch(`${API}/api/bank/sync`, {
      method: 'POST', headers: apiHeaders(), body: JSON.stringify({ ids })
    });

    el.innerHTML = `<div class="empty" style="color:var(--accent2);font-weight:700;">✅ ママ銀行に反映しました！<br>うさぎ口座 ＋${aneTotal}円 / ユニコーン口座 ＋${imoutoTotal}円</div>`;
    window._bankPendingLogs = [];

  } catch (e) {
    console.error(e);
    el.innerHTML = `<div class="empty" style="color:#e05">エラーが発生しました：${e.message}</div>`;
  }
}

// ママ銀行 app-data 取得（複数キー・複数URLを試す）
async function fetchMamaBankData() {
  const readPatterns = key => [
    `${MAMA_BANK_API}/app-data?key=${encodeURIComponent(key)}`,
    `${MAMA_BANK_API}/app-data?app=${encodeURIComponent(key)}`,
    `${MAMA_BANK_API}/app-data/${encodeURIComponent(key)}`,
  ];
  for (const key of MAMA_BANK_KEYS) {
    for (const url of readPatterns(key)) {
      try {
        const r = await fetch(url, { headers: apiHeaders(), cache: 'no-store' });
        if (!r.ok) continue;
        const raw = await r.json();
        const unwrapped = unwrapMamaBankData(raw);
        if (unwrapped && unwrapped.balances) return unwrapped;
      } catch(e) { console.warn('mama-bank fetch failed', url, e.message); }
    }
  }
  return null;
}

// ママ銀行 app-data 保存（複数パターンを試す）
async function saveMamaBankData(payload) {
  const writeTargets = key => [
    { url: `${MAMA_BANK_API}/app-data`, method: 'POST', body: { key, data: payload } },
    { url: `${MAMA_BANK_API}/app-data`, method: 'POST', body: { app: key, data: payload } },
    { url: `${MAMA_BANK_API}/app-data`, method: 'POST', body: { key, value: payload } },
    { url: `${MAMA_BANK_API}/app-data/${encodeURIComponent(key)}`, method: 'PUT', body: payload },
    { url: `${MAMA_BANK_API}/app-data/${encodeURIComponent(key)}`, method: 'POST', body: payload },
  ];
  for (const key of MAMA_BANK_KEYS) {
    for (const t of writeTargets(key)) {
      try {
        const r = await fetch(t.url, {
          method: t.method,
          headers: apiHeaders(),
          body: JSON.stringify(t.body)
        });
        if (r.ok) return true;
      } catch(e) { console.warn('mama-bank save failed', t.url, e.message); }
    }
  }
  return false;
}

// ネストされたデータを掘り起こす（ママ銀行と同じロジック）
function unwrapMamaBankData(data) {
  if (!data) return null;
  if (typeof data === 'string') { try { return unwrapMamaBankData(JSON.parse(data)); } catch { return null; } }
  if (data.balances) return data;
  for (const key of ['data', 'value', 'payload', 'record']) {
    if (data[key]) { const u = unwrapMamaBankData(data[key]); if (u && u.balances) return u; }
  }
  return null;
}

async function loadPoints() {
  const el = document.getElementById('pointsContent');
  const monthStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const r = await fetch(`${API}/api/points/member/${currentPointMember}?month=${monthStr}`);
  const data = await r.json();
  const mem = members.find(m => m.id === currentPointMember);

  el.innerHTML = `
    <div class="card">
      <div class="balance-box">
        <div class="bl-icon">${mem?.icon||'⭐'}</div>
        <div class="bl-name">${mem?.name||currentPointMember}</div>
        <div class="bl-pts">${data.balance.toLocaleString()} pt</div>
        <div class="bl-sub">今月：⭐${data.month_points||0}pt　つかった：${data.used_points}pt</div>
      </div>
    </div>
    <div class="card">
      <div class="setting-title">📋 さいきんのおてつだい</div>
      ${data.recent_logs.length ? data.recent_logs.map(l => {
        const chore = chores.find(c => c.id === l.chore_id);
        return `<div class="log-row">
          <div class="lr-icon">${chore?.icon||'📋'}</div>
          <div class="lr-main">
            <div class="lr-name">${l.chore_name}</div>
            <div class="lr-sub">${l.completed_date}</div>
          </div>
          <div class="lr-pts">+${l.points}pt</div>
        </div>`;
      }).join('') : '<div class="empty">まだなし</div>'}
    </div>
  `;

  // ごほうびリクエスト一覧（ママには表示しない）
  const reqCard = document.querySelector('#page-points .card:last-of-type');
  if (currentPointMember === 'mama') {
    if (reqCard) reqCard.style.display = 'none';
    return;
  }
  if (reqCard) reqCard.style.display = '';
  const rl = await fetch(`${API}/api/rewards/requests`, { headers: apiHeaders() });
  if (rl.ok) {
    const rqs = await rl.json();
    const myRqs = rqs.filter(r => r.member_id === currentPointMember);
    document.getElementById('rewardRequestList').innerHTML = myRqs.length ? myRqs.map(r => `
      <div class="rq-row">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <strong>${r.reward_name}</strong>
          <span class="rq-status ${r.status}">${{pending:'待ち',approved:'承認',rejected:'NG'}[r.status]||r.status}</span>
          <span style="font-size:0.8rem;color:var(--muted)">${r.requested_at?.slice(0,10)}</span>
          <span style="color:var(--accent);font-weight:700">⭐${r.points_cost}pt</span>
        </div>
        ${r.status==='pending' ? `<div style="margin-top:6px"><button class="btn-sm btn-approve" onclick="resolveRequest(${r.id},'approved')">✔ 承認</button><button class="btn-sm btn-reject" onclick="resolveRequest(${r.id},'rejected')">✘ NG</button></div>` : ''}
      </div>
    `).join('') : '<div class="empty">リクエストなし</div>';
  } else {
    document.getElementById('rewardRequestList').innerHTML = '<div class="empty">（認証必要）</div>';
  }
}

async function resolveRequest(id, status) {
  await fetch(`${API}/api/rewards/resolve`, {
    method: 'POST', headers: apiHeaders(), body: JSON.stringify({ id, status })
  });
  loadPoints();
}
