<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>時計よみプリントメーカー</title>

  <!-- ホーム画面追加用：maker/img/clock-print.png を使います -->
  <link rel="apple-touch-icon" href="img/clock-print.png">
  <link rel="icon" type="image/png" href="img/clock-print.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="時計プリント">
  <meta name="theme-color" content="#f0f7ff">

  <style>
    :root {
      --bg: #f0f7ff;
      --card: #ffffff;
      --main: #7cc7ff;
      --accent: #ffd76a;
      --text: #233447;
      --soft: #f7fbff;
      --ud-font:
        "BIZ UDPGothic",
        "BIZ UDGothic",
        "Yu Gothic UI",
        "Yu Gothic",
        "Hiragino Sans",
        "Meiryo",
        sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--ud-font);
      background: linear-gradient(180deg, #eef8ff 0%, #fff4ce 100%);
      color: var(--text);
    }

    button,
    select,
    input,
    textarea {
      font-family: var(--ud-font);
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      text-align: center;
      margin: 12px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #50697c;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel, .preview-wrap {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(38, 80, 112, 0.16);
      padding: 18px;
    }

    .panel h2, .preview-wrap h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: 900;
      margin: 14px 0 6px;
      font-size: 15px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #bddcf0;
      border-radius: 14px;
      font-size: 16px;
      background: #fbfdff;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .checkbox-row input {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }

    .main-btn { background: var(--main); color: #0d3148; }
    .print-btn { background: #79dc8c; color: #123a1d; }
    .sub-btn { background: #fff1b8; color: #654200; }

    .note {
      margin-top: 14px;
      padding: 12px;
      background: #f4fbff;
      border-left: 5px solid var(--main);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-area {
      overflow: auto;
      background: #dfeaf1;
      border-radius: 18px;
      padding: 16px;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      color: #222;
      padding: 12mm 12mm;
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10mm;
      margin-bottom: 7px;
    }

    .print-title {
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .title-stars {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.8fr;
      gap: 8px;
      font-size: 15px;
      margin-bottom: 7mm;
      align-items: end;
    }

    .meta-box {
      border-bottom: 1.8px solid #222;
      min-height: 26px;
      padding: 2px 4px;
    }

    .sticker-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24mm;
      height: 10mm;
      margin-left: 2mm;
      border: 1.8px solid #222;
      border-radius: 6px;
      font-size: 11px;
      color: #777;
      vertical-align: middle;
    }

    .problems {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7mm 7mm;
    }

    .problem {
      min-height: 47mm;
      page-break-inside: avoid;
    }

    .problem-number {
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 1mm;
    }

    .clock-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2mm;
    }

    .clock-svg {
      width: 38mm;
      height: 38mm;
    }

    .answer-time {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2mm;
      font-size: 15px;
      font-weight: 900;
    }

    .time-line {
      display: inline-block;
      width: 16mm;
      height: 8mm;
      border-bottom: 2px solid #222;
    }

    .minute-line { width: 16mm; }

    .digital-question {
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      margin: 5mm 0 4mm;
    }

    .draw-clock-note {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #555;
      margin-top: 1mm;
    }

    .answer-small {
      margin-top: 1mm;
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .paper.count-12 .problems {
      grid-template-columns: repeat(3, 1fr);
      gap: 6mm 7mm;
    }

    .paper.count-12 .problem {
      min-height: 44mm;
    }

    .paper.count-18 .print-title {
      font-size: 24px;
    }

    .paper.count-18 .title-stars {
      font-size: 17px;
    }

    .paper.count-18 .meta {
      margin-bottom: 5mm;
      font-size: 13px;
    }

    .paper.count-18 .problems {
      grid-template-columns: repeat(3, 1fr);
      gap: 4mm 6mm;
    }

    .paper.count-18 .problem {
      min-height: 35mm;
    }

    .paper.count-18 .clock-svg {
      width: 30mm;
      height: 30mm;
    }

    .paper.count-18 .answer-time {
      font-size: 13px;
    }

    .paper.count-18 .time-line {
      width: 13mm;
      height: 6mm;
    }

    .paper.count-18 .digital-question {
      font-size: 21px;
      margin: 3mm 0 3mm;
    }

    .paper.draw-mode.count-18 .clock-svg {
      width: 28mm;
      height: 28mm;
    }

    .answer-page { margin-top: 16px; }

    .answers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7mm 5mm;
      font-size: 17px;
      margin-top: 10mm;
    }

    .answer-item {
      border-bottom: 1px solid #999;
      padding-bottom: 3mm;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .paper {
        transform: scale(0.55);
        transform-origin: top left;
        margin: 0;
      }
      .preview-area { height: 720px; }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white; }
      header, .panel, .preview-wrap > h2, .note, .no-print { display: none !important; }
      .app { max-width: none; padding: 0; }
      .layout { display: block; }
      .preview-wrap { box-shadow: none; padding: 0; border-radius: 0; }
      .preview-area { overflow: visible; padding: 0; background: white; border-radius: 0; }
      .paper {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        transform: none !important;
        transform-origin: initial !important;
      }
      .paper:last-child { page-break-after: auto; }
      .answer-page.hidden-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>時計よみプリントメーカー</h1>
      <div class="subtitle">時計を読んだり、針を書いたりするプリントをA4で作れます</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>プリント設定</h2>

        <label for="childName">なまえ</label>
        <input id="childName" type="text" placeholder="れい：はる" />

        <label for="titleText">プリント名</label>
        <input id="titleText" type="text" value="時計よみれんしゅうプリント" />

        <div class="row">
          <div>
            <label for="questionType">問題タイプ</label>
            <select id="questionType">
              <option value="read" selected>時計を見て時刻を書く</option>
              <option value="draw">時刻を見て針を書く</option>
              <option value="mix">読み・針書きミックス</option>
            </select>
          </div>
          <div>
            <label for="level">むずかしさ</label>
            <select id="level">
              <option value="hour">何時</option>
              <option value="half">何時・何時半</option>
              <option value="five" selected>5分きざみ</option>
              <option value="one">1分きざみ</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="count">問題数</label>
            <select id="count">
              <option value="6">6問</option>
              <option value="9" selected>9問</option>
              <option value="12">12問</option>
              <option value="18">18問</option>
            </select>
          </div>
          <div>
            <label for="dateText">日付</label>
            <input id="dateText" type="text" />
          </div>
        </div>

        <div class="checkbox-row">
          <input id="showAnswers" type="checkbox" />
          <span>問題ページに小さく答えを表示</span>
        </div>

        <div class="checkbox-row">
          <input id="printAnswerPage" type="checkbox" checked />
          <span>答えページも作る</span>
        </div>

        <div class="buttons">
          <button class="main-btn" onclick="makeWorksheet()">問題をつくる</button>
          <button class="print-btn" onclick="window.print()">A4で印刷する</button>
          <button class="sub-btn" onclick="resetSettings()">設定をもどす</button>
        </div>

        <div class="note no-print">
          「時計を見て時刻を書く」と「時刻を見て針を書く」の両方に対応しています。<br>
          まずは9問か12問が見やすくておすすめです。
        </div>
      </section>

      <section class="preview-wrap">
        <h2>プレビュー</h2>
        <div class="preview-area" id="previewArea">
          <section class="paper" id="worksheetPage">
            <div class="title-row">
              <div class="print-title" id="paperTitle">時計よみれんしゅうプリント</div>
              <div class="title-stars">☆☆☆☆☆</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="paperName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="paperDate">　月　日</span></div>
              <div>シール：<span class="sticker-box">はる</span></div>
            </div>
            <div class="problems" id="problems"></div>
          </section>

          <section class="paper answer-page" id="answerPage">
            <div class="title-row">
              <div class="print-title">こたえ</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="answerName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="answerDate">　月　日</span></div>
              <div></div>
            </div>
            <div class="answers-grid" id="answers"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    let currentProblems = [];

    function todayText() {
      const d = new Date();
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function timeText(hour, minute) {
      return `${hour}時${minute === 0 ? "" : minute + "分"}`;
    }

    function digitalText(hour, minute) {
      return `${hour}:${pad2(minute)}`;
    }

    function makeTime(level) {
      const hour = rand(1, 12);
      let minute = 0;
      if (level === "hour") {
        minute = 0;
      } else if (level === "half") {
        minute = Math.random() < 0.5 ? 0 : 30;
      } else if (level === "five") {
        minute = rand(0, 11) * 5;
      } else {
        minute = rand(0, 59);
      }
      return { hour, minute };
    }

    function minuteAngle(minute) {
      return minute * 6;
    }

    function hourAngle(hour, minute) {
      return ((hour % 12) * 30) + (minute * 0.5);
    }

    function polar(cx, cy, radius, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(rad),
        y: cy + radius * Math.sin(rad)
      };
    }

    function clockSvg(hour, minute, showHands) {
      const cx = 50;
      const cy = 50;
      const hourP = polar(cx, cy, 22, hourAngle(hour, minute));
      const minP = polar(cx, cy, 34, minuteAngle(minute));
      let numbers = "";
      for (let n = 1; n <= 12; n++) {
        const p = polar(cx, cy, 39, n * 30);
        numbers += `<text x="${p.x}" y="${p.y + 3}" text-anchor="middle" font-size="8" font-weight="700">${n}</text>`;
      }
      let ticks = "";
      for (let i = 0; i < 60; i++) {
        const outer = polar(cx, cy, 46, i * 6);
        const inner = polar(cx, cy, i % 5 === 0 ? 42 : 44, i * 6);
        ticks += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}" stroke="#222" stroke-width="${i % 5 === 0 ? 1.2 : 0.5}" />`;
      }
      const hands = showHands ? `
        <line x1="${cx}" y1="${cy}" x2="${hourP.x}" y2="${hourP.y}" stroke="#222" stroke-width="4" stroke-linecap="round" />
        <line x1="${cx}" y1="${cy}" x2="${minP.x}" y2="${minP.y}" stroke="#222" stroke-width="2.4" stroke-linecap="round" />
        <circle cx="${cx}" cy="${cy}" r="2.2" fill="#222" />
      ` : `<circle cx="${cx}" cy="${cy}" r="2" fill="#222" />`;

      return `
        <svg class="clock-svg" viewBox="0 0 100 100" aria-label="時計">
          <circle cx="50" cy="50" r="47" fill="white" stroke="#222" stroke-width="2" />
          ${ticks}
          ${numbers}
          ${hands}
        </svg>
      `;
    }

    function makeProblemHtml(problem, index, showAnswers) {
      const answer = timeText(problem.hour, problem.minute);
      const smallAnswer = showAnswers ? `<div class="answer-small">こたえ：${answer}</div>` : "";

      if (problem.type === "draw") {
        return `
          <div class="problem-number">${index + 1}</div>
          <div class="digital-question">${digitalText(problem.hour, problem.minute)}</div>
          <div class="clock-wrap">${clockSvg(problem.hour, problem.minute, false)}</div>
          <div class="draw-clock-note">時計のはりをかこう</div>
          ${smallAnswer}
        `;
      }

      return `
        <div class="problem-number">${index + 1}</div>
        <div class="clock-wrap">${clockSvg(problem.hour, problem.minute, true)}</div>
        <div class="answer-time">
          <span class="time-line"></span><span>時</span>
          <span class="time-line minute-line"></span><span>分</span>
        </div>
        ${smallAnswer}
      `;
    }

    function makeWorksheet() {
      const childName = document.getElementById("childName").value.trim();
      const titleText = document.getElementById("titleText").value.trim() || "時計よみれんしゅうプリント";
      const questionType = document.getElementById("questionType").value;
      const level = document.getElementById("level").value;
      const count = Number(document.getElementById("count").value);
      const dateText = document.getElementById("dateText").value.trim() || todayText();
      const showAnswers = document.getElementById("showAnswers").checked;
      const printAnswerPage = document.getElementById("printAnswerPage").checked;

      const worksheetPage = document.getElementById("worksheetPage");
      worksheetPage.classList.remove("count-6", "count-9", "count-12", "count-18", "draw-mode");
      worksheetPage.classList.add(`count-${count}`);
      if (questionType === "draw" || questionType === "mix") {
        worksheetPage.classList.add("draw-mode");
      }

      document.getElementById("paperTitle").textContent = titleText;
      document.getElementById("paperName").textContent = childName || "　　　　　　　　";
      document.getElementById("paperDate").textContent = dateText;
      document.getElementById("answerName").textContent = childName || "　　　　　　　　";
      document.getElementById("answerDate").textContent = dateText;

      currentProblems = [];
      for (let i = 0; i < count; i++) {
        const t = makeTime(level);
        let type = questionType;
        if (questionType === "mix") type = Math.random() < 0.5 ? "read" : "draw";
        currentProblems.push({ ...t, type });
      }

      const problemsEl = document.getElementById("problems");
      const answersEl = document.getElementById("answers");
      problemsEl.innerHTML = "";
      answersEl.innerHTML = "";

      currentProblems.forEach((p, index) => {
        const problem = document.createElement("div");
        problem.className = "problem";
        problem.innerHTML = makeProblemHtml(p, index, showAnswers);
        problemsEl.appendChild(problem);

        const answer = document.createElement("div");
        answer.className = "answer-item";
        answer.textContent = `${index + 1}. ${timeText(p.hour, p.minute)}（${digitalText(p.hour, p.minute)}）`;
        answersEl.appendChild(answer);
      });

      const answerPage = document.getElementById("answerPage");
      if (printAnswerPage) {
        answerPage.classList.remove("hidden-print");
        answerPage.style.display = "block";
      } else {
        answerPage.classList.add("hidden-print");
        answerPage.style.display = "none";
      }
    }

    function resetSettings() {
      document.getElementById("childName").value = "";
      document.getElementById("titleText").value = "時計よみれんしゅうプリント";
      document.getElementById("questionType").value = "read";
      document.getElementById("level").value = "five";
      document.getElementById("count").value = "9";
      document.getElementById("dateText").value = todayText();
      document.getElementById("showAnswers").checked = false;
      document.getElementById("printAnswerPage").checked = true;
      makeWorksheet();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dateText").value = todayText();
      makeWorksheet();
    });
  </script>
</body>
</html>
