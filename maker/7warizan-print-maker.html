<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>わり算筆算プリントメーカー</title>

  <link rel="apple-touch-icon" href="img/warizan-print.png">
  <link rel="icon" type="image/png" href="img/warizan-print.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わり算筆算">
  <meta name="theme-color" content="#eef8ff">

  <style>
    @font-face {
      font-family: "SetoFont";
      src: url("fonts/setofont.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #eef8ff;
      --card: #ffffff;
      --main: #7cc7ff;
      --accent: #ffd76a;
      --text: #233447;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "SetoFont", "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #eef8ff 0%, #fff4ce 100%);
      color: var(--text);
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      text-align: center;
      margin: 12px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #50697c;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel, .preview-wrap {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(38, 80, 112, 0.16);
      padding: 18px;
    }

    .panel h2, .preview-wrap h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    label {
      display: block;
      font-weight: 900;
      margin: 14px 0 6px;
      font-size: 15px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #bddcf0;
      border-radius: 14px;
      font-size: 16px;
      background: #fbfdff;
      color: var(--text);
      font-family: inherit;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .checkbox-row input {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      font-family: inherit;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }

    .main-btn { background: var(--main); color: #0d3148; }
    .print-btn { background: #79dc8c; color: #123a1d; }
    .sub-btn { background: #fff1b8; color: #654200; }

    .note {
      margin-top: 14px;
      padding: 12px;
      background: #f4fbff;
      border-left: 5px solid var(--main);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-area {
      overflow: auto;
      background: #dfeaf1;
      border-radius: 18px;
      padding: 16px;
    }

    .paper {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: white;
      color: #222;
      padding: 12mm 12mm;
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10mm;
      margin-bottom: 7px;
    }

    .print-title {
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .title-stars {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.8fr;
      gap: 8px;
      font-size: 15px;
      margin-bottom: 8mm;
      align-items: end;
    }

    .meta-box {
      border-bottom: 1.8px solid #222;
      min-height: 26px;
      padding: 2px 4px;
    }

    .sticker-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24mm;
      height: 10mm;
      margin-left: 2mm;
      border: 1.8px solid #222;
      border-radius: 6px;
      font-size: 11px;
      color: #777;
      vertical-align: middle;
    }

    .problems {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7mm 7mm;
    }

    .problem {
      min-height: 46mm;
      page-break-inside: avoid;
    }

    .problem-number {
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 1mm;
    }

    .warizan-box {
      width: 48mm;
      margin: 0 auto;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.15;
      position: relative;
    }

    .quotient-row {
      height: 9mm;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      border-bottom: 1.5px solid #222;
      margin-left: 12mm;
      margin-right: 2mm;
      color: #aaa;
      font-size: 16px;
    }

    .division-row {
      display: grid;
      grid-template-columns: 12mm 1fr;
      min-height: 11mm;
      align-items: start;
    }

    .divisor {
      text-align: right;
      padding-right: 2mm;
      padding-top: 1.3mm;
    }

    .dividend {
      border-left: 2px solid #222;
      border-top: 2px solid #222;
      min-height: 10mm;
      padding-left: 3mm;
      padding-top: 1.2mm;
      text-align: left;
    }

    .work-lines {
      margin-left: 12mm;
      margin-top: 1.5mm;
      padding-left: 3mm;
      padding-right: 2mm;
    }

    .work-line {
      height: 8mm;
      border-bottom: 1px solid #bbb;
    }

    .answer-final {
      margin-top: 2mm;
      display: flex;
      justify-content: center;
      gap: 2mm;
      font-size: 13px;
      font-weight: 900;
      align-items: center;
    }

    .small-line {
      display: inline-block;
      width: 13mm;
      height: 6mm;
      border-bottom: 1.6px solid #222;
    }

    .answer-small {
      margin-top: 1mm;
      font-size: 11px;
      color: #666;
      text-align: center;
      line-height: 1.35;
    }

    .paper.count-12 .problems {
      grid-template-columns: repeat(3, 1fr);
      gap: 6mm 7mm;
    }

    .paper.count-12 .problem {
      min-height: 43mm;
    }

    .paper.count-18 .print-title {
      font-size: 24px;
    }

    .paper.count-18 .title-stars {
      font-size: 17px;
    }

    .paper.count-18 .meta {
      margin-bottom: 5mm;
      font-size: 13px;
    }

    .paper.count-18 .problems {
      grid-template-columns: repeat(3, 1fr);
      gap: 3mm 6mm;
    }

    .paper.count-18 .problem {
      min-height: 35mm;
    }

    .paper.count-18 .warizan-box {
      width: 44mm;
      font-size: 21px;
    }

    .paper.count-18 .quotient-row {
      height: 7mm;
      font-size: 13px;
    }

    .paper.count-18 .division-row {
      min-height: 9mm;
    }

    .paper.count-18 .work-line {
      height: 6mm;
    }

    .paper.count-18 .answer-final {
      font-size: 11px;
      margin-top: 1mm;
    }

    .paper.count-18 .small-line {
      width: 10mm;
      height: 5mm;
    }

    .answer-page { margin-top: 16px; }

    .answers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7mm 5mm;
      font-size: 17px;
      margin-top: 10mm;
    }

    .answer-item {
      border-bottom: 1px solid #999;
      padding-bottom: 3mm;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .paper {
        transform: scale(0.55);
        transform-origin: top left;
        margin: 0;
      }
      .preview-area { height: 720px; }
    }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white; }
      header, .panel, .preview-wrap > h2, .note, .no-print { display: none !important; }
      .app { max-width: none; padding: 0; }
      .layout { display: block; }
      .preview-wrap { box-shadow: none; padding: 0; border-radius: 0; }
      .preview-area { overflow: visible; padding: 0; background: white; border-radius: 0; }
      .paper {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        transform: none !important;
        transform-origin: initial !important;
      }
      .paper:last-child { page-break-after: auto; }
      .answer-page.hidden-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>わり算筆算プリントメーカー</h1>
      <div class="subtitle">あまりなし・あまりありのわり算筆算プリントをA4で作れます</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>プリント設定</h2>

        <label for="childName">なまえ</label>
        <input id="childName" type="text" placeholder="れい：はる" />

        <label for="titleText">プリント名</label>
        <input id="titleText" type="text" value="わり算筆算れんしゅうプリント" />

        <div class="row">
          <div>
            <label for="level">むずかしさ</label>
            <select id="level">
              <option value="easy" selected>かんたん：商1けた</option>
              <option value="normal">ふつう：商2けた</option>
              <option value="hard">むずかしい：大きめ</option>
            </select>
          </div>
          <div>
            <label for="remainderMode">あまり</label>
            <select id="remainderMode">
              <option value="none" selected>あまりなし</option>
              <option value="with">あまりあり</option>
              <option value="mix">あり・なしミックス</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="count">問題数</label>
            <select id="count">
              <option value="6">6問</option>
              <option value="9" selected>9問</option>
              <option value="12">12問</option>
              <option value="18">18問</option>
            </select>
          </div>
          <div>
            <label for="dateText">日付</label>
            <input id="dateText" type="text" />
          </div>
        </div>

        <div class="checkbox-row">
          <input id="showWorkLines" type="checkbox" checked />
          <span>途中計算を書く線をつける</span>
        </div>

        <div class="checkbox-row">
          <input id="showAnswerBox" type="checkbox" checked />
          <span>答え・あまり欄をつける</span>
        </div>

        <div class="checkbox-row">
          <input id="showAnswers" type="checkbox" />
          <span>問題ページに小さく答えを表示</span>
        </div>

        <div class="checkbox-row">
          <input id="printAnswerPage" type="checkbox" checked />
          <span>答えページも作る</span>
        </div>

        <div class="buttons">
          <button class="main-btn" onclick="makeWorksheet()">問題をつくる</button>
          <button class="print-btn" onclick="window.print()">A4で印刷する</button>
          <button class="sub-btn" onclick="resetSettings()">設定をもどす</button>
        </div>

        <div class="note no-print">
          最初は「かんたん・あまりなし・9問」がおすすめです。<br>
          あまりありは、答え欄に「答え」「あまり」を分けて書けます。
        </div>
      </section>

      <section class="preview-wrap">
        <h2>プレビュー</h2>
        <div class="preview-area" id="previewArea">
          <section class="paper" id="worksheetPage">
            <div class="title-row">
              <div class="print-title" id="paperTitle">わり算筆算れんしゅうプリント</div>
              <div class="title-stars">☆☆☆☆☆</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="paperName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="paperDate">　月　日</span></div>
              <div>シール：<span class="sticker-box">はる</span></div>
            </div>
            <div class="problems" id="problems"></div>
          </section>

          <section class="paper answer-page" id="answerPage">
            <div class="title-row">
              <div class="print-title">こたえ</div>
            </div>
            <div class="meta">
              <div>なまえ：<span class="meta-box" id="answerName">　　　　　　　　</span></div>
              <div>ひづけ：<span class="meta-box" id="answerDate">　月　日</span></div>
              <div></div>
            </div>
            <div class="answers-grid" id="answers"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    let currentProblems = [];

    function todayText() {
      const d = new Date();
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeOneProblem(level, remainderMode) {
      let divisor, quotient, remainder;

      if (level === "easy") {
        divisor = rand(2, 9);
        quotient = rand(2, 9);
      } else if (level === "normal") {
        divisor = rand(2, 9);
        quotient = rand(10, 29);
      } else {
        divisor = rand(2, 9);
        quotient = rand(30, 99);
      }

      if (remainderMode === "none") {
        remainder = 0;
      } else if (remainderMode === "with") {
        remainder = rand(1, divisor - 1);
      } else {
        remainder = Math.random() < 0.5 ? 0 : rand(1, divisor - 1);
      }

      const dividend = divisor * quotient + remainder;
      const answerText = remainder > 0 ? `${quotient} あまり ${remainder}` : String(quotient);
      return { divisor, dividend, quotient, remainder, answerText };
    }

    function makeProblemHtml(problem, index, showWorkLines, showAnswerBox, showAnswers) {
      const workLines = showWorkLines ? `
        <div class="work-lines">
          <div class="work-line"></div>
          <div class="work-line"></div>
          <div class="work-line"></div>
        </div>
      ` : "";

      const answerBox = showAnswerBox ? `
        <div class="answer-final">
          <span>答え</span><span class="small-line"></span>
          <span>あまり</span><span class="small-line"></span>
        </div>
      ` : "";

      return `
        <div class="problem-number">${index + 1}</div>
        <div class="warizan-box">
          <div class="quotient-row">こたえ</div>
          <div class="division-row">
            <div class="divisor">${problem.divisor}</div>
            <div class="dividend">${problem.dividend}</div>
          </div>
          ${workLines}
          ${answerBox}
          ${showAnswers ? `<div class="answer-small">こたえ：${problem.answerText}</div>` : ""}
        </div>
      `;
    }

    function makeWorksheet() {
      const childName = document.getElementById("childName").value.trim();
      const titleText = document.getElementById("titleText").value.trim() || "わり算筆算れんしゅうプリント";
      const level = document.getElementById("level").value;
      const remainderMode = document.getElementById("remainderMode").value;
      const count = Number(document.getElementById("count").value);
      const dateText = document.getElementById("dateText").value.trim() || todayText();
      const showWorkLines = document.getElementById("showWorkLines").checked;
      const showAnswerBox = document.getElementById("showAnswerBox").checked;
      const showAnswers = document.getElementById("showAnswers").checked;
      const printAnswerPage = document.getElementById("printAnswerPage").checked;

      const worksheetPage = document.getElementById("worksheetPage");
      worksheetPage.classList.remove("count-6", "count-9", "count-12", "count-18");
      worksheetPage.classList.add(`count-${count}`);

      document.getElementById("paperTitle").textContent = titleText;
      document.getElementById("paperName").textContent = childName || "　　　　　　　　";
      document.getElementById("paperDate").textContent = dateText;
      document.getElementById("answerName").textContent = childName || "　　　　　　　　";
      document.getElementById("answerDate").textContent = dateText;

      currentProblems = [];
      for (let i = 0; i < count; i++) {
        currentProblems.push(makeOneProblem(level, remainderMode));
      }

      const problemsEl = document.getElementById("problems");
      const answersEl = document.getElementById("answers");
      problemsEl.innerHTML = "";
      answersEl.innerHTML = "";

      currentProblems.forEach((p, index) => {
        const problem = document.createElement("div");
        problem.className = "problem";
        problem.innerHTML = makeProblemHtml(p, index, showWorkLines, showAnswerBox, showAnswers);
        problemsEl.appendChild(problem);

        const answer = document.createElement("div");
        answer.className = "answer-item";
        answer.textContent = `${index + 1}. ${p.dividend} ÷ ${p.divisor} = ${p.answerText}`;
        answersEl.appendChild(answer);
      });

      const answerPage = document.getElementById("answerPage");
      if (printAnswerPage) {
        answerPage.classList.remove("hidden-print");
        answerPage.style.display = "block";
      } else {
        answerPage.classList.add("hidden-print");
        answerPage.style.display = "none";
      }
    }

    function resetSettings() {
      document.getElementById("childName").value = "";
      document.getElementById("titleText").value = "わり算筆算れんしゅうプリント";
      document.getElementById("level").value = "easy";
      document.getElementById("remainderMode").value = "none";
      document.getElementById("count").value = "9";
      document.getElementById("dateText").value = todayText();
      document.getElementById("showWorkLines").checked = true;
      document.getElementById("showAnswerBox").checked = true;
      document.getElementById("showAnswers").checked = false;
      document.getElementById("printAnswerPage").checked = true;
      makeWorksheet();
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dateText").value = todayText();
      makeWorksheet();
    });
  </script>
</body>
</html>
