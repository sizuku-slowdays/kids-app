<html lang="ja">
<head>

  <title>世界の国と首都クイズ</title>

  <link rel="apple-touch-icon" href="img/sekai-quiz.png">
  <link rel="icon" type="image/png" href="img/sekai-quiz.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="世界クイズ">
  <meta name="theme-color" content="#eaf7ff">

  <style>
    :root {
      --bg1: #eaf7ff;
      --bg2: #fff3d9;
      --card: #ffffff;
      --main: #3b82f6;
      --main-dark: #2563eb;
      --pink: #ff8fb3;
      --yellow: #ffd166;
      --green: #34c759;
      --red: #ff5c5c;
      --text: #263238;
      --muted: #607d8b;
      --shadow: 0 14px 35px rgba(59, 130, 246, 0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        "Hiragino Maru Gothic ProN",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffffff 0 0.6rem, transparent 0.65rem),
        radial-gradient(circle at 90% 20%, #ffffff 0 0.75rem, transparent 0.8rem),
        radial-gradient(circle at 20% 80%, #ffffff 0 0.5rem, transparent 0.55rem),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-size: 120px 120px, 160px 160px, 130px 130px, auto;
      padding: 18px;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding-bottom: 24px;
    }

    .top-decoration {
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 34px;
      margin: 8px 0 2px;
      animation: floaty 3s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .card {
      background: rgba(255, 255, 255, 0.93);
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin: 16px auto;
    }

    .title {
      font-size: clamp(30px, 7vw, 52px);
      text-align: center;
      line-height: 1.15;
      margin: 8px 0;
      color: #1d4ed8;
      letter-spacing: 0.03em;
    }

    .subtitle {
      font-size: clamp(18px, 4.2vw, 26px);
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
      margin: 10px 0 20px;
      font-weight: 700;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    @media (min-width: 720px) {
      .mode-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    button {
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: transform 0.08s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .mode-btn {
      width: 100%;
      min-height: 92px;
      border-radius: 24px;
      background: linear-gradient(135deg, #ffffff, #f4fbff);
      border: 4px solid #d6edff;
      color: #174ea6;
      padding: 18px;
      font-size: clamp(20px, 5vw, 28px);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 8px 18px rgba(29, 78, 216, 0.10);
    }

    .mode-btn .icon {
      font-size: 36px;
      flex: 0 0 auto;
    }

    .mode-btn.challenge {
      background: linear-gradient(135deg, #fff7d6, #ffe8f0);
      border-color: #ffd166;
      color: #b45309;
    }

    .small-note {
      font-size: 15px;
      color: #607d8b;
      line-height: 1.6;
      text-align: center;
      margin-top: 18px;
      font-weight: 700;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .quiz-header {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: stretch;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      background: #ffffff;
      border: 3px solid #d6edff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: clamp(16px, 4vw, 21px);
      font-weight: 900;
      color: #1d4ed8;
      box-shadow: 0 5px 12px rgba(59, 130, 246, 0.08);
    }

    .question-card {
      background: linear-gradient(180deg, #ffffff, #f9fcff);
      border-radius: 28px;
      border: 4px solid #ffffff;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .region {
      display: inline-block;
      background: #fff3bf;
      color: #8a5a00;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: clamp(15px, 4vw, 20px);
      font-weight: 900;
      margin-bottom: 12px;
    }

    .question {
      font-size: clamp(25px, 6vw, 42px);
      line-height: 1.35;
      margin: 8px 0 20px;
      font-weight: 900;
      color: #17324d;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 640px) {
      .choices {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .choice-btn {
      min-height: 76px;
      border-radius: 22px;
      background: #ffffff;
      border: 4px solid #d6edff;
      color: #17324d;
      font-size: clamp(21px, 5vw, 30px);
      padding: 16px;
      line-height: 1.25;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
    }

    .choice-btn:hover {
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.11);
    }

    .choice-btn.correct {
      background: #e8ffe9;
      border-color: var(--green);
      color: #117a28;
    }

    .choice-btn.wrong {
      background: #fff0f0;
      border-color: var(--red);
      color: #b42318;
    }

    .choice-btn:disabled {
      cursor: default;
      opacity: 0.92;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      border-radius: 24px;
      padding: 18px;
      font-size: clamp(18px, 4.5vw, 25px);
      line-height: 1.55;
      font-weight: 800;
    }

    .feedback.show {
      display: block;
    }

    .feedback.good {
      background: #e8ffe9;
      border: 4px solid var(--green);
      color: #117a28;
    }

    .feedback.bad {
      background: #fff0f0;
      border: 4px solid var(--red);
      color: #b42318;
    }

    .explain {
      display: block;
      margin-top: 8px;
      color: #374151;
      font-weight: 800;
    }

    .next-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .main-btn,
    .sub-btn {
      min-height: 58px;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: clamp(18px, 4.5vw, 24px);
      box-shadow: 0 8px 18px rgba(29, 78, 216, 0.15);
    }

    .main-btn {
      background: linear-gradient(135deg, var(--main), var(--main-dark));
      color: white;
    }

    .sub-btn {
      background: #ffffff;
      color: #1d4ed8;
      border: 3px solid #bfdbfe;
    }

    .result-score {
      text-align: center;
      font-size: clamp(44px, 14vw, 84px);
      color: #1d4ed8;
      font-weight: 1000;
      margin: 10px 0;
      line-height: 1;
    }

    .result-message {
      text-align: center;
      font-size: clamp(22px, 5.5vw, 34px);
      color: #17324d;
      font-weight: 900;
      line-height: 1.5;
      margin: 14px 0 20px;
    }

    .star-line {
      text-align: center;
      font-size: clamp(30px, 8vw, 58px);
      margin: 12px 0;
      letter-spacing: 0.08em;
    }

    .review-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .review-item {
      background: #f8fbff;
      border: 3px solid #dbeafe;
      border-radius: 18px;
      padding: 14px;
      font-size: clamp(15px, 4vw, 19px);
      line-height: 1.5;
      font-weight: 750;
    }

    ruby rt {
      font-size: 0.55em;
      color: #6b7280;
      font-weight: 700;
    }

    .footer-note {
      text-align: center;
      color: #78909c;
      font-size: 13px;
      font-weight: 700;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="topScreen" class="screen active">
      <div class="top-decoration">🌏 ✈️ 🗺️ ⭐</div>
      <div class="card">
        <h1 class="title">世界の国と首都クイズ</h1>
        <p class="subtitle">国・首都・有名な都市をおぼえよう！</p>

        <div class="mode-grid">
          <button class="mode-btn" onclick="startQuiz('countryToCapital')">
            <span class="icon">🏳️</span>
            <span>国から<br>首都をあてる</span>
          </button>

          <button class="mode-btn" onclick="startQuiz('capitalToCountry')">
            <span class="icon">🏙️</span>
            <span>首都から<br>国をあてる</span>
          </button>

          <button class="mode-btn" onclick="startQuiz('cityToCountry')">
            <span class="icon">🌉</span>
            <span>有名な都市から<br>国をあてる</span>
          </button>

          <button class="mode-btn challenge" onclick="startQuiz('challenge')">
            <span class="icon">🎯</span>
            <span>チャレンジ<br>いろいろ10問</span>
          </button>
        </div>

        <p class="small-note">
          4つの中からえらんでね。<br>
          10問おわると、結果が出るよ！
        </p>
      </div>
      <p class="footer-note">GitHub Pagesでそのまま使える1ファイル版</p>
    </section>

    <section id="quizScreen" class="screen">
      <div class="quiz-header">
        <div id="modeBadge" class="badge">モード</div>
        <div id="progressBadge" class="badge">1 / 10</div>
        <div id="scoreBadge" class="badge">せいかい 0</div>
      </div>

      <div class="question-card">
        <div id="regionLabel" class="region">ヨーロッパ</div>
        <div id="questionText" class="question">問題文</div>
        <div id="choices" class="choices"></div>

        <div id="feedback" class="feedback"></div>

        <div class="next-row">
          <button id="nextBtn" class="main-btn" onclick="nextQuestion()" style="display:none;">つぎへ</button>
          <button class="sub-btn" onclick="goTop()">トップへ</button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="card">
        <div class="top-decoration">🎉 🌏 🎉</div>
        <h2 class="title">結果発表！</h2>
        <div id="starLine" class="star-line">⭐⭐⭐</div>
        <div id="resultScore" class="result-score">0 / 10</div>
        <div id="resultMessage" class="result-message">よくがんばったね！</div>

        <div class="next-row">
          <button class="main-btn" onclick="restartSameMode()">もういちど</button>
          <button class="sub-btn" onclick="goTop()">トップへ</button>
        </div>

        <div id="reviewList" class="review-list"></div>
      </div>
    </section>
  </main>

        ]

    const MODE_LABELS = {
      countryToCapital: "国から首都",
      capitalToCountry: "首都から国",
      cityToCountry: "有名都市から国",
      challenge: "チャレンジ"
    };

    const TOTAL_QUESTIONS = 10;

    let currentMode = "countryToCapital";
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let results = [];

    function plainText(htmlText) {
      const div = document.createElement("div");
      div.innerHTML = htmlText || "";
      return div.textContent || div.innerText || "";
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sample(array, count) {
      return shuffle(array).slice(0, count);
    }

    function allCountries() {
      return WORLD_DATA.map(item => item.country);
    }

    function allCapitals() {
      return WORLD_DATA.map(item => item.capital);
    }

    function allCityItems() {
      return WORLD_DATA.flatMap(countryData =>
        countryData.famousCities.map(cityData => ({
          ...cityData,
          country: countryData.country,
          capital: countryData.capital,
          region: countryData.region
        }))
      );
    }

    function makeChoices(correct, pool) {
      const wrongPool = pool.filter(item => item !== correct);
      return shuffle([correct, ...sample(wrongPool, 3)]);
    }

    function makeCountryToCapitalQuestion(data) {
      return {
        type: "countryToCapital",
        region: data.region,
        question: `${data.country}の首都はどこ？`,
        answer: data.capital,
        choices: makeChoices(data.capital, allCapitals()),
        explanation: `${data.country}の首都は${data.capital}です。${data.region}にあります。`
      };
    }

    function makeCapitalToCountryQuestion(data) {
      return {
        type: "capitalToCountry",
        region: data.region,
        question: `${data.capital}はどこの国の首都？`,
        answer: data.country,
        choices: makeChoices(data.country, allCountries()),
        explanation: `${data.capital}は${data.country}の首都です。`
      };
    }

    function makeCityToCountryQuestion(cityItem) {
      const display = cityItem.displayCity || cityItem.city;
      return {
        type: "cityToCountry",
        region: cityItem.region,
        question: `${display}がある国はどこ？`,
        answer: cityItem.country,
        choices: makeChoices(cityItem.country, allCountries()),
        explanation: `${display}は${cityItem.country}の都市です。${cityItem.reason}`
      };
    }

    function makeQuestion(type) {
      if (type === "countryToCapital") {
        return makeCountryToCapitalQuestion(sample(WORLD_DATA, 1)[0]);
      }

      if (type === "capitalToCountry") {
        return makeCapitalToCountryQuestion(sample(WORLD_DATA, 1)[0]);
      }

      if (type === "cityToCountry") {
        return makeCityToCountryQuestion(sample(allCityItems(), 1)[0]);
      }

      const types = ["countryToCapital", "capitalToCountry", "cityToCountry"];
      return makeQuestion(sample(types, 1)[0]);
    }

    function buildQuestions(mode) {
      const questions = [];
      const usedKeys = new Set();
      let guard = 0;

      while (questions.length < TOTAL_QUESTIONS && guard < 300) {
        guard++;
        const q = makeQuestion(mode);
        const key = `${q.type}-${plainText(q.question)}-${q.answer}`;
        if (!usedKeys.has(key)) {
          usedKeys.add(key);
          questions.push(q);
        }
      }

      return questions;
    }

    function startQuiz(mode) {
      currentMode = mode;
      quizQuestions = buildQuestions(mode);
      currentIndex = 0;
      score = 0;
      answered = false;
      results = [];

      showScreen("quizScreen");
      showQuestion();
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(screenId).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showQuestion() {
      answered = false;
      const q = quizQuestions[currentIndex];

      document.getElementById("modeBadge").textContent = MODE_LABELS[currentMode];
      document.getElementById("progressBadge").textContent = `${currentIndex + 1} / ${TOTAL_QUESTIONS}`;
      document.getElementById("scoreBadge").textContent = `せいかい ${score}`;
      document.getElementById("regionLabel").textContent = q.region;
      document.getElementById("questionText").innerHTML = q.question;

      const choicesEl = document.getElementById("choices");
      choicesEl.innerHTML = "";

      q.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.onclick = () => answerQuestion(choice, btn);
        choicesEl.appendChild(btn);
      });

      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";
    }

    function answerQuestion(choice, clickedBtn) {
      if (answered) return;
      answered = true;

      const q = quizQuestions[currentIndex];
      const isCorrect = choice === q.answer;

      if (isCorrect) score++;

      document.querySelectorAll(".choice-btn").forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        } else if (btn === clickedBtn) {
          btn.classList.add("wrong");
        }
      });

      const feedback = document.getElementById("feedback");
      feedback.classList.add("show");
      feedback.classList.add(isCorrect ? "good" : "bad");

      if (isCorrect) {
        feedback.innerHTML = `🎉 せいかい！<span class="explain">${q.explanation}</span>`;
      } else {
        feedback.innerHTML = `💡 もういちど！<span class="explain">正しい答えは「${q.answer}」です。<br>${q.explanation}</span>`;
      }

      results.push({
        question: plainText(q.question),
        answer: q.answer,
        yourAnswer: choice,
        correct: isCorrect,
        explanation: plainText(q.explanation)
      });

      document.getElementById("scoreBadge").textContent = `せいかい ${score}`;
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("nextBtn").textContent =
        currentIndex + 1 >= TOTAL_QUESTIONS ? "結果を見る" : "つぎへ";
    }

    function nextQuestion() {
      if (currentIndex + 1 >= TOTAL_QUESTIONS) {
        showResult();
      } else {
        currentIndex++;
        showQuestion();
      }
    }

    function showResult() {
      showScreen("resultScreen");

      document.getElementById("resultScore").textContent = `${score} / ${TOTAL_QUESTIONS}`;

      let message = "よくがんばったね！";
      let stars = "⭐⭐⭐";

      if (score === 10) {
        message = "すごい！世界マスターだね！";
        stars = "⭐⭐⭐⭐⭐";
      } else if (score >= 8) {
        message = "とてもよくできました！";
        stars = "⭐⭐⭐⭐";
      } else if (score >= 5) {
        message = "いい感じ！もう一回やるともっと覚えられるよ！";
        stars = "⭐⭐⭐";
      } else {
        message = "だいじょうぶ！少しずつ覚えていこう！";
        stars = "⭐⭐";
      }

      document.getElementById("resultMessage").textContent = message;
      document.getElementById("starLine").textContent = stars;

      const reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";

      results.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = `
          <strong>${index + 1}. ${item.correct ? "⭕" : "❌"} ${item.question}</strong><br>
          あなたの答え：${item.yourAnswer}<br>
          正しい答え：${item.answer}
        `;
        reviewList.appendChild(div);
      });
    }

    function restartSameMode() {
      startQuiz(currentMode);
    }

    function goTop() {
      showScreen("topScreen");
    }
