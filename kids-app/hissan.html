<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ひっ算れんしゅう</title>

<link rel="apple-touch-icon" href="img/hissan.png">
<link rel="icon" type="image/png" href="img/hissan.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ひっ算れんしゅう">
<meta name="theme-color" content="#fff7d6">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #fff7d6 0%, #ffe6f0 50%, #e6f7ff 100%);
  color: #333;
  text-align: center;
  padding: 18px;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

h1 {
  font-size: clamp(30px, 8vw, 46px);
  color: #ff8a00;
  text-shadow: 2px 2px 0 #fff;
  margin: 18px 0 8px;
}

.subtitle {
  font-size: 17px;
  color: #666;
  margin-bottom: 24px;
}

.card {
  max-width: 520px;
  margin: 0 auto;
  background: rgba(255,255,255,0.94);
  border-radius: 28px;
  padding: 22px 18px;
  border: 4px solid #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 18px;
}

.mode-btn {
  border: none;
  border-radius: 24px;
  padding: 24px 10px;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.16);
  color: #fff;
}

.mode-btn.add {
  background: linear-gradient(135deg, #ff9a9e, #ff6b6b);
}

.mode-btn.sub {
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
}

.mode-btn:active,
.big-btn:active,
.small-btn:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.16);
}

.note {
  margin-top: 18px;
  font-size: 14px;
  color: #777;
  line-height: 1.6;
}

.top-bar {
  max-width: 560px;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.small-btn {
  border: none;
  border-radius: 18px;
  background: #fff;
  color: #555;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: bold;
  box-shadow: 0 4px 0 rgba(0,0,0,0.12);
  cursor: pointer;
}

.status {
  flex: 1;
  background: #fff;
  border-radius: 18px;
  padding: 10px;
  font-size: 15px;
  font-weight: bold;
  color: #555;
  box-shadow: 0 4px 0 rgba(0,0,0,0.08);
}

.quiz-card {
  max-width: 560px;
  margin: 0 auto;
  background: #fff;
  border-radius: 30px;
  padding: 24px 14px 20px;
  border: 4px solid #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.14);
}

.mode-label {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 17px;
  font-weight: bold;
  background: #fff3b0;
  color: #8a6500;
  margin-bottom: 16px;
}

.hissan-wrap {
  display: inline-block;
  margin: 4px auto 20px;
  padding: 12px 18px 18px;
  background: #fffaf0;
  border-radius: 24px;
  border: 3px dashed #ffd36e;
}

.hissan-table {
  border-collapse: collapse;
  margin: 0 auto;
}

.hissan-table td {
  width: 54px;
  height: 54px;
  text-align: center;
  font-size: 38px;
  font-weight: bold;
  vertical-align: middle;
}

.op-cell {
  width: 42px !important;
  color: #ff7a00;
}

.line-row td {
  height: 14px;
  border-top: 5px solid #333;
}

.answer-input {
  width: 48px;
  height: 52px;
  border: 3px solid #bde7ff;
  border-radius: 14px;
  text-align: center;
  font-size: 34px;
  font-weight: bold;
  background: #f0fbff;
  color: #333;
}

.answer-input:focus {
  outline: none;
  border-color: #ff9a9e;
  background: #fff4f6;
}

.feedback {
  min-height: 72px;
  margin: 8px auto 14px;
  padding: 14px;
  max-width: 460px;
  border-radius: 22px;
  font-size: 22px;
  font-weight: bold;
  display: none;
}

.feedback.correct {
  display: block;
  background: #e8ffe8;
  color: #1e8f3a;
}

.feedback.wrong {
  display: block;
  background: #fff0f0;
  color: #d33;
}

.feedback .small {
  display: block;
  margin-top: 6px;
  font-size: 15px;
  color: #555;
  font-weight: normal;
}

.big-btn {
  width: 100%;
  max-width: 420px;
  border: none;
  border-radius: 24px;
  padding: 17px 18px;
  font-size: 23px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.18);
  margin: 8px auto;
  display: block;
}

.check-btn {
  background: linear-gradient(135deg, #ffb347, #ff8a00);
}

.next-btn {
  background: linear-gradient(135deg, #7fdc82, #32b768);
  display: none;
}

.next-btn.show {
  display: block;
}

.result-emoji {
  font-size: 72px;
  margin-bottom: 12px;
}

.result-title {
  font-size: 32px;
  color: #ff8a00;
  font-weight: bold;
  margin-bottom: 12px;
}

.result-score {
  font-size: 48px;
  font-weight: bold;
  color: #ff6b6b;
  margin: 10px 0;
}

.result-message {
  font-size: 18px;
  line-height: 1.7;
  color: #555;
  margin-bottom: 18px;
}

@media (max-width: 420px) {
  .hissan-table td {
    width: 48px;
    height: 50px;
    font-size: 34px;
  }

  .answer-input {
    width: 44px;
    height: 50px;
    font-size: 32px;
  }

  .mode-btn {
    font-size: 21px;
  }
}

.carry-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.carry-btn {
  border: none;
  border-radius: 20px;
  padding: 18px 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(135deg, #ffe28a, #ffb347);
  color: #7a4400;
  box-shadow: 0 5px 0 #c47d10;
  line-height: 1.4;
  font-family: inherit;
}

.carry-btn.carry-mix {
  background: linear-gradient(135deg, #c8a8f8, #9b72e8);
  color: #3a1a7a;
  box-shadow: 0 5px 0 #6b3ab8;
}

.carry-btn:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #c47d10;
}

.carry-btn.carry-mix:active {
  box-shadow: 0 2px 0 #6b3ab8;
}

.carry-icon {
  font-size: 28px;
  display: block;
  margin-bottom: 4px;
}

.carry-label {
  font-size: 13px;
  line-height: 1.4;
}

.back-link {
  border: none;
  background: none;
  color: #aaa;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  font-family: inherit;
  text-decoration: underline;
}
</style>
</head>

<body>

<div id="screen-top" class="screen active">
  <h1>ひっ算れんしゅう</h1>
  <p class="subtitle">たし算・ひき算を れんしゅうしよう！</p>

  <!-- ステップ1：たし算／ひき算 -->
  <div id="step-mode" class="card">
    <p style="font-size:20px; font-weight:bold;">どっちを やる？</p>
    <div class="mode-grid">
      <button class="mode-btn add" onclick="selectMode('add')">
        ＋<br>たし算
      </button>
      <button class="mode-btn sub" onclick="selectMode('sub')">
        －<br>ひき算
      </button>
    </div>
    <p class="note">
      2けたのひっ算がでるよ。<br>
      こたえを 1けたずつ 入れてね。
    </p>
  </div>

  <!-- ステップ2：くりあがり選択 -->
  <div id="step-carry" class="card" style="display:none;">
    <p style="font-size:18px; font-weight:bold; margin-bottom:4px;" id="carry-heading">くりあがり は どうする？</p>
    <p style="font-size:13px; color:#888; margin-bottom:16px;" id="carry-note">たし算のくりあがりをえらんでね</p>
    <div class="carry-grid">
      <button class="carry-btn" onclick="startQuiz('no')">
        <span class="carry-icon">🌱</span><br>
        <span class="carry-label" id="label-no">くりあがり<br>なし</span>
      </button>
      <button class="carry-btn" onclick="startQuiz('yes')">
        <span class="carry-icon">⭐</span><br>
        <span class="carry-label" id="label-yes">くりあがり<br>あり</span>
      </button>
      <button class="carry-btn carry-mix" onclick="startQuiz('mix')">
        <span class="carry-icon">🎲</span><br>
        <span class="carry-label">ミックス</span>
      </button>
    </div>
    <button class="back-link" onclick="backToModeSelect()">← もどる</button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="top-bar">
    <button class="small-btn" onclick="goHome()">← もどる</button>
    <div class="status">
      <span id="q-count">1 / 10</span>　⭐ <span id="score">0</span>てん
    </div>
  </div>

  <div class="quiz-card">
    <div class="mode-label" id="mode-label">たし算</div>

    <div class="hissan-wrap">
      <table class="hissan-table">
        <tr>
          <td class="op-cell"></td>
          <td id="num1-tens">3</td>
          <td id="num1-ones">8</td>
        </tr>
        <tr>
          <td class="op-cell" id="operator">+</td>
          <td id="num2-tens">2</td>
          <td id="num2-ones">7</td>
        </tr>
        <tr class="line-row">
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <tr>
          <td class="op-cell"></td>
          <td>
            <input id="answer-tens" class="answer-input" inputmode="numeric" maxlength="1" aria-label="十の位">
          </td>
          <td>
            <input id="answer-ones" class="answer-input" inputmode="numeric" maxlength="1" aria-label="一の位">
          </td>
        </tr>
      </table>
    </div>

    <div id="feedback" class="feedback"></div>

    <button id="check-btn" class="big-btn check-btn" onclick="checkAnswer()">こたえあわせ</button>
    <button id="next-btn" class="big-btn next-btn" onclick="nextQuestion()">つぎの もんだいへ</button>
  </div>
</div>

<div id="screen-result" class="screen">
  <h1>けっか</h1>

  <div class="card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">よくできました！</div>
    <div class="result-score">
      <span id="final-score">0</span> / 10
    </div>
    <div class="result-message" id="result-message"></div>

    <button class="big-btn check-btn" onclick="restartSameMode()">もう一度 やる</button>
    <button class="big-btn next-btn show" onclick="goHome()">トップに もどる</button>
  </div>
</div>

<script>
let mode = "add";   // "add" | "sub"
let carry = "mix";  // "yes" | "no" | "mix"
let currentQuestion = 0;
let score = 0;
let answered = false;

let num1 = 0;
let num2 = 0;
let correctAnswer = 0;

const TOTAL_QUESTIONS = 10;

const answerTens = document.getElementById("answer-tens");
const answerOnes = document.getElementById("answer-ones");

// ── 1の位：入力したら10の位へ移動 ──
answerOnes.addEventListener("input", () => {
  answerOnes.value = answerOnes.value.replace(/[^0-9]/g, "");
  if (answerOnes.value.length === 1) {
    answerTens.focus();
    answerTens.select();
  }
});

// ── 10の位：Backspaceで空なら1の位へ戻る ──
answerTens.addEventListener("input", () => {
  answerTens.value = answerTens.value.replace(/[^0-9]/g, "");
});

answerOnes.addEventListener("keydown", event => {
  if (event.key === "Backspace" && answerOnes.value === "") {
    answerTens.focus();
  }
  if (event.key === "Enter") {
    checkAnswer();
  }
});

answerTens.addEventListener("keydown", event => {
  if (event.key === "Backspace" && answerTens.value === "") {
    answerOnes.focus();
    const len = answerOnes.value.length;
    answerOnes.setSelectionRange(len, len);
  }
  if (event.key === "Enter") {
    checkAnswer();
  }
});

// ── トップ画面：ステップ1でたし算/ひき算を選ぶ ──
function selectMode(selectedMode) {
  mode = selectedMode;
  document.getElementById("step-mode").style.display = "none";
  document.getElementById("step-carry").style.display = "block";

  if (selectedMode === "add") {
    document.getElementById("carry-heading").textContent = "くりあがり は どうする？";
    document.getElementById("carry-note").textContent = "たし算のくりあがりをえらんでね";
    document.getElementById("label-no").innerHTML = "くりあがり<br>なし";
    document.getElementById("label-yes").innerHTML = "くりあがり<br>あり";
  } else {
    document.getElementById("carry-heading").textContent = "くりさがり は どうする？";
    document.getElementById("carry-note").textContent = "ひき算のくりさがりをえらんでね";
    document.getElementById("label-no").innerHTML = "くりさがり<br>なし";
    document.getElementById("label-yes").innerHTML = "くりさがり<br>あり";
  }
}

function backToModeSelect() {
  document.getElementById("step-carry").style.display = "none";
  document.getElementById("step-mode").style.display = "block";
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });
  document.getElementById("screen-" + name).classList.add("active");
  window.scrollTo(0, 0);
}

// ── ステップ2でくりあがりを選んでスタート ──
function startQuiz(selectedCarry) {
  carry = selectedCarry;
  currentQuestion = 0;
  score = 0;

  // トップに戻ったとき用にステップ1を見えるように戻しておく
  document.getElementById("step-carry").style.display = "none";
  document.getElementById("step-mode").style.display = "block";

  showScreen("quiz");
  makeQuestion();
}

function restartSameMode() {
  currentQuestion = 0;
  score = 0;
  showScreen("quiz");
  makeQuestion();
}

function goHome() {
  showScreen("top");
}

function makeQuestion() {
  answered = false;
  currentQuestion++;

  document.getElementById("q-count").textContent = currentQuestion + " / " + TOTAL_QUESTIONS;
  document.getElementById("score").textContent = score;

  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").innerHTML = "";

  document.getElementById("check-btn").style.display = "block";
  document.getElementById("next-btn").classList.remove("show");

  answerTens.value = "";
  answerOnes.value = "";
  answerTens.disabled = false;
  answerOnes.disabled = false;

  // ミックスのときはこの問題でくりあがりありにするかランダム決定
  const useCarry = carry === "mix" ? (Math.random() < 0.5 ? "yes" : "no") : carry;

  if (mode === "add") {
    const carryLabel = useCarry === "yes" ? "たし算（くりあがりあり）" : "たし算（くりあがりなし）";
    document.getElementById("mode-label").textContent = carry === "mix" ? "たし算" : carryLabel;
    document.getElementById("operator").textContent = "+";
    makeAddQuestion(useCarry === "yes");
  } else {
    const carryLabel = useCarry === "yes" ? "ひき算（くりさがりあり）" : "ひき算（くりさがりなし）";
    document.getElementById("mode-label").textContent = carry === "mix" ? "ひき算" : carryLabel;
    document.getElementById("operator").textContent = "-";
    makeSubQuestion(useCarry === "yes");
  }

  setNumbersOnScreen();

  setTimeout(() => {
    answerOnes.focus();
  }, 100);
}

// ── たし算問題生成 ──
// needCarry=true  → 1の位の和が10以上（くりあがりあり）
// needCarry=false → 1の位の和が9以下（くりあがりなし）
function makeAddQuestion(needCarry) {
  let a, b, sum;
  let tries = 0;
  do {
    a = randomTwoDigit();
    b = randomTwoDigit();
    sum = a + b;
    tries++;
    if (tries > 1000) break;
  } while (
    sum > 99 || sum < 10 ||
    (needCarry  && (a % 10) + (b % 10) < 10) ||
    (!needCarry && (a % 10) + (b % 10) >= 10)
  );

  num1 = a;
  num2 = b;
  correctAnswer = sum;
}

// ── ひき算問題生成 ──
// needCarry=true  → 1の位で引けない（くりさがりあり）
// needCarry=false → 1の位で引ける（くりさがりなし）
function makeSubQuestion(needCarry) {
  let a, b, answer;
  let tries = 0;
  do {
    a = randomTwoDigit();
    b = randomTwoDigit();
    if (b > a) { const t = a; a = b; b = t; }
    answer = a - b;
    tries++;
    if (tries > 1000) break;
  } while (
    answer < 10 || answer > 99 ||
    (needCarry  && (a % 10) >= (b % 10)) ||
    (!needCarry && (a % 10) <  (b % 10))
  );

  num1 = a;
  num2 = b;
  correctAnswer = answer;
}

function randomTwoDigit() {
  return Math.floor(Math.random() * 90) + 10;
}

function setNumbersOnScreen() {
  document.getElementById("num1-tens").textContent = Math.floor(num1 / 10);
  document.getElementById("num1-ones").textContent = num1 % 10;
  document.getElementById("num2-tens").textContent = Math.floor(num2 / 10);
  document.getElementById("num2-ones").textContent = num2 % 10;
}

function checkAnswer() {
  if (answered) return;

  const tens = answerTens.value;
  const ones = answerOnes.value;

  if (tens === "" || ones === "") {
    showFeedback("wrong", "十の位と一の位を、どちらも入れてね。");
    return;
  }

  const userAnswer = Number(tens + ones);
  answered = true;

  answerTens.disabled = true;
  answerOnes.disabled = true;

  if (userAnswer === correctAnswer) {
    score++;
    document.getElementById("score").textContent = score;
    showFeedback("correct", "⭕ せいかい！すごい！");
  } else {
    const correctText = String(correctAnswer).padStart(2, "0");
    showFeedback(
      "wrong",
      "❌ もういちど！<span class='small'>せいかいは " + correctText + " だよ</span>"
    );
  }

  document.getElementById("check-btn").style.display = "none";
  document.getElementById("next-btn").classList.add("show");

  if (currentQuestion >= TOTAL_QUESTIONS) {
    document.getElementById("next-btn").textContent = "けっかをみる";
  } else {
    document.getElementById("next-btn").textContent = "つぎの もんだいへ";
  }
}

function showFeedback(type, message) {
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback " + type;
  feedback.innerHTML = message;
}

function nextQuestion() {
  if (currentQuestion >= TOTAL_QUESTIONS) {
    showResult();
  } else {
    makeQuestion();
  }
}

function showResult() {
  showScreen("result");

  document.getElementById("final-score").textContent = score;

  const emoji = document.getElementById("result-emoji");
  const title = document.getElementById("result-title");
  const message = document.getElementById("result-message");

  if (score === 10) {
    emoji.textContent = "🏆";
    title.textContent = "パーフェクト！";
    message.innerHTML = "ぜんぶ せいかい！<br>ひっ算マスターだね！";
  } else if (score >= 8) {
    emoji.textContent = "🎉";
    title.textContent = "すごい！";
    message.innerHTML = "とても よくできました！<br>もうすこしで パーフェクト！";
  } else if (score >= 5) {
    emoji.textContent = "😊";
    title.textContent = "よくできたね！";
    message.innerHTML = "半分以上できたよ！<br>もう一回やってみよう！";
  } else {
    emoji.textContent = "💪";
    title.textContent = "もう一回！";
    message.innerHTML = "れんしゅうすれば だいじょうぶ！<br>ゆっくり がんばろう！";
  }
}
</script>

</body>
</html>
