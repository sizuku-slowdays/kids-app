<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue2:#EAF4FF;--green:#2E7D32;--green-bg:#EAF6EA;--red:#B71C1C;--red-bg:#FDEAEA;--yellow:#FFF7D6;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f6f5f2;--card:#fff}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom)}
#app{max-width:620px;margin:0 auto;padding:14px 0 26px}
.screen{display:none}.screen.active{display:block}
.header{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
h1{font-size:25px;color:var(--blue);font-weight:900;letter-spacing:.03em}.sub{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.6}
.section-title{font-size:14px;font-weight:900;margin:16px 2px 8px;color:#374151}
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.grade-btn,.mode-btn{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);user-select:none}
.grade-btn.selected{background:var(--blue);color:white;border-color:var(--blue)}.grade-btn.disabled{opacity:.45;cursor:not-allowed;background:#f3f4f6}
.grade-main{font-size:18px;font-weight:900}.grade-sub{font-size:11px;margin-top:4px;color:var(--muted)}.grade-btn.selected .grade-sub{color:rgba(255,255,255,.82)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mode-icon{font-size:25px}.mode-label{font-size:15px;font-weight:900;margin-top:5px}.mode-desc{color:var(--muted);font-size:11px;margin-top:4px;line-height:1.35}
.notice{margin-top:12px;background:var(--yellow);border-radius:14px;padding:10px 12px;color:#6b4e00;font-size:12px;line-height:1.6}
.search-row{display:flex;gap:8px;margin-top:8px}.search-row input{flex:1;border:1px solid var(--line);border-radius:14px;padding:11px;font-size:15px}.search-row button{border:0;border-radius:14px;background:var(--blue);color:white;padding:0 15px;font-weight:900;cursor:pointer}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}.back{border:0;background:#e5e7eb;border-radius:12px;padding:8px 11px;font-size:18px;font-weight:900;cursor:pointer}.quiz-title{font-size:16px;font-weight:900}.counter{margin-left:auto;color:var(--muted);font-size:13px;font-weight:800}
.progress-wrap{height:7px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:10px}.progress{height:100%;background:var(--blue);width:0%;transition:.25s}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:12px}
.big-kanji{font-size:88px;font-weight:900;line-height:1}.big-word{font-size:42px;font-weight:900;line-height:1.18;word-break:keep-all}.prompt{color:var(--muted);margin-top:10px;font-size:14px;font-weight:800;line-height:1.6}

</head>
<body>
<div id="app">
<section id="home" class="screen active">
<div class="header"><h1>漢字れんしゅう</h1><p class="sub">カード資料ベースの漢字アプリ。今は 1・2・3・6年生データで動きます。</p></div>
<div class="section-title">学年をえらぶ</div><div class="grade-grid" id="gradeGrid"></div>
<div class="notice">4年生・5年生は準備中です。あとからJSデータを追加すれば、このアプリにそのまま組み込めます。</div>
<div class="section-title">モードをえらぶ</div>
<div class="mode-grid">
<button class="mode-btn" onclick="startMode('wordReading')"><div class="mode-icon">📖</div><div class="mode-label">ことばの読み</div><div class="mode-desc">例：森の中 → もりのなか</div></button>
<button class="mode-btn" onclick="startMode('kanjiChoice')"><div class="mode-icon">🔎</div><div class="mode-label">漢字はどれ？</div><div class="mode-desc">例：もりのなか → 森</div></button>
<button class="mode-btn" onclick="startMode('mainReading')"><div class="mode-icon">🌱</div><div class="mode-label">よく使う読み</div><div class="mode-desc">mainがある漢字だけ出題</div></button>
<button class="mode-btn" onclick="startMode('flash')"><div class="mode-icon">🃏</div><div class="mode-label">カード</div><div class="mode-desc">漢字・読み・例のことばを確認</div></button>
</div>
<div class="section-title">漢字・ことばをさがす</div><div class="search-row"><input id="searchInput" placeholder="例：森、森林、しんりん"><button onclick="searchData()">検索</button></div><div id="searchResult" style="margin-top:10px;"></div>
</section>
<section id="quiz" class="screen">
<div class="topbar"><button class="back" onclick="goHome()">←</button><div class="quiz-title" id="quizTitle">問題</div><div class="counter" id="counter">1/10</div></div>
<div class="progress-wrap"><div class="progress" id="progress"></div></div><div class="card" id="questionCard"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback"></div><button class="next" id="nextBtn" onclick="nextQuestion()" style="display:none;">次へ →</button>
</section>
<section id="flash" class="screen">
<div class="topbar"><button class="back" onclick="goHome()">←</button><div class="quiz-title">カード</div><div class="counter" id="flashCounter">1/10</div></div>
<div class="progress-wrap"><div class="progress" id="flashProgress"></div></div><div class="card" id="flashCard" onclick="revealFlash()"></div><div class="actions" id="flashActions" style="display:none;"><button class="action-btn" onclick="answerFlash(false)">もう一度</button><button class="action-btn primary" onclick="answerFlash(true)">わかった！</button></div>
</section>
<section id="result" class="screen">
<div class="result-title" id="resultTitle">結果</div><div class="stats"><div class="stat"><div class="v" id="resScore">0</div><div class="l">正解</div></div><div class="stat"><div class="v" id="resTotal">0</div><div class="l">問題数</div></div><div class="stat"><div class="v" id="resPct">0%</div><div class="l">正答率</div></div></div><div class="actions"><button class="action-btn" onclick="goHome()">ホーム</button><button class="action-btn primary" onclick="startMode(currentMode)">もう一度</button></div>
</section>
</div>

function renderGrades(){const grid=document.getElementById("gradeGrid");grid.innerHTML="";ALL_GRADES.forEach(g=>{const b=document.createElement("button"),ok=AVAILABLE_GRADES.includes(g);b.className="grade-btn"+(selectedGrades.includes(g)?" selected":"")+(!ok?" disabled":"");const count=ok?KANJI_BY_GRADE[g].length:0;b.innerHTML=`<div class="grade-main">${g}年生</div><div class="grade-sub">${ok?count+"字":"準備中"}</div>`;if(ok)b.onclick=()=>toggleGrade(g);grid.appendChild(b)});const all=document.createElement("button");all.className="grade-btn"+(selectedGrades.length===AVAILABLE_GRADES.length?" selected":"");all.innerHTML=`<div class="grade-main">まとめ</div><div class="grade-sub">使える学年全部</div>`;all.onclick=()=>{selectedGrades=selectedGrades.length===AVAILABLE_GRADES.length?[1]:[...AVAILABLE_GRADES];renderGrades()};grid.appendChild(all)}
function toggleGrade(g){if(selectedGrades.includes(g)){if(selectedGrades.length>1)selectedGrades=selectedGrades.filter(x=>x!==g)}else{selectedGrades.push(g);selectedGrades.sort((a,b)=>a-b)}renderGrades()}
function getCards(){return selectedGrades.flatMap(g=>(KANJI_BY_GRADE[g]||[]).map(c=>({...c,grade:g})))}
function getWords(){return getCards().flatMap(card=>(card.words||[]).filter(w=>w&&w.w&&w.r).map(w=>({...w,k:card.k,card,grade:card.grade})))}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active")}
function goHome(){show("home")}
function startMode(mode){currentMode=mode;currentIndex=0;score=0;answered=false;const cards=getCards(),words=getWords();if(mode==="flash"){questions=shuffle(cards).slice(0,QUIZ_COUNT);if(!questions.length)return alert("この学年のデータがありません。");show("flash");loadFlash();return}if(mode==="wordReading"){questions=shuffle(words).slice(0,QUIZ_COUNT);document.getElementById("quizTitle").textContent="ことばの読み"}if(mode==="kanjiChoice"){questions=shuffle(words).slice(0,QUIZ_COUNT);document.getElementById("quizTitle").textContent="漢字はどれ？"}if(mode==="mainReading"){questions=shuffle(cards.filter(c=>c.main)).slice(0,QUIZ_COUNT);document.getElementById("quizTitle").textContent="よく使う読み"}if(!questions.length){alert("このモードで使える問題がありません。別の学年かモードを選んでください。");return}show("quiz");loadQuestion()}
function loadQuestion(){answered=false;const q=questions[currentIndex],total=questions.length;document.getElementById("counter").textContent=`${currentIndex+1}/${total}`;document.getElementById("progress").style.width=Math.round((currentIndex/total)*100)+"%";document.getElementById("feedback").textContent="";document.getElementById("nextBtn").style.display="none";let correct="",opts=[],cardHtml="";if(currentMode==="wordReading"){correct=q.r;opts=shuffle(getWords().filter(x=>x.r!==correct)).slice(0,3).map(x=>x.r);cardHtml=`<div class="big-word">${escapeHtml(q.w)}</div><div class="prompt">このことばの読み方は？</div><div class="tags"><span class="tag blue">${q.grade}年生</span><span class="tag">使う漢字：${q.k}</span></div>`}if(currentMode==="kanjiChoice"){correct=q.k;opts=shuffle(getCards().filter(x=>x.k!==correct)).slice(0,3).map(x=>x.k);cardHtml=`<div class="big-word">${escapeHtml(q.r)}</div><div class="prompt">このことばに使われている漢字はどれ？</div><div class="tags"><span class="tag blue">${q.grade}年生</span><span class="tag">${escapeHtml(q.w)}</span></div>`}if(currentMode==="mainReading"){correct=q.main;opts=shuffle(getCards().filter(x=>x.main&&x.main!==correct)).slice(0,3).map(x=>x.main);cardHtml=`<div class="big-kanji">${q.k}</div><div class="prompt">この漢字の、よく使う読みは？</div><div class="tags"><span class="tag blue">${q.grade}年生</span></div>`}document.getElementById("questionCard").innerHTML=cardHtml;opts=shuffle([...opts,correct]).slice(0,4);const choices=document.getElementById("choices");choices.innerHTML="";opts.forEach(opt=>{const btn=document.createElement("button");btn.className="choice";btn.textContent=opt;btn.onclick=()=>answer(btn,opt===correct,correct,q);choices.appendChild(btn)})}
function answer(btn,ok,correct,q){if(answered)return;answered=true;document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add("correct")});if(ok){score++;btn.classList.add("correct");document.getElementById("feedback").style.color="var(--green)";document.getElementById("feedback").textContent="⭕ 正解！"}else{btn.classList.add("wrong");document.getElementById("feedback").style.color="var(--red)";document.getElementById("feedback").textContent=`❌ 正解は「${correct}」`}if(currentMode==="mainReading")document.getElementById("questionCard").innerHTML=renderCardDetail(q);document.getElementById("nextBtn").style.display="block"}
function nextQuestion(){currentIndex++;if(currentIndex>=questions.length)showResult();else loadQuestion()}
function renderCardDetail(q){const on=q.on&&q.on.length?`<span class="tag blue">音：${q.on.join("・")}</span>`:"";const kun=q.kun&&q.kun.length?`<span class="tag green">訓：${q.kun.join("・")}</span>`:"";const main=q.main?`<span class="tag">よく使う：${escapeHtml(q.main)}</span>`:"";const words=(q.words||[]).map(w=>`<div class="word-row"><div class="w">${escapeHtml(w.w||"")}</div><div class="r">${escapeHtml(w.r||"")}</div><div class="m">${escapeHtml(w.m||w.w||"")}</div></div>`).join("");return `<div class="big-kanji">${q.k}</div><div class="tags"><span class="tag blue">${q.grade}年生</span>${main}${on}${kun}</div><div class="word-list">${words}</div>`}
function loadFlash(){flashRevealed=false;const q=questions[currentIndex],total=questions.length;document.getElementById("flashCounter").textContent=`${currentIndex+1}/${total}`;document.getElementById("flashProgress").style.width=Math.round((currentIndex/total)*100)+"%";document.getElementById("flashActions").style.display="none";document.getElementById("flashCard").innerHTML=`<div class="big-kanji">${q.k}</div><div class="prompt">タップして読み・ことばを見る</div><div class="tags"><span class="tag blue">${q.grade}年生</span></div>`}
function revealFlash(){if(flashRevealed)return;flashRevealed=true;const q=questions[currentIndex];document.getElementById("flashCard").innerHTML=renderCardDetail(q);document.getElementById("flashActions").style.display="flex"}
function answerFlash(knew){if(knew)score++;currentIndex++;if(currentIndex>=questions.length)showResult();else loadFlash()}
function showResult(){const total=questions.length,pct=Math.round(score/total*100);document.getElementById("resScore").textContent=score;document.getElementById("resTotal").textContent=total;document.getElementById("resPct").textContent=pct+"%";document.getElementById("resultTitle").textContent=pct>=80?"🎉 すごい！":pct>=50?"😊 いい感じ！":"💪 れんしゅうしよう！";show("result")}
function searchData(){const kw=document.getElementById("searchInput").value.trim(),box=document.getElementById("searchResult");if(!kw){box.innerHTML="";return}const results=getCards().filter(c=>String(c.k).includes(kw)||String(c.main||"").includes(kw)||(c.on||[]).join("").includes(kw)||(c.kun||[]).join("").includes(kw)||(c.words||[]).some(w=>String(w.w||"").includes(kw)||String(w.r||"").includes(kw))).slice(0,12);if(!results.length){box.innerHTML=`<div class="empty">見つかりませんでした。選択している学年の中から検索します。</div>`;return}box.innerHTML=results.map(renderCardDetail).map(h=>`<div class="card">${h}</div>`).join("")}
function escapeHtml(str){return String(str??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
renderGrades();
</script>
</body>
</html>
