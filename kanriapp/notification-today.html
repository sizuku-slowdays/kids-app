<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>きょうの記録</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="通知センター">
<meta name="theme-color" content="#eef1f6">
<link rel="manifest" href="/kanriapp/notification-manifest.webmanifest">
<link rel="apple-touch-icon" href="/kanriapp/notification-icon-192.png">
<style>
  :root{
    --bg:#eef1f6; --panel:#fff; --panel-2:#f7f9fc; --ink:#26313d; --muted:#78889a; --line:#dfe5ee;
    --accent:#5b6ee1; --accent-soft:#e7eaff; --danger:#e0607a; --ok:#3fa98a; --later:#e6a23c;
    --mama:#ff9db4; --child1:#ffbe63; --child2:#b39ddb; --all:#6fd3b8;
    --radius:18px; --shadow:0 2px 10px rgba(38,49,61,.06);
    --font:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0 auto;max-width:640px;padding:0 14px calc(40px + env(safe-area-inset-bottom));
    font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:.02em}
  button{font-family:inherit;cursor:pointer}

  header{padding:calc(20px + env(safe-area-inset-top)) 2px 12px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
  header h1{font-size:22px}
  header h1 small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.18em;margin-bottom:2px}
  .navlink{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;background:var(--accent-soft);padding:8px 12px;border-radius:12px;white-space:nowrap}

  .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .hint{font-size:12px;color:var(--muted)}

  /* 通知の詳細（通知タップで開く） */
  .detail{border:2px solid var(--accent);}
  .detail .kicker{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--accent);margin-bottom:6px}
  .detail h2{font-size:22px;line-height:1.35}
  .detail p.body{margin:6px 0 0;font-size:15px;color:var(--muted)}
  .detail .who{display:inline-block;margin-top:10px;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:3px 10px}
  .choices{display:grid;grid-template-columns:1fr;gap:8px;margin-top:16px}
  .choice{border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:800;text-align:left;display:flex;align-items:center;gap:10px}
  .choice.done{background:#e7f6f1;color:var(--ok)}
  .choice.later{background:#fdf1de;color:var(--later)}
  .choice.skip{background:#f1f4f8;color:var(--muted)}
  .choice:active{transform:translateY(1px)}
  .snooze{display:flex;gap:8px;margin-top:8px}
  .snooze button{flex:1;border:1.5px solid var(--later);color:var(--later);background:#fff;border-radius:12px;padding:12px 0;font-weight:800;font-size:14px}
  .result{margin-top:14px;padding:14px;border-radius:14px;background:#e7f6f1;color:var(--ok);font-weight:800;text-align:center}
  .result.later{background:#fdf1de;color:var(--later)}
  .result.skip{background:#f1f4f8;color:var(--muted)}
  .btn{border:none;border-radius:12px;padding:12px 16px;font-weight:700;font-size:14px;background:var(--accent);color:#fff}
  .btn.wide{width:100%;margin-top:10px}
  .btn.ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line)}

  /* 家族タブ */
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .chip{border:1.5px solid var(--line);background:var(--panel);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--muted)}
  .chip[aria-pressed="true"]{color:#fff;border-color:transparent}
  .chip[data-r="mama"][aria-pressed="true"]{background:var(--mama)}
  .chip[data-r="child1"][aria-pressed="true"]{background:var(--child1)}
  .chip[data-r="child2"][aria-pressed="true"]{background:var(--child2)}
  .chip[data-r="all"][aria-pressed="true"]{background:var(--all)}
  .chip[data-r=""][aria-pressed="true"]{background:var(--accent)}

  /* 記録リスト */
  .section-head{display:flex;align-items:center;gap:8px;margin:2px 0 8px;font-size:14px;font-weight:800}
  .habit{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .habit:last-child{border-bottom:none}
  .habit-main{flex:1;min-width:0}
  .habit-title{font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar{height:6px;border-radius:3px;background:var(--line);margin-top:6px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:3px;background:var(--ok);transition:width .25s}
  .count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px;display:flex;gap:8px;align-items:center}
  .count b{color:var(--ink);font-weight:800;font-size:14px}
  .pill{font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}
  .pill.done{background:#e7f6f1;color:var(--ok)}
  .pill.later{background:#fdf1de;color:var(--later)}
  .pill.skip{background:#f1f4f8;color:var(--muted)}
  .pill.todo{background:#fdeaee;color:var(--danger)}
  .plus{border:1.5px solid var(--line);background:var(--panel-2);border-radius:12px;width:44px;height:44px;font-size:18px;flex:none;font-weight:800;color:var(--ok)}
  .undo{border:none;background:none;color:var(--muted);font-size:11px;padding:2px 4px}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:22px 8px}

  #toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.2s;z-index:99}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <h1><small>TODAY</small>きょうの記録</h1>
  <a class="navlink" href="/kanriapp/notification-center.html">🔔 通知の設定</a>
</header>

<!-- 通知をタップして来たときだけ出る詳細 -->
<section class="card detail" id="detail" hidden></section>

<section class="card">
  <div class="chips" id="filter">
    <button type="button" class="chip" data-r="" aria-pressed="true">👨‍👩‍👧‍👦 家族ぜんいん</button>
    <button type="button" class="chip" data-r="mama" aria-pressed="false">🌸 ママ</button>
    <button type="button" class="chip" data-r="child1" aria-pressed="false">🐒 長女</button>
    <button type="button" class="chip" data-r="child2" aria-pressed="false">🦄 次女</button>
  </div>
  <div id="record"><div class="empty">読み込み中…</div></div>
  <p class="hint" style="margin-top:10px">「＋」を押すと、通知がなくても「できた」を記録できます。</p>
</section>

<div id="toast"></div>

<script>
/* ================================================================
   きょうの記録
   - 通知タップ時: ?rule=12&occ=2026-07-13 15:10&to=child1&next=/kanriapp/kyosei-check.html
   - ✅できた / ⏰あとで / ❌今日はしない を habit_completions に記録
   - 通知ルール(notification_rules)とは別テーブルで管理
   ================================================================ */

const LS = { api:'nc_api_base', pw:'nc_app_password', recipient:'nc_device_recipient' };
const LABEL = { mama:'🌸 ママ', child1:'🐒 長女', child2:'🦄 次女', all:'👨‍👩‍👧‍👦 ぜんいん' };
const COLOR = { mama:'var(--mama)', child1:'var(--child1)', child2:'var(--child2)', all:'var(--all)' };
const ORDER = ['mama','child1','child2','all'];

const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const state = { date:'', rules:[], completions:[], filter:'' };

function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function apiBase(){ return (localStorage.getItem(LS.api) || '').replace(/\/+$/,''); }
async function api(path, options = {}){
  if(!apiBase()) throw new Error('先に「🔔 通知の設定」でWorkerのURLとあいことばを登録してください');
  const res = await fetch(apiBase() + path, {
    ...options,
    headers:{ 'Content-Type':'application/json', 'X-App-Password': localStorage.getItem(LS.pw) || '', ...(options.headers||{}) },
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data.error || `エラー (${res.status})`);
  return data;
}

/* recipientごとの通知文（Workerと同じ規則） */
function textFor(rule, recipient){
  const t = (rule.texts || {})[recipient] || {};
  return {
    title: t.title || rule.title,
    body:  t.body  || rule.body || '',
    url:   t.url   || rule.url  || null,
  };
}

/* ---------- 通知の詳細（3つのボタン） ---------- */
function renderDetail(){
  const ruleId = Number(params.get('rule'));
  if(!ruleId) return;
  const rule = state.rules.find((r) => r.id === ruleId);
  const to = params.get('to') || localStorage.getItem(LS.recipient) || 'all';
  const occ = params.get('occ') || '';
  const next = params.get('next') || '';
  const box = $('detail');
  if(!rule){ return; }

  const text = textFor(rule, to);
  const already = state.completions.find(
    (c) => c.rule_id === ruleId && c.recipient === to && c.occurrence_key === occ
  );

  box.hidden = false;
  box.innerHTML = `
    <div class="kicker">この つうち について</div>
    <h2 id="dTitle"></h2>
    <p class="body" id="dBody"></p>
    <span class="who" style="background:${COLOR[to]}">${LABEL[to]}</span>
    <div class="choices" id="choices">
      <button class="choice done"  data-s="done">✅ <span>できた</span></button>
      <button class="choice later" data-s="later">⏰ <span>あとで</span></button>
      <button class="choice skip"  data-s="skip">❌ <span>今日はしない</span></button>
    </div>
    <div class="snooze" id="snooze" hidden>
      <button data-m="10">10分後</button>
      <button data-m="30">30分後</button>
      <button data-m="60">1時間後</button>
    </div>
    <div id="dResult"></div>
    ${next ? `<button class="btn wide" id="dNext">▶ ページをひらく</button>` : ''}`;

  box.querySelector('#dTitle').textContent = text.title;
  box.querySelector('#dBody').textContent = text.body;
  if(next) box.querySelector('#dNext').addEventListener('click', () => { location.href = next; });

  if(already) showResult(already.status, already.remind_at);

  box.querySelector('#choices').addEventListener('click', async (e) => {
    const b = e.target.closest('.choice'); if(!b) return;
    const status = b.dataset.s;
    if(status === 'later'){ $('snooze').hidden = false; return; }
    await saveCompletion({ rule_id: ruleId, recipient: to, occurrence_key: occ, status });
  });

  box.querySelector('#snooze').addEventListener('click', async (e) => {
    const b = e.target.closest('button'); if(!b) return;
    await saveCompletion({
      rule_id: ruleId, recipient: to, occurrence_key: occ,
      status: 'later', snooze_minutes: Number(b.dataset.m),
    });
  });
}

function showResult(status, remindAt){
  const el = $('dResult'); if(!el) return;
  $('choices').hidden = true;
  $('snooze').hidden = true;
  el.className = `result ${status}`;
  el.textContent =
    status === 'done'  ? '✅ できた！ きろくしました' :
    status === 'later' ? `⏰ ${remindAt ? remindAt.slice(11) + ' に' : 'あとで'} もういちど おしらせします` :
                         '❌ 今日はしない（きょうの通知はもう送りません）';
}

async function saveCompletion(payload){
  try{
    const r = await api('/api/complete', { method:'POST', body: JSON.stringify({ source:'notification', ...payload }) });
    showResult(payload.status, r.remind_at);
    await load(false);
  }catch(e){ toast(e.message); }
}

/* ---------- きょうの記録 ---------- */
function statsFor(rule, recipient){
  const comps = state.completions.filter((c) => c.rule_id === rule.id && c.recipient === recipient);
  return {
    done: comps.filter((c) => c.status === 'done').length,
    later: comps.some((c) => c.status === 'later'),
    skip: comps.some((c) => c.status === 'skip'),
    target: rule.target_today || 0,
    lastId: comps.filter((c) => c.status === 'done').map((c) => c.id).pop(),
  };
}

/** その人に関係するルール（本人あて＋ぜんいんあて） */
function rulesFor(recipient){
  return state.rules.filter((r) => {
    if(!r.enabled) return false;
    if(recipient === 'all') return r.recipient === 'all';
    return r.recipient === recipient || r.recipient === 'all';
  });
}

function renderRecord(){
  const root = $('record');
  root.innerHTML = '';
  const people = state.filter ? [state.filter] : ORDER;
  let printed = 0;

  people.forEach((who) => {
    const rules = rulesFor(who).filter((r) => {
      const s = statsFor(r, who);
      return s.target > 0 || s.done > 0 || s.skip || s.later;
    });
    if(!rules.length) return;
    printed++;

    if(!state.filter){
      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = `<i style="width:10px;height:10px;border-radius:50%;background:${COLOR[who]};display:inline-block"></i>`;
      head.append(LABEL[who]);
      head.style.marginTop = '14px';
      root.appendChild(head);
    }

    rules.forEach((rule) => {
      const s = statsFor(rule, who);
      const text = textFor(rule, who);
      const pct = s.target ? Math.min(100, (s.done / s.target) * 100) : (s.done ? 100 : 0);

      let label, pill;
      if(s.target > 1){
        label = `<b>${s.done}</b> / ${s.target}回`;
        pill = s.done >= s.target ? '<span class="pill done">かんぺき</span>'
             : s.skip ? '<span class="pill skip">今日はしない</span>'
             : s.later ? '<span class="pill later">あとで</span>' : '';
      }else{
        label = s.done ? '<b>できた</b>' : s.skip ? '今日はしない' : s.later ? 'あとで' : '未完了';
        pill = s.done ? '<span class="pill done">✅</span>'
             : s.skip ? '<span class="pill skip">❌</span>'
             : s.later ? '<span class="pill later">⏰</span>'
             : '<span class="pill todo">まだ</span>';
      }

      const row = document.createElement('div');
      row.className = 'habit';
      row.innerHTML = `
        <div class="habit-main">
          <div class="habit-title"></div>
          <div class="count">${label} ${pill} ${s.done ? '<button class="undo">取り消す</button>' : ''}</div>
          <div class="bar"><i style="width:${pct}%"></i></div>
        </div>
        <button class="plus" aria-label="できたを記録">＋</button>`;
      row.querySelector('.habit-title').textContent = text.title;

      row.querySelector('.plus').addEventListener('click', async () => {
        try{
          await api('/api/complete', {
            method:'POST',
            body: JSON.stringify({ rule_id: rule.id, recipient: who, status:'done', source:'manual' }),
          });
          toast('できた！ きろくしました');
          load(false);
        }catch(e){ toast(e.message); }
      });

      const undo = row.querySelector('.undo');
      if(undo) undo.addEventListener('click', async () => {
        try{
          await api(`/api/completions/${s.lastId}`, { method:'DELETE' });
          toast('取り消しました');
          load(false);
        }catch(e){ toast(e.message); }
      });

      root.appendChild(row);
    });
  });

  if(!printed) root.innerHTML = '<div class="empty">今日 記録する習慣はありません。<br>「🔔 通知の設定」で作れます。</div>';
}

/* ---------- 読み込み ---------- */
async function load(withDetail = true){
  try{
    const data = await api('/api/today');
    state.date = data.date;
    state.rules = data.rules;
    state.completions = data.completions;
    renderRecord();
    if(withDetail) renderDetail();
  }catch(e){
    $('record').innerHTML = `<div class="empty">${e.message}</div>`;
  }
}

$('filter').addEventListener('click', (e) => {
  const b = e.target.closest('.chip'); if(!b) return;
  state.filter = b.dataset.r || '';
  $('filter').querySelectorAll('.chip').forEach((c) => c.setAttribute('aria-pressed', String(c === b)));
  renderRecord();
});

load();
</script>
</body>
</html>
