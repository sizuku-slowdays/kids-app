<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひっ算れんしゅう</title>
<link rel="apple-touch-icon" href="img/hissan.png">
<link rel="icon" type="image/png" href="img/hissan.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ひっ算れんしゅう">
<meta name="theme-color" content="#fff7d6">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  min-height:100vh;
  background:linear-gradient(180deg,#fff7d6 0%,#ffe6f0 50%,#e6f7ff 100%);
  color:#333;text-align:center;padding:18px;
}
.screen{display:none;}
.screen.active{display:block;}
h1{font-size:clamp(28px,8vw,44px);color:#ff8a00;text-shadow:2px 2px 0 #fff;margin:14px 0 6px;}
.subtitle{font-size:16px;color:#666;margin-bottom:20px;}
.card{max-width:520px;margin:0 auto;background:rgba(255,255,255,.94);border-radius:28px;padding:20px 16px;border:4px solid #fff;box-shadow:0 8px 20px rgba(0,0,0,.12);}

/* ── トップ ── */
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
.mode-btn{border:none;border-radius:22px;padding:22px 8px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.16);color:#fff;font-family:inherit;line-height:1.4;}
.mode-btn.add{background:linear-gradient(135deg,#ff9a9e,#ff6b6b);}
.mode-btn.sub{background:linear-gradient(135deg,#6dd5ed,#2193b0);}
.mode-btn.mul{background:linear-gradient(135deg,#a8e063,#56ab2f);}
.mode-btn.div{background:linear-gradient(135deg,#f7971e,#ffd200);color:#7a4400;}
.mode-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.16);}
.note{margin-top:16px;font-size:13px;color:#777;line-height:1.6;}

/* ── 難しさ選択（共通） ── */
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0;}
.level-btn{border:none;border-radius:18px;padding:16px 6px;font-size:13px;font-weight:bold;cursor:pointer;line-height:1.4;font-family:inherit;}
.level-btn.lv1{background:linear-gradient(135deg,#d4f5a8,#7bc844);color:#2a5200;box-shadow:0 4px 0 #4a8e20;}
.level-btn.lv2{background:linear-gradient(135deg,#ffe28a,#ffb347);color:#7a4400;box-shadow:0 4px 0 #c47d10;}
.level-btn.lv3{background:linear-gradient(135deg,#ffa3c4,#ff6b9d);color:#6a0030;box-shadow:0 4px 0 #b83060;}
.level-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.2);}
.level-icon{font-size:24px;display:block;margin-bottom:4px;}
.carry-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.carry-btn{border:none;border-radius:18px;padding:16px 6px;font-size:13px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#ffe28a,#ffb347);color:#7a4400;box-shadow:0 4px 0 #c47d10;line-height:1.4;font-family:inherit;}
.carry-btn.carry-mix{background:linear-gradient(135deg,#c8a8f8,#9b72e8);color:#3a1a7a;box-shadow:0 4px 0 #6b3ab8;}
.carry-btn:active,.carry-btn.carry-mix:active{transform:translateY(3px);}
.carry-icon{font-size:24px;display:block;margin-bottom:4px;}
.back-link{border:none;background:none;color:#aaa;font-size:13px;cursor:pointer;padding:4px 8px;font-family:inherit;text-decoration:underline;margin-top:6px;}

/* ── クイズ共通上部 ── */
.top-bar{max-width:560px;margin:0 auto 12px;display:flex;align-items:center;gap:10px;}
.small-btn{border:none;border-radius:16px;background:#fff;color:#555;padding:10px 12px;font-size:14px;font-weight:bold;box-shadow:0 4px 0 rgba(0,0,0,.12);cursor:pointer;font-family:inherit;}
.small-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
.status{flex:1;background:#fff;border-radius:16px;padding:10px;font-size:14px;font-weight:bold;color:#555;box-shadow:0 4px 0 rgba(0,0,0,.08);}
.quiz-card{max-width:560px;margin:0 auto;background:#fff;border-radius:28px;padding:20px 12px 18px;border:4px solid #fff;box-shadow:0 8px 20px rgba(0,0,0,.14);}
.mode-label{display:inline-block;padding:7px 16px;border-radius:999px;font-size:15px;font-weight:bold;background:#fff3b0;color:#8a6500;margin-bottom:14px;}

/* ── たし算・ひき算 ひっ算UI ── */
.hissan-wrap{display:inline-block;margin:4px auto 18px;padding:12px 16px 16px;background:#fffaf0;border-radius:22px;border:3px dashed #ffd36e;}
.hissan-table{border-collapse:collapse;margin:0 auto;}
.hissan-table td{width:54px;height:54px;text-align:center;font-size:36px;font-weight:bold;vertical-align:middle;}
.op-cell{width:42px!important;color:#ff7a00;}
.line-row td{height:14px;border-top:5px solid #333;}
.answer-input{width:48px;height:52px;border:3px solid #bde7ff;border-radius:13px;text-align:center;font-size:32px;font-weight:bold;background:#f0fbff;color:#333;font-family:inherit;}
.answer-input:focus{outline:none;border-color:#ff9a9e;background:#fff4f6;}
@media(max-width:420px){
  .hissan-table td{width:46px;height:48px;font-size:32px;}
  .answer-input{width:42px;height:48px;font-size:28px;}
}

/* ── かけ・わり ひっ算拡張 ── */
/* answer-input より少し大きめ（4桁対応） */
.ans-inp {
  width: 48px; height: 52px;
  border: 3px solid #bde7ff; border-radius: 13px;
  text-align: center; font-size: 32px; font-weight: bold;
  background: #f0fbff; color: #333; font-family: inherit;
  display: inline-block;
}
.ans-inp:focus { outline: none; border-color: #56ab2f; background: #f4fff4; }
.ans-inp.div-ans:focus { border-color: #f7971e; background: #fff9f0; }
/* わり算：商の上の横線 */
.div-line-top td { border-bottom: 4px solid #333; height: 10px; }
/* わり算：被除数の左側の┐記号セル */
.div-bracket {
  border-top: 4px solid #333;
  border-left: 4px solid #333;
  border-radius: 4px 0 0 0;
}
@media(max-width:420px){
  .ans-inp { width:40px; height:46px; font-size:26px; }
}

/* ── 手書きメモ ── */
.memo-area{
  margin:0 auto 14px;max-width:500px;
  background:#fffef5;border-radius:18px;border:2px dashed #ccc;
  padding:10px;
}
.memo-label{font-size:12px;color:#aaa;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.memo-clear{border:none;background:#f5f5f5;border-radius:8px;padding:4px 10px;font-size:12px;color:#888;cursor:pointer;font-family:inherit;}
.memo-canvas{
  display:block;width:100%;border-radius:12px;background:#fff;
  cursor:crosshair;touch-action:none;border:1px solid #eee;
}

/* ── フィードバック・ボタン ── */
.feedback{min-height:68px;margin:8px auto 12px;padding:12px;max-width:460px;border-radius:20px;font-size:20px;font-weight:bold;display:none;}
.feedback.correct{display:block;background:#e8ffe8;color:#1e8f3a;}
.feedback.wrong{display:block;background:#fff0f0;color:#d33;}
.feedback .small{display:block;margin-top:5px;font-size:14px;color:#555;font-weight:normal;}
.big-btn{width:100%;max-width:420px;border:none;border-radius:22px;padding:16px 16px;font-size:21px;font-weight:bold;color:#fff;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.18);margin:8px auto;display:block;font-family:inherit;}
.big-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.18);}
.check-btn{background:linear-gradient(135deg,#ffb347,#ff8a00);}
.next-btn{background:linear-gradient(135deg,#7fdc82,#32b768);display:none;}
.next-btn.show{display:block;}

/* ── 結果 ── */
.result-emoji{font-size:68px;margin-bottom:10px;}
.result-title{font-size:30px;color:#ff8a00;font-weight:bold;margin-bottom:10px;}
.result-score{font-size:46px;font-weight:bold;color:#ff6b6b;margin:8px 0;}
.result-message{font-size:17px;line-height:1.7;color:#555;margin-bottom:16px;}
</style>
</head>
<body>

<!-- ========== トップ ========== -->
<div id="screen-top" class="screen active">
  <h1>ひっ算れんしゅう</h1>
  <p class="subtitle">すきな けいさんを えらんでね！</p>

  <!-- ステップ1: 演算選択 -->
  <div id="step-op" class="card">
    <p style="font-size:19px;font-weight:bold;margin-bottom:4px;">どれを やる？</p>
    <div class="top-grid">
      <button class="mode-btn add" onclick="selectOp('add')">＋<br>たし算</button>
      <button class="mode-btn sub" onclick="selectOp('sub')">－<br>ひき算</button>
      <button class="mode-btn mul" onclick="selectOp('mul')">×<br>かけ算</button>
      <button class="mode-btn div" onclick="selectOp('div')">÷<br>わり算</button>
    </div>
    <p class="note">2けたのひっ算がでるよ。こたえを 1けたずつ 入れてね。</p>
  </div>

  <!-- ステップ2a: たし算/ひき算 くりあがり選択 -->
  <div id="step-carry" class="card" style="display:none;">
    <p style="font-size:17px;font-weight:bold;margin-bottom:3px;" id="carry-heading">くりあがり は どうする？</p>
    <p style="font-size:12px;color:#888;margin-bottom:14px;" id="carry-note">たし算のくりあがりをえらんでね</p>
    <div class="carry-grid">
      <button class="carry-btn" onclick="startAddsub('no')">
        <span class="carry-icon">🌱</span>
        <span id="label-no">くりあがり<br>なし</span>
      </button>
      <button class="carry-btn" onclick="startAddsub('yes')">
        <span class="carry-icon">⭐</span>
        <span id="label-yes">くりあがり<br>あり</span>
      </button>
      <button class="carry-btn carry-mix" onclick="startAddsub('mix')">
        <span class="carry-icon">🎲</span>ミックス
      </button>
    </div>
    <button class="back-link" onclick="showStep('op')">← もどる</button>
  </div>

  <!-- ステップ2b: かけ算 難しさ選択 -->
  <div id="step-mul" class="card" style="display:none;">
    <p style="font-size:17px;font-weight:bold;margin-bottom:3px;">むずかしさを えらんでね</p>
    <p style="font-size:12px;color:#888;margin-bottom:14px;">かけ算</p>
    <div class="level-grid">
      <button class="level-btn lv1" onclick="startMul(1)">
        <span class="level-icon">🌱</span>かんたん<br><small>1けた×1けた</small>
      </button>
      <button class="level-btn lv2" onclick="startMul(2)">
        <span class="level-icon">⭐</span>ふつう<br><small>2けた×1けた</small>
      </button>
      <button class="level-btn lv3" onclick="startMul(3)">
        <span class="level-icon">🔥</span>むずかしい<br><small>2けた×2けた</small>
      </button>
    </div>
    <button class="back-link" onclick="showStep('op')">← もどる</button>
  </div>

  <!-- ステップ2c: わり算 難しさ選択 -->
  <div id="step-div" class="card" style="display:none;">
    <p style="font-size:17px;font-weight:bold;margin-bottom:3px;">むずかしさを えらんでね</p>
    <p style="font-size:12px;color:#888;margin-bottom:14px;">わり算</p>
    <div class="level-grid">
      <button class="level-btn lv1" onclick="startDiv(1)">
        <span class="level-icon">🌱</span>かんたん<br><small>あまりなし<br>÷1けた</small>
      </button>
      <button class="level-btn lv2" onclick="startDiv(2)">
        <span class="level-icon">⭐</span>ふつう<br><small>あまりあり<br>÷1けた</small>
      </button>
      <button class="level-btn lv3" onclick="startDiv(3)">
        <span class="level-icon">🔥</span>むずかしい<br><small>あまりあり<br>÷2けた</small>
      </button>
    </div>
    <button class="back-link" onclick="showStep('op')">← もどる</button>
  </div>
</div>

<!-- ========== たし算・ひき算 クイズ画面 ========== -->
<div id="screen-addsub" class="screen">
  <div class="top-bar">
    <button class="small-btn" onclick="goHome()">← もどる</button>
    <div class="status"><span id="as-count">1 / 10</span>　⭐ <span id="as-score">0</span>てん</div>
  </div>
  <div class="quiz-card">
    <div class="mode-label" id="as-label">たし算</div>
    <div class="hissan-wrap">
      <table class="hissan-table">
        <tr>
          <td class="op-cell"></td>
          <td id="n1t">3</td><td id="n1o">8</td>
        </tr>
        <tr>
          <td class="op-cell" id="as-op">+</td>
          <td id="n2t">2</td><td id="n2o">7</td>
        </tr>
        <tr class="line-row"><td></td><td></td><td></td></tr>
        <tr>
          <td class="op-cell"></td>
          <td><input id="ans-tens" class="answer-input" inputmode="numeric" maxlength="1" aria-label="十の位"></td>
          <td><input id="ans-ones" class="answer-input" inputmode="numeric" maxlength="1" aria-label="一の位"></td>
        </tr>
      </table>
    </div>
    <div id="as-feedback" class="feedback"></div>
    <button id="as-check" class="big-btn check-btn" onclick="checkAddsub()">こたえあわせ</button>
    <button id="as-next" class="big-btn next-btn" onclick="nextAddsub()">つぎの もんだいへ</button>
  </div>
</div>

<!-- ========== かけ算 クイズ画面 ========== -->
<div id="screen-mul" class="screen">
  <div class="top-bar">
    <button class="small-btn" onclick="goHome()">← もどる</button>
    <div class="status"><span id="mul-count">1 / 10</span>　⭐ <span id="mul-score">0</span>てん</div>
  </div>
  <div class="quiz-card">
    <div class="mode-label" id="mul-label">かけ算</div>

    <!-- ひっ算レイアウト（JSで中身を組み立てる） -->
    <div class="hissan-wrap" style="border-color:#a8e063;">
      <table class="hissan-table" id="mul-table"></table>
    </div>

    <!-- 手書きメモ -->
    <div class="memo-area">
      <div class="memo-label">
        <span>✏️ とちゅうのけいさん（てがきメモ）</span>
        <button class="memo-clear" onclick="clearMemo('mul-canvas')">けす</button>
      </div>
      <canvas id="mul-canvas" class="memo-canvas" height="160"></canvas>
    </div>

    <div id="mul-feedback" class="feedback"></div>
    <button id="mul-check" class="big-btn check-btn" onclick="checkMul()">こたえあわせ</button>
    <button id="mul-next" class="big-btn next-btn" onclick="nextMul()">つぎの もんだいへ</button>
  </div>
</div>

<!-- ========== わり算 クイズ画面 ========== -->
<div id="screen-div" class="screen">
  <div class="top-bar">
    <button class="small-btn" onclick="goHome()">← もどる</button>
    <div class="status"><span id="div-count">1 / 10</span>　⭐ <span id="div-score">0</span>てん</div>
  </div>
  <div class="quiz-card">
    <div class="mode-label" id="div-label">わり算</div>

    <!-- ひっ算レイアウト（JSで中身を組み立てる） -->
    <div class="hissan-wrap" style="border-color:#ffd200;">
      <table class="hissan-table" id="div-table"></table>
    </div>

    <!-- 手書きメモ -->
    <div class="memo-area">
      <div class="memo-label">
        <span>✏️ とちゅうのけいさん（てがきメモ）</span>
        <button class="memo-clear" onclick="clearMemo('div-canvas')">けす</button>
      </div>
      <canvas id="div-canvas" class="memo-canvas" height="160"></canvas>
    </div>

    <div id="div-feedback" class="feedback"></div>
    <button id="div-check" class="big-btn check-btn" onclick="checkDiv()">こたえあわせ</button>
    <button id="div-next" class="big-btn next-btn" onclick="nextDiv()">つぎの もんだいへ</button>
  </div>
</div>

<!-- ========== 結果画面 ========== -->
<div id="screen-result" class="screen">
  <h1>けっか</h1>
  <div class="card">
    <div class="result-emoji" id="r-emoji">🎉</div>
    <div class="result-title" id="r-title">よくできました！</div>
    <div class="result-score"><span id="r-score">0</span> / 10</div>
    <div class="result-message" id="r-msg"></div>
    <button class="big-btn check-btn" onclick="retryLast()">もう一度 やる</button>
    <button class="big-btn next-btn show" onclick="goHome()">トップに もどる</button>
  </div>
</div>

<script>
// =========================================================
// 状態
// =========================================================
const TOTAL = 10;
let opMode   = "add";   // add / sub / mul / div
let carry    = "mix";   // yes / no / mix  (add/sub用)
let mulLevel = 1;       // 1-3
let divLevel = 1;       // 1-3
let qIdx = 0, score = 0, answered = false;
let num1 = 0, num2 = 0, correctAns = 0, correctRem = 0;
let retryFn  = null;

// =========================================================
// 画面遷移
// =========================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  window.scrollTo(0, 0);
}
function showStep(name) {
  ["op","carry","mul","div"].forEach(s =>
    document.getElementById("step-" + s).style.display = "none");
  document.getElementById("step-" + name).style.display = "block";
}
function goHome() { showScreen("top"); showStep("op"); }

// =========================================================
// トップ選択
// =========================================================
function selectOp(op) {
  opMode = op;
  if (op === "add" || op === "sub") {
    const isAdd = op === "add";
    document.getElementById("carry-heading").textContent = isAdd ? "くりあがり は どうする？" : "くりさがり は どうする？";
    document.getElementById("carry-note").textContent   = isAdd ? "たし算のくりあがりをえらんでね" : "ひき算のくりさがりをえらんでね";
    document.getElementById("label-no").innerHTML  = isAdd ? "くりあがり<br>なし" : "くりさがり<br>なし";
    document.getElementById("label-yes").innerHTML = isAdd ? "くりあがり<br>あり" : "くりさがり<br>あり";
    showStep("carry");
  } else if (op === "mul") {
    showStep("mul");
  } else {
    showStep("div");
  }
}

function startAddsub(c) {
  carry = c; qIdx = 0; score = 0;
  retryFn = () => startAddsub(c);
  showStep("op");
  showScreen("addsub");
  makeAddsubQ();
}
function startMul(lv) {
  mulLevel = lv; qIdx = 0; score = 0;
  retryFn = () => startMul(lv);
  showStep("op");
  showScreen("mul");
  initMemoCanvas("mul-canvas");
  makeMulQ();
}
function startDiv(lv) {
  divLevel = lv; qIdx = 0; score = 0;
  retryFn = () => startDiv(lv);
  showStep("op");
  showScreen("div");
  initMemoCanvas("div-canvas");
  makeDivQ();
}
function retryLast() { retryFn && retryFn(); }

// =========================================================
// たし算・ひき算
// =========================================================
const ansTens = document.getElementById("ans-tens");
const ansOnes = document.getElementById("ans-ones");

ansOnes.addEventListener("input", () => {
  ansOnes.value = ansOnes.value.replace(/[^0-9]/g,"");
  if (ansOnes.value.length === 1) { ansTens.focus(); ansTens.select(); }
});
ansTens.addEventListener("input", () => {
  ansTens.value = ansTens.value.replace(/[^0-9]/g,"");
});
ansOnes.addEventListener("keydown", e => {
  if (e.key === "Backspace" && ansOnes.value === "") ansTens.focus();
  if (e.key === "Enter") checkAddsub();
});
ansTens.addEventListener("keydown", e => {
  if (e.key === "Backspace" && ansTens.value === "") {
    ansOnes.focus(); ansOnes.setSelectionRange(ansOnes.value.length, ansOnes.value.length);
  }
  if (e.key === "Enter") checkAddsub();
});

function makeAddsubQ() {
  answered = false;
  qIdx++;
  document.getElementById("as-count").textContent = qIdx + " / " + TOTAL;
  document.getElementById("as-score").textContent = score;
  document.getElementById("as-feedback").className = "feedback";
  document.getElementById("as-check").style.display = "block";
  document.getElementById("as-next").classList.remove("show");
  ansTens.value = ""; ansOnes.value = "";
  ansTens.disabled = false; ansOnes.disabled = false;

  const useCarry = carry === "mix" ? (Math.random() < .5 ? "yes" : "no") : carry;
  if (opMode === "add") {
    document.getElementById("as-label").textContent = carry === "mix" ? "たし算" : (useCarry === "yes" ? "たし算（くりあがりあり）" : "たし算（くりあがりなし）");
    document.getElementById("as-op").textContent = "+";
    genAdd(useCarry === "yes");
  } else {
    document.getElementById("as-label").textContent = carry === "mix" ? "ひき算" : (useCarry === "yes" ? "ひき算（くりさがりあり）" : "ひき算（くりさがりなし）");
    document.getElementById("as-op").textContent = "−";
    genSub(useCarry === "yes");
  }
  document.getElementById("n1t").textContent = Math.floor(num1/10);
  document.getElementById("n1o").textContent = num1%10;
  document.getElementById("n2t").textContent = Math.floor(num2/10);
  document.getElementById("n2o").textContent = num2%10;
  setTimeout(() => ansOnes.focus(), 100);
}

function genAdd(needCarry) {
  let a,b,s,t=0;
  do { a=rnd2(); b=rnd2(); s=a+b; t++;
    if(t>2000) break;
  } while(s>99||s<10||(needCarry&&(a%10)+(b%10)<10)||(!needCarry&&(a%10)+(b%10)>=10));
  num1=a; num2=b; correctAns=s;
}
function genSub(needCarry) {
  let a,b,s,t=0;
  do { a=rnd2(); b=rnd2(); if(b>a){const x=a;a=b;b=x;} s=a-b; t++;
    if(t>2000) break;
  } while(s<10||s>99||(needCarry&&a%10>=b%10)||(!needCarry&&a%10<b%10));
  num1=a; num2=b; correctAns=s;
}
function rnd2(){ return Math.floor(Math.random()*90)+10; }

function checkAddsub() {
  if (answered) return;
  const t = ansTens.value, o = ansOnes.value;
  if (t===""||o==="") { feedbackEl("as-feedback","wrong","十の位と一の位を、どちらも入れてね。"); return; }
  const ua = Number(t+o); answered = true;
  ansTens.disabled = true; ansOnes.disabled = true;
  if (ua === correctAns) {
    score++;
    document.getElementById("as-score").textContent = score;
    feedbackEl("as-feedback","correct","⭕ せいかい！すごい！");
  } else {
    feedbackEl("as-feedback","wrong","❌ もういちど！<span class='small'>せいかいは "+String(correctAns).padStart(2,"0")+" だよ</span>");
  }
  document.getElementById("as-check").style.display = "none";
  const nb = document.getElementById("as-next");
  nb.classList.add("show");
  nb.textContent = qIdx >= TOTAL ? "けっかをみる" : "つぎの もんだいへ";
}
function nextAddsub() {
  if (qIdx >= TOTAL) showResult();
  else makeAddsubQ();
}

// =========================================================
// かけ算  ひっ算テーブル構築
// =========================================================
let mulInputIds = [];

function makeMulQ() {
  answered = false;
  qIdx++;
  document.getElementById("mul-count").textContent = qIdx + " / " + TOTAL;
  document.getElementById("mul-score").textContent = score;
  document.getElementById("mul-feedback").className = "feedback";
  document.getElementById("mul-check").style.display = "block";
  document.getElementById("mul-next").classList.remove("show");
  clearMemo("mul-canvas");

  genMul();
  const lv = mulLevel===1 ? "かけ算（1けた×1けた）" : mulLevel===2 ? "かけ算（2けた×1けた）" : "かけ算（2けた×2けた）";
  document.getElementById("mul-label").textContent = lv;
  buildMulTable();
}

function genMul() {
  let a,b;
  if (mulLevel === 1) {
    a = Math.floor(Math.random()*9)+1;
    b = Math.floor(Math.random()*9)+1;
  } else if (mulLevel === 2) {
    a = Math.floor(Math.random()*90)+10;
    b = Math.floor(Math.random()*8)+2;
  } else {
    do {
      a = Math.floor(Math.random()*90)+10;
      b = Math.floor(Math.random()*90)+10;
    } while (a*b > 9999);
  }
  num1=a; num2=b; correctAns=a*b;
}

/*
  かけ算ひっ算レイアウト（例: 38 × 27）

  列数 = max(num1桁, num2桁, 答桁) + 1(演算子列)

       3  8
    ×  2  7
    --------
    [  ][  ]  ← 答え入力
*/
function buildMulTable() {
  const tbl = document.getElementById("mul-table");
  tbl.innerHTML = "";
  mulInputIds = [];

  const s1 = String(num1), s2 = String(num2), sA = String(correctAns);
  const cols = Math.max(s1.length, s2.length, sA.length);
  // 演算子列 + 数字列
  const totalCols = cols + 1;

  function makeRow(opText, digits, totalCols, isInput, inputClass) {
    const tr = document.createElement("tr");
    // 演算子セル
    const opTd = document.createElement("td");
    opTd.className = "op-cell";
    opTd.textContent = opText;
    tr.appendChild(opTd);
    // 空白パディング
    const pad = totalCols - 1 - digits.length;
    for (let i = 0; i < pad; i++) {
      const td = document.createElement("td"); tr.appendChild(td);
    }
    // 数字or入力
    digits.forEach((d, i) => {
      const td = document.createElement("td");
      if (isInput) {
        const inp = document.createElement("input");
        const globalIdx = pad + i; // 左から何番目か
        const id = "mul-inp-" + globalIdx;
        inp.id = id; inp.className = "answer-input ans-inp";
        inp.inputMode = "numeric"; inp.maxLength = 1;
        inp.setAttribute("aria-label", (digits.length - i) + "の位");
        td.appendChild(inp);
        mulInputIds.push(id);
      } else {
        td.textContent = d;
      }
      tr.appendChild(td);
    });
    return tr;
  }

  // 1行目: num1
  tbl.appendChild(makeRow("", [...s1], totalCols, false));
  // 2行目: × num2
  tbl.appendChild(makeRow("×", [...s2], totalCols, false));
  // 横線
  const lineRow = document.createElement("tr");
  lineRow.className = "line-row";
  for (let i = 0; i < totalCols; i++) lineRow.appendChild(document.createElement("td"));
  tbl.appendChild(lineRow);
  // 答え行
  tbl.appendChild(makeRow("", [...sA], totalCols, true));

  setupInputNav(mulInputIds, "mul");
  setTimeout(() => focusLast(mulInputIds), 120);
}

function checkMul() {
  if (answered) return;
  const vals = mulInputIds.map(id => document.getElementById(id).value);
  if (vals.some(v => v === "")) { feedbackEl("mul-feedback","wrong","すべての けたを 入れてね。"); return; }
  const ua = Number(vals.join(""));
  answered = true;
  mulInputIds.forEach(id => { document.getElementById(id).disabled = true; });
  if (ua === correctAns) {
    score++; document.getElementById("mul-score").textContent = score;
    feedbackEl("mul-feedback","correct","⭕ せいかい！すごい！");
  } else {
    feedbackEl("mul-feedback","wrong","❌ もういちど！<span class='small'>せいかいは "+correctAns+" だよ</span>");
  }
  document.getElementById("mul-check").style.display = "none";
  const nb = document.getElementById("mul-next");
  nb.classList.add("show");
  nb.textContent = qIdx >= TOTAL ? "けっかをみる" : "つぎの もんだいへ";
}
function nextMul() { if (qIdx >= TOTAL) showResult(); else makeMulQ(); }

// =========================================================
// わり算  ひっ算テーブル構築
// =========================================================
let divHasRem = false;
let divQIds = [], divRIds = [];

function makeDivQ() {
  answered = false;
  qIdx++;
  document.getElementById("div-count").textContent = qIdx + " / " + TOTAL;
  document.getElementById("div-score").textContent = score;
  document.getElementById("div-feedback").className = "feedback";
  document.getElementById("div-check").style.display = "block";
  document.getElementById("div-next").classList.remove("show");
  clearMemo("div-canvas");

  genDiv();
  const lv = divLevel===1 ? "わり算（あまりなし）" : divLevel===2 ? "わり算（あまりあり）" : "わり算（2けたで わる）";
  document.getElementById("div-label").textContent = lv;
  buildDivTable();
}

function genDiv() {
  let a,b,q,r,t=0;
  if (divLevel === 1) {
    b = Math.floor(Math.random()*8)+2;
    q = Math.floor(Math.random()*19)+2;
    a = b*q;
    correctAns=q; correctRem=0; divHasRem=false;
  } else if (divLevel === 2) {
    do {
      b = Math.floor(Math.random()*8)+2;
      a = Math.floor(Math.random()*90)+10;
      q=Math.floor(a/b); r=a%b; t++;
      if(t>2000) break;
    } while (r===0||q<2);
    correctAns=q; correctRem=r; divHasRem=true;
  } else {
    do {
      b = Math.floor(Math.random()*90)+10;
      a = Math.floor(Math.random()*900)+100;
      q=Math.floor(a/b); r=a%b; t++;
      if(t>2000) break;
    } while (q<1||q>99);
    correctAns=q; correctRem=r; divHasRem=(r!==0);
  }
  num1=a; num2=b;
}

/*
  わり算ひっ算レイアウト（例: 84 ÷ 7）

       [ ][ ]      ← 商（答え入力）
     --------
  7 ) 8  4

  あまりあり (75 ÷ 8 = 9 あまり 3):
       [ ]          ← 商
     --------
  8 ) 7  5
        あまり [ ]  ← 余り入力
*/
function buildDivTable() {
  const tbl = document.getElementById("div-table");
  tbl.innerHTML = "";
  divQIds = []; divRIds = [];

  const sDiv = String(num2);   // 除数
  const sDvd = String(num1);   // 被除数
  const sQ   = String(correctAns); // 商
  const sR   = String(correctRem); // 余り

  // 被除数の桁数が列基準
  const numCols = sDvd.length;
  // 除数列 + 被除数列 = sDiv.length + numCols (ただし除数は┐の左にまとめる)
  // テーブル構造:
  //   col0: 除数 or 空白 (固定幅)
  //   col1..N: 被除数 各桁

  const DCOL = sDiv.length; // 除数占有列数
  const totalCols = DCOL + numCols;

  // ── 商行（答え入力） ──
  const qRow = document.createElement("tr");
  // 除数部分は空白
  for (let i=0; i<DCOL; i++) { const td=document.createElement("td"); qRow.appendChild(td); }
  // 商の桁を右揃えで配置（被除数と桁を揃える）
  const qPad = numCols - sQ.length;
  for (let i=0; i<qPad; i++) { const td=document.createElement("td"); qRow.appendChild(td); }
  [...sQ].forEach((_, i) => {
    const td = document.createElement("td");
    const inp = document.createElement("input");
    const id = "div-q-" + i;
    inp.id=id; inp.className="answer-input ans-inp div-ans";
    inp.inputMode="numeric"; inp.maxLength=1;
    td.appendChild(inp); qRow.appendChild(td);
    divQIds.push(id);
  });
  tbl.appendChild(qRow);

  // ── 横線行（商の下） ──
  const lineRow = document.createElement("tr");
  lineRow.className = "line-row";
  // 除数セル（┐）
  const bracketTd = document.createElement("td");
  bracketTd.colSpan = DCOL;
  bracketTd.className = "div-bracket";
  lineRow.appendChild(bracketTd);
  // 被除数の上の線
  for (let i=0; i<numCols; i++) {
    const td=document.createElement("td"); lineRow.appendChild(td);
  }
  tbl.appendChild(lineRow);

  // ── 除数 + 被除数行 ──
  const dvdRow = document.createElement("tr");
  // 除数
  const divTd = document.createElement("td");
  divTd.colSpan = DCOL;
  divTd.style.cssText = "font-size:36px;font-weight:bold;vertical-align:middle;text-align:right;padding-right:6px;";
  divTd.textContent = sDiv;
  dvdRow.appendChild(divTd);
  // 被除数 各桁
  [...sDvd].forEach(d => {
    const td=document.createElement("td");
    td.textContent=d; dvdRow.appendChild(td);
  });
  tbl.appendChild(dvdRow);

  // ── あまり行 ──
  if (divHasRem) {
    const remRow = document.createElement("tr");
    // 空白（除数列+被除数列-あまり入力列-ラベル列）
    const remPad = totalCols - sR.length - 1; // 1はラベル
    for (let i=0; i<remPad; i++) { const td=document.createElement("td"); remRow.appendChild(td); }
    // ラベル
    const lblTd = document.createElement("td");
    lblTd.style.cssText = "font-size:14px;color:#f7971e;font-weight:bold;white-space:nowrap;text-align:right;padding-right:4px;";
    lblTd.textContent = "あまり";
    remRow.appendChild(lblTd);
    // 余りの入力
    [...sR].forEach((_, i) => {
      const td=document.createElement("td");
      const inp=document.createElement("input");
      const id="div-r-"+i;
      inp.id=id; inp.className="answer-input ans-inp div-ans";
      inp.inputMode="numeric"; inp.maxLength=1;
      td.appendChild(inp); remRow.appendChild(td);
      divRIds.push(id);
    });
    tbl.appendChild(remRow);
  }

  // フォーカス: 商→余りの順で右から左
  const allIds = [...divQIds, ...divRIds];
  mulInputIds = allIds; // checkDivでも使うため共用
  setupInputNav(allIds, "div");
  setTimeout(() => {
    // あまりがあればあまりの最後、なければ商の最後にフォーカス
    focusLast(allIds);
  }, 120);
}

function checkDiv() {
  if (answered) return;
  const qVals = divQIds.map(id => document.getElementById(id).value);
  const rVals = divRIds.map(id => document.getElementById(id).value);
  if (qVals.some(v=>v==="")||rVals.some(v=>v==="")) {
    feedbackEl("div-feedback","wrong","すべての けたを 入れてね。"); return;
  }
  const uq = Number(qVals.join(""));
  const ur = rVals.length ? Number(rVals.join("")) : 0;
  answered = true;
  [...divQIds,...divRIds].forEach(id => { document.getElementById(id).disabled = true; });
  const ok = uq===correctAns && ur===correctRem;
  if (ok) {
    score++; document.getElementById("div-score").textContent = score;
    feedbackEl("div-feedback","correct","⭕ せいかい！すごい！");
  } else {
    const ansStr = divHasRem ? correctAns+" あまり "+correctRem : String(correctAns);
    feedbackEl("div-feedback","wrong","❌ もういちど！<span class='small'>せいかいは "+ansStr+" だよ</span>");
  }
  document.getElementById("div-check").style.display = "none";
  const nb = document.getElementById("div-next");
  nb.classList.add("show");
  nb.textContent = qIdx >= TOTAL ? "けっかをみる" : "つぎの もんだいへ";
}
function nextDiv() { if (qIdx >= TOTAL) showResult(); else makeDivQ(); }

// =========================================================
// フォーカス制御（共通）右から左
// =========================================================
function setupInputNav(ids, prefix) {
  ids.forEach((id, i) => {
    const inp = document.getElementById(id);
    if (!inp) return;
    inp.addEventListener("input", () => {
      inp.value = inp.value.replace(/[^0-9]/g,"");
      if (inp.value.length===1 && i>0) {
        const prev = document.getElementById(ids[i-1]);
        if (prev && !prev.disabled) { prev.focus(); prev.select(); }
      }
    });
    inp.addEventListener("keydown", e => {
      if (e.key==="Backspace" && inp.value==="" && i<ids.length-1) {
        const next = document.getElementById(ids[i+1]);
        if (next && !next.disabled) { next.focus(); next.setSelectionRange(next.value.length, next.value.length); }
      }
      if (e.key==="Enter") { if(prefix==="mul") checkMul(); else checkDiv(); }
    });
  });
}
function focusLast(ids) {
  const last = document.getElementById(ids[ids.length-1]);
  if (last) last.focus();
}

// =========================================================
// 結果
// =========================================================
function showResult() {
  showScreen("result");
  document.getElementById("r-score").textContent = score;
  let emoji,title,msg;
  if (score===10)     { emoji="🏆"; title="パーフェクト！"; msg="ぜんぶ せいかい！<br>ひっ算マスターだね！"; }
  else if (score>=8)  { emoji="🎉"; title="すごい！";       msg="とても よくできました！<br>もうすこしで パーフェクト！"; }
  else if (score>=5)  { emoji="😊"; title="よくできたね！"; msg="半分以上できたよ！<br>もう一回やってみよう！"; }
  else                { emoji="💪"; title="もう一回！";     msg="れんしゅうすれば だいじょうぶ！<br>ゆっくり がんばろう！"; }
  document.getElementById("r-emoji").textContent = emoji;
  document.getElementById("r-title").textContent = title;
  document.getElementById("r-msg").innerHTML = msg;
}

// =========================================================
// 共通フィードバック
// =========================================================
function feedbackEl(id, type, html) {
  const el = document.getElementById(id);
  el.className = "feedback " + type;
  el.innerHTML = html;
}

// =========================================================
// 手書きメモ Canvas
// =========================================================
const memoState = {}; // canvasId → {drawing, lastX, lastY}

function initMemoCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  // CSS幅に合わせてピクセル解像度を設定
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.parentElement.clientWidth - 20; // padding分引く
  canvas.style.width = "100%";
  canvas.width  = Math.round(cssW * dpr);
  // heightはCSS height="140"に合わせる
  const cssH = 140;
  canvas.style.height = cssH + "px";
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, cssW, cssH);
  // 薄いガイド線
  ctx.strokeStyle = "#f0f0f0";
  ctx.lineWidth = 1;
  for (let y = 28; y < cssH; y += 28) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cssW,y); ctx.stroke();
  }

  memoState[canvasId] = {drawing: false, lastX: 0, lastY: 0, dpr};

  canvas.addEventListener("mousedown",  e => startDraw(canvasId, e));
  canvas.addEventListener("mousemove",  e => draw(canvasId, e));
  canvas.addEventListener("mouseup",    () => stopDraw(canvasId));
  canvas.addEventListener("mouseleave", () => stopDraw(canvasId));
  canvas.addEventListener("touchstart", e => { e.preventDefault(); startDraw(canvasId, e.touches[0]); }, {passive:false});
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); draw(canvasId, e.touches[0]); }, {passive:false});
  canvas.addEventListener("touchend",   () => stopDraw(canvasId));
}

function getCanvasPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

function startDraw(canvasId, e) {
  const st = memoState[canvasId];
  if (!st) return;
  const canvas = document.getElementById(canvasId);
  const pos = getCanvasPos(canvas, e);
  st.drawing = true;
  st.lastX = pos.x;
  st.lastY = pos.y;
}
function draw(canvasId, e) {
  const st = memoState[canvasId];
  if (!st || !st.drawing) return;
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  const pos = getCanvasPos(canvas, e);
  ctx.beginPath();
  ctx.moveTo(st.lastX, st.lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = "#3a3a8a";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();
  st.lastX = pos.x;
  st.lastY = pos.y;
}
function stopDraw(canvasId) {
  const st = memoState[canvasId];
  if (st) st.drawing = false;
}
function clearMemo(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const st = memoState[canvasId];
  const dpr = st ? st.dpr : (window.devicePixelRatio||1);
  const ctx = canvas.getContext("2d");
  const cssW = canvas.offsetWidth;
  const cssH = canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#f0f0f0";
  ctx.lineWidth = 1;
  for (let y = 28; y < cssH; y += 28) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cssW,y); ctx.stroke();
  }
}
