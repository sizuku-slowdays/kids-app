<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 BINGO 抽選機</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .wrap {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 2rem 2rem 1.5rem;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .title {
    font-family: 'Boogaloo', cursive;
    font-size: 42px;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(247,194,53,0.6);
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: .1em;
    margin-bottom: 1.5rem;
  }
  .machine {
    position: relative;
    width: 190px;
    height: 190px;
    margin: 0 auto 0.5rem;
    cursor: pointer;
    filter: drop-shadow(0 8px 20px rgba(200,168,75,0.3));
    transition: filter .2s;
  }
  .machine:hover { filter: drop-shadow(0 10px 28px rgba(247,194,53,0.5)); }
  .machine:active { transform: scale(.97); }
  @keyframes spinLoop { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .click-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 1rem;
    letter-spacing: .05em;
  }
  .ball-stage {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 0.5rem 0;
  }
  .current-ball { width: 110px; height: 110px; flex-shrink: 0; }
  .current-ball svg { width: 100%; height: 100%; }
  .prev-balls {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    width: 44px;
  }
  .mini-ball { width: 44px; height: 44px; flex-shrink: 0; }
  .mini-ball svg { width: 100%; height: 100%; }
  .called-text {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin: .5rem 0 1rem;
    min-height: 20px;
    letter-spacing: .05em;
  }
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1rem; }
  .btn-main {
    font-family: 'Boogaloo', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    padding: 12px 42px;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #FF6B35, #F7C235);
    color: #fff;
    box-shadow: 0 4px 20px rgba(247,120,53,.45);
    transition: transform .12s, box-shadow .12s;
  }
  .btn-main:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(247,120,53,.6); }
  .btn-main:active { transform: scale(.97); }
  .btn-main:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-reset {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 12px 22px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: background .12s;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.16); }
  /* 音量スライダー */
  .vol-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1rem;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
  }
  .vol-row input[type=range] {
    width: 100px;
    accent-color: #F7C235;
    cursor: pointer;
  }
  .prog-wrap { max-width: 340px; margin: 0 auto .5rem; }
  .prog-bg {
    height: 8px;
    border-radius: 99px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #FF6B35, #F7C235, #5BC94D);
    transition: width .4s ease;
  }
  .prog-label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 5px;
    letter-spacing: .05em;
  }
  .hist-wrap { margin-top: 1.5rem; }
  .hist-title {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: .1em;
    margin-bottom: .6rem;
  }
  .hist-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    max-height: 140px;
    overflow-y: auto;
    padding: 2px;
  }
  .hist-grid::-webkit-scrollbar { width: 4px; }
  .hist-grid::-webkit-scrollbar-track { background: transparent; }
  .hist-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 99px; }
  .h-chip {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Boogaloo', cursive;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">🎱 BINGO!</div>
  <div class="subtitle">1〜100 ランダム抽選</div>

  <div class="machine" id="machineWrap" onclick="nextNumber()" title="クリックで次の数字">
    <svg width="190" height="190" viewBox="0 0 190 180" xmlns="http://www.w3.org/2000/svg">
      <rect x="50" y="150" width="90" height="14" rx="7" fill="#C8A84B"/>
      <g id="spinGroup" style="transform-origin:95px 90px;">
        <ellipse cx="95" cy="90" rx="68" ry="68" fill="none" stroke="#C8A84B" stroke-width="4"/>
        <ellipse cx="95" cy="90" rx="68" ry="28" fill="none" stroke="#C8A84B" stroke-width="2.5" opacity=".7"/>
        <ellipse cx="95" cy="90" rx="28" ry="68" fill="none" stroke="#C8A84B" stroke-width="2.5" opacity=".7"/>
        <circle cx="74" cy="78" r="11" fill="#FF4C4C" opacity=".9"/>
        <circle cx="100" cy="100" r="10" fill="#4C8EFF" opacity=".9"/>
        <circle cx="115" cy="70" r="9" fill="#4CCC55" opacity=".9"/>
        <circle cx="80" cy="112" r="10" fill="#FFD700" opacity=".9"/>
        <circle cx="116" cy="105" r="9" fill="#FF8C00" opacity=".9"/>
        <circle cx="65" cy="100" r="8" fill="#CC44CC" opacity=".9"/>
      </g>
      <ellipse cx="95" cy="90" rx="68" ry="68" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="18" stroke-dasharray="60 300" stroke-dashoffset="40"/>
      <rect x="153" y="84" width="24" height="10" rx="5" fill="#A07820" stroke="#7A5C10" stroke-width="1.5"/>
      <circle cx="177" cy="89" r="7" fill="#F7C235" stroke="#A07820" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="click-hint">← クリックで回す</div>

  <div class="ball-stage">
    <div class="prev-balls" id="prevBalls"></div>
    <div class="current-ball" id="currentBall">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="rgba(255,255,255,0.1)"/>
        <text x="50" y="54" font-size="22" fill="rgba(255,255,255,0.3)" font-family="Boogaloo,cursive" dominant-baseline="middle" text-anchor="middle">?</text>
      </svg>
    </div>
  </div>

  <div class="called-text" id="calledText">まだ番号が引かれていません</div>

  <div class="btn-row">
    <button class="btn-main" id="nextBtn" onclick="nextNumber()">🎲 引く！</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>

  <!-- 音量コントロール -->
  <div class="vol-row">
    <span>🔈</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.7" oninput="setVolume(this.value)">
    <span>🔊</span>
  </div>

  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="bar" style="width:0%"></div></div>
    <div class="prog-label" id="progLabel">0 / 100</div>
  </div>

  <div class="hist-wrap" id="histWrap" style="display:none">
    <div class="hist-title">▼ これまでの番号</div>
    <div class="hist-grid" id="histGrid"></div>
  </div>
</div>

<script>
// ── Audio ──────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let drumRollNodes = [];
let volLevel = 0.7;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volLevel;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function setVolume(v) {
  volLevel = parseFloat(v);
  if (masterGain) masterGain.gain.value = volLevel;
}

// スネアドラム1発
function snareHit(ctx, when, vol) {
  const bufSize = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.08);
  src.connect(g);
  g.connect(masterGain);
  src.start(when);
}

// バスドラム1発
function kickHit(ctx, when, vol) {
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, when);
  osc.frequency.exponentialRampToValueAtTime(40, when + 0.12);
  g.gain.setValueAtTime(vol, when);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.25);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(when);
  osc.stop(when + 0.25);
}

// ドラムロール（800ms、だんだん速くなる）
function playDrumRoll(duration) {
  const ctx = getCtx();
  const now = ctx.currentTime;
  drumRollNodes = [];
  let t = now;
  let interval = 0.18;
  const minInterval = 0.055;
  const speedUp = 0.87;
  let vol = 0.35;
  while (t < now + duration) {
    snareHit(ctx, t, vol);
    if (Math.random() > 0.7) kickHit(ctx, t, vol * 0.5);
    vol = Math.min(0.9, vol * 1.045);
    interval = Math.max(minInterval, interval * speedUp);
    t += interval;
  }
}

// ファンファーレ（ジャーン！）
function playFanfare() {
  const ctx = getCtx();
  const now = ctx.currentTime;

  // シンバルクラッシュ
  const bufSize = ctx.sampleRate * 1.2;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.2);
  }
  const cymbal = ctx.createBufferSource();
  cymbal.buffer = buf;
  const hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 6000;
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.9, now);
  cg.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
  cymbal.connect(hpf);
  hpf.connect(cg);
  cg.connect(masterGain);
  cymbal.start(now);

  // 明るい和音（ドミソ→高ド）
  const chord = [261.63, 329.63, 392.00, 523.25];
  chord.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.25, now + 0.02 + i * 0.03);
    og.gain.setValueAtTime(0.25, now + 0.3);
    og.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
    osc.connect(og);
    og.connect(masterGain);
    osc.start(now);
    osc.stop(now + 1.2);
  });

  // ドン！（キック強め）
  kickHit(ctx, now, 1.0);
  kickHit(ctx, now + 0.02, 0.6);
}

// ── Ball helpers ───────────────────────────────────────
const COLORS = ['#FF4C4C','#FF8C00','#FFD700','#4CCC55','#4C8EFF','#8844DD','#FF66BB','#00BBBB'];
function ballColor(n) { return COLORS[Math.floor((n-1)/13) % COLORS.length]; }
function shadeColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+amt)); g=Math.min(255,Math.max(0,g+amt)); b=Math.min(255,Math.max(0,b+amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function makeBallSVG(n, r, fontSize) {
  const c=ballColor(n), dark=shadeColor(c,-45), light=shadeColor(c,50);
  const id='g'+n+'x'+Math.random().toString(36).slice(2,5);
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="${id}" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="${light}"/>
      <stop offset="100%" stop-color="${dark}"/>
    </radialGradient></defs>
    <circle cx="50" cy="50" r="${r}" fill="url(#${id})"/>
    <ellipse cx="37" cy="36" rx="${r*.28}" ry="${r*.16}" fill="white" fill-opacity=".45" transform="rotate(-30 37 36)"/>
    <text x="50" y="54" fill="#fff" font-size="${fontSize}" font-family="Boogaloo,cursive" dominant-baseline="middle" text-anchor="middle">${n}</text>
  </svg>`;
}

// ── Spin animation ─────────────────────────────────────
const sg = document.getElementById('spinGroup');
let pool=[], called=[], spinning=false;

function startSpin() {
  sg.style.transition = 'none';
  sg.style.animation = 'spinLoop 0.45s linear infinite';
}
function stopSpin(cb) {
  const matrix = getComputedStyle(sg).transform;
  let angle = 0;
  if (matrix && matrix !== 'none') {
    const vals = matrix.match(/matrix\(([^)]+)\)/);
    if (vals) { const [a,b] = vals[1].split(',').map(Number); angle = Math.round(Math.atan2(b,a)*(180/Math.PI)); }
  }
  sg.style.animation = 'none';
  sg.style.transform = `rotate(${angle}deg)`;
  void sg.offsetWidth;
  sg.style.transition = 'transform 0.4s cubic-bezier(.15,.8,.35,1)';
  sg.style.transform = `rotate(${angle+120}deg)`;
  setTimeout(() => {
    sg.style.transition = '';
    sg.style.transform = '';
    spinning = false;
    if (cb) cb();
  }, 420);
}

// ── Game logic ─────────────────────────────────────────
function init() {
  pool = Array.from({length:100},(_,i)=>i+1).sort(()=>Math.random()-.5);
  called = [];
  sg.style.animation = 'none';
  sg.style.transform = '';
  sg.style.transition = '';
  spinning = false;
  document.getElementById('currentBall').innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" fill="rgba(255,255,255,0.1)"/><text x="50" y="54" font-size="22" fill="rgba(255,255,255,0.3)" font-family="Boogaloo,cursive" dominant-baseline="middle" text-anchor="middle">?</text></svg>`;
  document.getElementById('prevBalls').innerHTML = '';
  document.getElementById('calledText').textContent = 'まだ番号が引かれていません';
  document.getElementById('bar').style.width = '0%';
  document.getElementById('progLabel').textContent = '0 / 100';
  document.getElementById('histGrid').innerHTML = '';
  document.getElementById('histWrap').style.display = 'none';
  document.getElementById('nextBtn').disabled = false;
}

function nextNumber() {
  if (!pool.length || spinning) return;
  spinning = true;
  document.getElementById('nextBtn').disabled = true;

  // AudioContext は最初のクリックで起動
  getCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  startSpin();
  playDrumRoll(0.8);

  setTimeout(() => {
    const n = pool.pop();
    called.push(n);

    stopSpin(() => {
      playFanfare();

      document.getElementById('currentBall').innerHTML = makeBallSVG(n, 46, 36);
      const prev = document.getElementById('prevBalls');
      prev.innerHTML = '';
      called.slice(-4,-1).reverse().forEach(p => {
        const d = document.createElement('div');
        d.className = 'mini-ball';
        d.innerHTML = makeBallSVG(p, 44, 16);
        prev.appendChild(d);
      });

      document.getElementById('calledText').textContent = `${called.length}番目: ${n}`;
      document.getElementById('bar').style.width = `${called.length}%`;
      document.getElementById('progLabel').textContent = `${called.length} / 100`;
      document.getElementById('histWrap').style.display = 'block';

      const grid = document.getElementById('histGrid');
      grid.innerHTML = '';
      [...called].reverse().forEach((v,i) => {
        const ch = document.createElement('div');
        ch.className = 'h-chip';
        ch.style.background = ballColor(v);
        if (i===0) ch.style.boxShadow = `0 0 0 2.5px #fff, 0 0 10px ${ballColor(v)}`;
        ch.textContent = v;
        grid.appendChild(ch);
      });

      if (!pool.length) {
        document.getElementById('calledText').textContent = '🎉 全100番号を引き終えました！';
      } else {
        document.getElementById('nextBtn').disabled = false;
      }
    });
  }, 800);
}

function resetAll() { init(); }
init();
</script>
</body>
</html>
